<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PureScan Nexus | Plateforme d'Analyse Dermato-Cosmétique</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.5.0/opencv.js" onload="onOpenCvScriptLoaded();"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #2563eb; --primary-dark: #1e40af; 
            --bg-dark: #0f172a; --bg-panel: #1e293b; 
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --danger: #ef4444; --warning: #f59e0b; --success: #10b981;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* OPTIQUE CLINIQUE */
        #viewport { position: relative; flex: 0 0 32vh; background: #000; overflow: hidden; border-bottom: 1px solid #334155; }
        video, #preview-img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        #preview-img { display: none; z-index: 5; }
        .guide-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 45vw; height: 45vw; max-width: 200px; max-height: 200px; border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 12px; z-index: 10; transition: all 0.3s ease; }
        .guide-box::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.5); }
        .guide-box.scanning { border-color: var(--primary); transform: translate(-50%, -50%) scale(0.95); background: rgba(37, 99, 235, 0.1); }

        /* TABLEAU DE BORD */
        .dashboard { flex: 1; padding: 12px 16px; display: flex; flex-direction: column; background: var(--bg-dark); overflow-y: auto; }
        .status-badge { font-size: 0.65rem; color: var(--text-main); letter-spacing: 0.5px; text-transform: uppercase; font-weight: 600; padding: 6px 10px; background: var(--bg-panel); border-radius: 6px; text-align: center; margin-bottom: 10px; border: 1px solid #334155; transition: all 0.3s; }
        .batch-tracker { display: flex; gap: 8px; margin-bottom: 10px; justify-content: center; align-items: center; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #334155; transition: 0.3s; }
        .dot.active { background: var(--primary); box-shadow: 0 0 8px rgba(37, 99, 235, 0.6); }

        /* CARTE D'ANALYSE */
        .analysis-card { background: var(--bg-panel); border-radius: 12px; padding: 12px; border: 1px solid #334155; margin-bottom: 12px; display: flex; flex-direction: column; flex-grow: 1; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #334155; }
        .risk-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 2px; }
        #risk-val { font-size: 2rem; font-weight: 700; color: var(--text-main); line-height: 1; transition: color 0.3s; }
        
        /* ONGLETS */
        .tabs { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { flex: 0 0 auto; background: transparent; border: 1px solid #475569; color: var(--text-muted); padding: 6px 10px; border-radius: 6px; font-size: 0.65rem; cursor: pointer; transition: 0.2s; font-weight: 600; }
        .tab-btn.active { background: #334155; color: var(--text-main); border-color: #64748b; }
        .tab-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        #advice { font-size: 0.8rem; color: var(--text-main); line-height: 1.5; text-align: left; padding: 10px; background: #0f172a; border-radius: 8px; border-left: 3px solid var(--primary); white-space: pre-line; flex-grow: 1; overflow-y: auto; }

        /* CONTRÔLES ÉTENDUS */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: auto; padding-bottom: 4px; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-main { background: var(--primary); color: white; grid-column: span 2; padding: 14px; font-size: 0.85rem;}
        .btn-main:active { background: var(--primary-dark); }
        .btn-main:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        .btn-sub { background: transparent; color: var(--text-main); border: 1px solid #475569; }
        .btn-sub:active { background: #334155; }
        
        /* FOOTER & MENTIONS LÉGALES */
        .legal-disclaimer { text-align: center; font-size: 0.5rem; color: #64748b; margin-top: 8px; line-height: 1.4; padding: 0 5px; }
        .signature { font-weight: 700; color: #94a3b8; display: block; margin-top: 2px; }
    </style>
</head>
<body>

    <div id="viewport">
        <video id="webcam" autoplay playsinline muted></video>
        <img id="preview-img">
        <div class="guide-box" id="guide"></div>
    </div>

    <div class="dashboard">
        <div id="status" class="status-badge">AUTO-DIAGNOSTIC SYSTÈME...</div>

        <div class="batch-tracker" id="batch-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>

        <div class="analysis-card">
            <div class="top-row">
                <div>
                    <div class="risk-label">Probabilité d'Altération Structurelle</div>
                    <div id="risk-val">--%</div>
                </div>
            </div>

            <div class="tabs" id="agent-tabs">
                <button class="tab-btn active" data-target="bilan" disabled>Bilan Clinique</button>
                <button class="tab-btn" data-target="nettoyage" disabled>Lavage</button>
                <button class="tab-btn" data-target="routine" disabled>Soin</button>
                <button class="tab-btn" data-target="produits" disabled>Actifs</button>
            </div>

            <div id="advice">Initialisation des modules d'analyse dermatologique...</div>
        </div>

        <div class="controls">
            <input type="file" id="file-in" style="display:none;" accept="image/*">
            <button class="btn btn-main" id="btn-scan" disabled>DÉMARRER L'ANALYSE CLINIQUE</button>
            <button class="btn btn-sub" id="btn-camera">📸 Caméra</button>
            <button class="btn btn-sub" id="btn-upload">📁 Importer</button>
            <button class="btn btn-sub" id="btn-reset">🔄 Patient</button>
            <button class="btn btn-sub" id="btn-api">🔑 Clé API</button>
        </div>
        
        <div class="legal-disclaimer">
            Dispositif d'Intelligence Artificielle à des fins informatives dermo-cosmétiques. Ne remplace pas un avis médical.
            <span class="signature">Architecte Logiciel : Nicolas Julienne</span>
        </div>
    </div>

    <canvas id="proc-canvas" style="display:none;"></canvas>

    <script>
        // ==========================================
        // GESTION SÉCURISÉE DE LA CLÉ API (LOCAL STORAGE)
        // ==========================================
        function getApiKey() {
            return localStorage.getItem('mistral_api_key') || "";
        }

        document.getElementById('btn-api').onclick = () => {
            const currentKey = getApiKey();
            const newKey = prompt("Entrez votre clé API Mistral (laissée vide pour utiliser le mode de secours local) :", currentKey);
            if (newKey !== null) {
                localStorage.setItem('mistral_api_key', newKey.trim());
                updateStatus("CLÉ API SAUVEGARDÉE DANS L'APPAREIL", "var(--success)");
            }
        };

        // ==========================================
        // CONFIGURATION SYSTÈME
        // ==========================================
        const ui = {
            v: document.getElementById('webcam'), img: document.getElementById('preview-img'),
            btnScan: document.getElementById('btn-scan'), status: document.getElementById('status'),
            advice: document.getElementById('advice'), risk: document.getElementById('risk-val'),
            guide: document.getElementById('guide'), dots: document.querySelectorAll('.dot'),
            canvas: document.getElementById('proc-canvas'), tabs: document.querySelectorAll('.tab-btn')
        };
        
        let state = { 
            cvReady: false, aiReady: false, isLive: true, batchCount: 0, 
            results: [], model: null, videoReady: false,
            cameraMode: 'environment', videoStream: null, // Gestion du double objectif
            agentData: { bilan: "", nettoyage: "", routine: "", produits: "" } 
        };

        // ==========================================
        // 1. DÉMARRAGE ROBUSTE & GESTION CAMÉRA
        // ==========================================
        window.onload = () => { 
            initAI(); 
            initCamera(); 
            // Vérification discrète de la clé au démarrage
            if(!getApiKey()) { console.log("Mode IA Local activé (Aucune clé API trouvée)."); }
        };

        function onOpenCvScriptLoaded() {
            let retries = 0;
            const checkCv = setInterval(() => {
                if (typeof cv !== 'undefined' && typeof cv.Mat === 'function') {
                    clearInterval(checkCv); state.cvReady = true; checkSystemReady();
                }
                if(++retries > 50) { clearInterval(checkCv); updateStatus("ERREUR : OPENCV INJOIGNABLE", "var(--danger)"); }
            }, 200);
        }

        async function initAI() {
            try {
                updateStatus("CHARGEMENT DU MODÈLE NEURONAL...");
                try { await tf.setBackend('webgl'); await tf.ready(); } 
                catch (err) { await tf.setBackend('cpu'); await tf.ready(); }
                state.model = await mobilenet.load({version: 2, alpha: 1.0}); 
                state.aiReady = true; checkSystemReady();
            } catch (e) { updateStatus("ERREUR : IA INACCESSIBLE", "var(--danger)"); }
        }

        // Fonction d'initialisation propre de la caméra (empêche les fuites mémoires)
        async function initCamera() {
            if (state.videoStream) {
                state.videoStream.getTracks().forEach(track => track.stop()); // Coupe le flux précédent
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: state.cameraMode } 
                });
                state.videoStream = stream;
                ui.v.srcObject = stream;
                ui.v.onloadedmetadata = () => { state.videoReady = true; checkSystemReady(); };
            } catch (e) { 
                state.isLive = false; state.videoReady = true; 
                updateStatus("OPTIQUE DÉSACTIVÉE - MODE IMPORTATION", "var(--warning)"); 
            }
        }

        // Bouton Switch Caméra (Avant/Arrière)
        document.getElementById('btn-camera').onclick = () => {
            state.cameraMode = state.cameraMode === 'environment' ? 'user' : 'environment';
            state.isLive = true;
            ui.img.style.display = "none";
            updateStatus("BASCULEMENT OPTIQUE...", "var(--primary)");
            initCamera();
        };

        function checkSystemReady() {
            if (state.cvReady && state.aiReady && state.videoReady) {
                updateStatus("SYSTÈME PRÊT", "var(--success)");
                ui.btnScan.disabled = false;
                ui.advice.innerText = "Alignez la zone cutanée au centre du guide clinique, puis déclenchez l'analyse.";
            }
        }

        function updateStatus(text, color = "var(--text-main)") {
            ui.status.innerText = text; ui.status.style.color = color;
            ui.status.style.borderColor = color === "var(--text-main)" ? "#334155" : color;
        }

        // ==========================================
        // 2. MOTEUR D'ANALYSE CLINIQUE
        // ==========================================
        ui.btnScan.onclick = async () => {
            if (!state.cvReady || !state.aiReady) return;
            ui.btnScan.disabled = true; ui.guide.classList.add('scanning');
            updateStatus("TRAITEMENT NUMÉRIQUE...", "var(--primary)");
            ui.advice.innerText = "Élimination des artefacts et analyse stratigraphique...";
            ui.tabs.forEach(t => t.disabled = true);

            const ctx = ui.canvas.getContext('2d');
            ui.canvas.width = 224; ui.canvas.height = 224;
            
            if (state.isLive) {
                const size = Math.min(ui.v.videoWidth, ui.v.videoHeight);
                const startX = (ui.v.videoWidth - size) / 2;
                const startY = (ui.v.videoHeight - size) / 2;
                ctx.drawImage(ui.v, startX, startY, size, size, 0, 0, 224, 224);
            } else {
                const size = Math.min(ui.img.naturalWidth, ui.img.naturalHeight);
                const startX = (ui.img.naturalWidth - size) / 2;
                const startY = (ui.img.naturalHeight - size) / 2;
                ctx.drawImage(ui.img, startX, startY, size, size, 0, 0, 224, 224);
            }

            let srcRGBA, srcRGB, gray, kernel, dst;
            try {
                srcRGBA = cv.imread(ui.canvas); srcRGB = new cv.Mat(); cv.cvtColor(srcRGBA, srcRGB, cv.COLOR_RGBA2RGB); 
                gray = new cv.Mat(); cv.cvtColor(srcRGBA, gray, cv.COLOR_RGBA2GRAY);
                kernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(5, 1));
                cv.morphologyEx(gray, gray, cv.MORPH_BLACKHAT, kernel); cv.threshold(gray, gray, 15, 255, cv.THRESH_BINARY);
                dst = new cv.Mat(); cv.inpaint(srcRGB, gray, dst, 3, cv.INPAINT_TELEA); cv.imshow(ui.canvas, dst); 

                const tensor = tf.browser.fromPixels(ui.canvas);
                const predictions = await state.model.classify(tensor);
                tf.dispose(tensor); 

                let finalScore = Math.min(Math.round(predictions[0].probability * 100 * 1.5), 99); 

                ui.dots[state.batchCount].classList.add('active');
                ui.risk.innerText = finalScore + "%";
                ui.risk.style.color = finalScore >= 60 ? "var(--danger)" : (finalScore >= 30 ? "var(--warning)" : "var(--success)");

                ui.advice.innerText = "Compilation des protocoles par les experts Mistral AI...";
                await fetchMistralMultiAgent(finalScore);

                state.results.push({ risk: finalScore, img: ui.canvas.toDataURL('image/jpeg', 0.8), report: state.agentData });
                state.batchCount++;

                ui.tabs.forEach(t => t.disabled = false);
                switchTab('bilan'); 

                if (state.batchCount >= 5) {
                    updateStatus("DOSSIER COMPLÉTÉ : ÉDITION DU RAPPORT PDF", "var(--success)");
                    generatePDF();
                    ui.btnScan.disabled = true;
                    setTimeout(() => { updateStatus("PATIENT TERMINÉ. SÉLECTIONNEZ NOUVEAU PATIENT.", "var(--warning)"); }, 3000);
                } else {
                    updateStatus(`ZONE ${state.batchCount}/5 ANALYSÉE`, "var(--primary)");
                    ui.btnScan.disabled = false;
                }

            } catch (err) {
                updateStatus("ERREUR D'ANALYSE", "var(--danger)"); ui.advice.innerText = `Interrompu : ${err.message}`; ui.btnScan.disabled = false;
            } finally {
                if(srcRGBA) srcRGBA.delete(); if(srcRGB) srcRGB.delete();
                if(gray) gray.delete(); if(kernel) kernel.delete(); if(dst) dst.delete();
                ui.guide.classList.remove('scanning');
            }
        };

        // ==========================================
        // 3. IA MULTI-AGENTS (PARSEUR JSON BLINDÉ)
        // ==========================================
        async function fetchMistralMultiAgent(riskScore) {
            const apiKey = getApiKey();
            
            // Mode Local (Si pas de clé)
            if(!apiKey) {
                const isHigh = riskScore >= 60;
                state.agentData = {
                    bilan: isHigh ? "Indice d'altération significatif. Examen clinique recommandé." : "Structure cutanée dans les normes. Aucune atypie majeure.",
                    nettoyage: "Privilégier un nettoyant syndet doux (pH 5.5). Éviter l'eau calcaire.",
                    routine: isHigh ? "1. Suspension des exfoliants.\n2. Soins émollients réparateurs.\n3. Protection SPF 50+." : "1. Hydratation quotidienne.\n2. Maintien barrière lipidique.\n3. Photoprotection.",
                    produits: "Recommandés : Céramides, Acide Hyaluronique.\nÀ proscrire : Alcool dénaturé."
                };
                return;
            }

            try {
                const response = await fetch('https://api.mistral.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: "mistral-small-latest", 
                        response_format: { type: "json_object" },
                        messages: [
                            { role: "system", content: "Expert dermo-cosmétique. Répondez strictement au format JSON avec ces clés : 'bilan', 'nettoyage', 'routine' (numérotée), 'produits'. Ton médical et concis." },
                            { role: "user", content: `Score de probabilité d'altération : ${riskScore}%. Générez le JSON.` }
                        ]
                    })
                });
                
                const data = await response.json();
                const content = data.choices[0].message.content;
                
                // EXTRACTEUR JSON HAUTE RÉSILIENCE (Évite les crashs de parsing)
                let parsed;
                try {
                    const jsonMatch = content.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        parsed = JSON.parse(jsonMatch[0]);
                    } else {
                        throw new Error("Aucun JSON valide trouvé dans la réponse.");
                    }
                } catch(parseError) {
                    console.warn("Mistral JSON Parse Erreur. Tentative de récupération.", parseError);
                    // Fallback d'urgence si Mistral renvoie n'importe quoi
                    parsed = { bilan: content.substring(0, 100) + "...", nettoyage: "Donnée illisible.", routine: "Donnée illisible.", produits: "Donnée illisible." };
                }
                
                state.agentData = {
                    bilan: parsed.bilan || "Non spécifié.",
                    nettoyage: parsed.nettoyage || "Non spécifié.",
                    routine: parsed.routine || "Non spécifié.",
                    produits: parsed.produits || "Non spécifié."
                };
            } catch (e) {
                state.agentData = { bilan: "Erreur API Mistral.", nettoyage: "Vérifiez votre clé API.", routine: "Vérifiez votre connexion.", produits: "Impossible de joindre les experts." };
            }
        }

        ui.tabs.forEach(btn => { btn.addEventListener('click', () => { if(!btn.disabled) switchTab(btn.dataset.target); }); });

        function switchTab(targetAgent) {
            ui.tabs.forEach(t => t.classList.remove('active'));
            document.querySelector(`button[data-target="${targetAgent}"]`).classList.add('active');
            ui.advice.innerText = state.agentData[targetAgent];
            
            const colors = { bilan: "var(--primary)", nettoyage: "#38bdf8", routine: "var(--success)", produits: "var(--warning)" };
            ui.advice.style.borderLeftColor = colors[targetAgent];
        }

        // ==========================================
        // 4. ÉDITION DU RAPPORT CLINIQUE PDF
        // ==========================================
        function generatePDF() {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                let pageNum = 1;
                const pageWidth = doc.internal.pageSize.width;
                const pageHeight = doc.internal.pageSize.height;
                const margin = 20;

                const printHeader = () => {
                    doc.setFillColor(248, 250, 252); doc.rect(0, 0, pageWidth, 42, 'F');
                    doc.setTextColor(15, 23, 42); doc.setFont("helvetica", "bold"); doc.setFontSize(22);
                    doc.text("PURESCAN NEXUS", margin, 20);
                    doc.setTextColor(100, 116, 139); doc.setFont("helvetica", "normal"); doc.setFontSize(10);
                    doc.text("DOSSIER D'ANALYSE DERMO-COSMÉTIQUE", margin, 28);
                    doc.setFontSize(8);
                    doc.text(`Édité le : ${new Date().toLocaleDateString('fr-FR')} | Architecte : Nicolas Julienne`, margin, 34);
                    doc.setDrawColor(226, 232, 240); doc.setLineWidth(0.5); doc.line(margin, 42, pageWidth - margin, 42);
                };

                const printFooter = () => {
                    doc.setTextColor(148, 163, 184); doc.setFont("helvetica", "italic"); doc.setFontSize(7);
                    doc.text("Avertissement : Rapport généré par IA à titre informatif. Ne remplace pas un avis médical.", pageWidth / 2, pageHeight - 11, { align: "center" });
                    doc.setFont("helvetica", "normal"); doc.text(`Page ${pageNum}`, pageWidth - margin, pageHeight - 10, { align: "right" });
                };

                printHeader();
                let yOffset = 55;
                
                state.results.forEach((res, i) => {
                    if (yOffset > 220) { printFooter(); doc.addPage(); pageNum++; printHeader(); yOffset = 55; }
                    
                    doc.setTextColor(15, 23, 42); doc.setFont("helvetica", "bold"); doc.setFontSize(14);
                    doc.text(`Évaluation de la Zone n°${i+1}`, margin, yOffset);
                    
                    doc.setFont("helvetica", "normal"); doc.setFontSize(10);
                    if(res.risk >= 60) doc.setTextColor(220, 38, 38); 
                    else if(res.risk >= 30) doc.setTextColor(217, 119, 6);
                    else doc.setTextColor(5, 150, 105);
                    doc.text(`Probabilité d'altération : ${res.risk}%`, margin, yOffset + 6);
                    
                    doc.setDrawColor(203, 213, 225); doc.setLineWidth(0.3); doc.rect(154, yOffset - 4, 32, 32);
                    doc.addImage(res.img, 'JPEG', 155, yOffset - 3, 30, 30);
                    
                    yOffset += 18;

                    const printBlock = (title, text, color) => {
                        doc.setFontSize(9);
                        doc.setTextColor(color[0], color[1], color[2]); doc.setFont("helvetica", "bold");
                        doc.text(title, margin, yOffset);
                        
                        doc.setTextColor(71, 85, 105); doc.setFont("helvetica", "normal");
                        const lines = doc.splitTextToSize(text, 105); 
                        doc.text(lines, margin + 25, yOffset);
                        
                        yOffset += Math.max((lines.length * 4), 6) + 3; 
                    };

                    printBlock("Bilan :", res.report.bilan, [37, 99, 235]);
                    printBlock("Lavage :", res.report.nettoyage, [15, 23, 42]);
                    printBlock("Routine :", res.report.routine, [15, 23, 42]);
                    printBlock("Actifs :", res.report.produits, [15, 23, 42]);
                    
                    yOffset += 4;
                    doc.setDrawColor(226, 232, 240); doc.line(margin, yOffset, pageWidth - margin, yOffset);
                    yOffset += 12;
                });
                
                printFooter();
                doc.save(`Dossier_Dermatologique_PureScan.pdf`);
            } catch (e) { updateStatus("ERREUR LORS DE L'ÉDITION DU PDF", "var(--danger)"); ui.btnScan.disabled = false; }
        }

        function resetApp() {
            state.batchCount = 0; state.results = []; ui.dots.forEach(d => d.classList.remove('active'));
            ui.btnScan.disabled = false; ui.risk.innerText = "--%"; ui.risk.style.color = "var(--text-main)";
            ui.tabs.forEach(t => { t.disabled = true; t.classList.remove('active'); });
            ui.tabs[0].classList.add('active'); ui.advice.style.borderLeftColor = "var(--primary)";
            updateStatus("SYSTÈME PRÊT", "var(--success)"); ui.advice.innerText = "Dossier patient initialisé. Prêt pour l'acquisition d'images.";
        }

        // ==========================================
        // 5. CONTRÔLES PWA & IMPORT
        // ==========================================
        document.getElementById('btn-upload').onclick = () => document.getElementById('file-in').click();
        document.getElementById('file-in').onchange = (e) => {
            if (!e.target.files || e.target.files.length === 0) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                ui.img.src = ev.target.result; ui.img.style.display = "block";
                if(state.videoStream) { state.videoStream.getTracks().forEach(track => track.stop()); }
                state.isLive = false; updateStatus("ACQUISITION IMAGE RÉUSSIE", "var(--primary)");
            };
            reader.readAsDataURL(e.target.files[0]);
        };
        document.getElementById('btn-reset').onclick = () => {
            ui.img.style.display = "none"; document.getElementById('file-in').value = "";
            state.isLive = true; initCamera(); resetApp(); updateStatus("RETOUR OPTIQUE DIRECT", "var(--primary)");
        };
        
        if ('serviceWorker' in navigator) {
            const swBlob = new Blob([`self.addEventListener('install', e => e.waitUntil(caches.open('purescan-pro').then(c => c.addAll(['index.html'])))); self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(res => res || fetch(e.request))));`], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(swBlob));
        }
    </script>
</body>
</html>
