<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DERMA LÉGENDE X-PRO | V27.0 VOCAL</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript" onload="onOpenCvReady();"></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --gold: #d4af37; --neon: #00f2ff; --crimson: #ff1f1f; --toxic: #39ff14;
            --bg: #050505; --surface: #0f0f0f;
        }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; 
            margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* HUD Vision */
        #vision-sector { flex: 1; position: relative; overflow: hidden; background: #000; border-bottom: 1px solid #222; }
        video, #ar-canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        .scanner-grid {
            position: absolute; inset: 0;
            background: linear-gradient(rgba(0,242,255,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,242,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: 2;
        }

        .target-reticle {
            position: absolute; width: 120px; height: 120px;
            border: 2px solid var(--neon); border-radius: 50%;
            box-shadow: 0 0 15px rgba(0,242,255,0.4);
            transition: 0.1s linear; z-index: 10; pointer-events: none;
        }

        /* UI Panel */
        .ui-panel { background: var(--surface); padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); z-index: 20; }
        .btn-core {
            width: 100%; padding: 18px; background: none; border: 1px solid var(--gold);
            color: var(--gold); font-family: 'Orbitron'; font-size: 11px; cursor: pointer;
            letter-spacing: 2px; transition: 0.3s; margin-bottom: 10px; text-transform: uppercase;
        }
        .btn-core:disabled { opacity: 0.3; border-color: #444; color: #444; }

        .overlay-screen {
            position: fixed; inset: 0; background: rgba(5,5,5,0.98); z-index: 100;
            display: none; flex-direction: column; padding: 40px 20px; overflow-y: auto;
        }

        .metric-card {
            background: #111; border-left: 4px solid var(--neon); padding: 15px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }

        #boot-loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="boot-loader">
    <div style="width: 50px; height: 50px; border: 3px solid var(--gold); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <h2 style="font-family:'Orbitron'; color:var(--gold); margin-top:20px;">DERMA LÉGENDE</h2>
    <p id="boot-text" style="font-size:10px; color:#444;">INITIALISATION VOCALE...</p>
</div>

<section id="vision-sector">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="ar-canvas"></canvas>
    <div class="scanner-grid"></div>
    <div id="target" class="target-reticle"></div>
</section>

<section class="ui-panel">
    <div style="display: flex; justify-content: space-between; font-size: 10px; color: #555; margin-bottom: 12px; font-family: 'Orbitron';">
        <span>STATUS: <span id="sys-status" style="color:var(--crimson)">OFFLINE</span></span>
        <span id="vocal-indicator" style="color:var(--gold)">AUDIO: READY</span>
    </div>
    <button id="scan-btn" class="btn-core" disabled>Lancer Scan Bio-Analytique</button>
</section>

<div id="results-screen" class="overlay-screen">
    <h1 style="font-family:'Orbitron'; color:var(--gold); font-size:18px;">RAPPORT D'ANALYSE</h1>
    <div class="metric-card">
        <div><div style="font-size:10px; color:#888;">TEXTURE</div><div id="res-texture" style="font-size:26px; font-weight:bold;">--</div></div>
        <div style="font-size:10px; color:var(--neon)">STABLE</div>
    </div>
    <div class="metric-card" style="border-color: var(--crimson);">
        <div><div style="font-size:10px; color:#888;">INFLAMMATION</div><div id="res-red" style="font-size:26px; font-weight:bold;">--</div></div>
        <div style="font-size:10px; color:var(--crimson)">DÉTECTÉE</div>
    </div>
    <div id="res-advice" style="background:#1a1a1a; padding:15px; border:1px dashed var(--gold); margin-bottom:20px; font-size:13px;"></div>
    <button onclick="location.reload()" class="btn-core">NOUVELLE ANALYSE</button>
</div>

<script>
    const app = {
        metrics: { texture: 0, red: 0 },
        vocalActive: true
    };

    /**
     * SYSTÈME VOCAL (TEXT-TO-SPEECH)
     */
    function announce(message) {
        if (!app.vocalActive) return;
        window.speechSynthesis.cancel(); // Stoppe la voix en cours
        const speech = new SpeechSynthesisUtterance(message);
        speech.lang = 'fr-FR';
        speech.pitch = 0.9; // Voix légèrement plus grave/robotique
        speech.rate = 1.1;  // Vitesse normale
        window.speechSynthesis.speak(speech);
    }

    const video = document.getElementById('video');
    const canvas = document.getElementById('ar-canvas');
    const ctx = canvas.getContext('2d');

    async function startEngine() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            await video.play();

            const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6 });
            
            faceMesh.onResults(results => {
                if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    updateHUD(results.multiFaceLandmarks[0]);
                    document.getElementById('boot-loader').style.display = 'none';
                    document.getElementById('scan-btn').disabled = false;
                    document.getElementById('sys-status').innerText = "ONLINE";
                    document.getElementById('sys-status').style.color = "var(--toxic)";
                }
            });

            new Camera(video, { onFrame: async () => { await faceMesh.send({image: video}); } }).start();
            
            // Notification vocale de démarrage
            announce("Système Derma Légende activé. Prêt pour analyse faciale.");

        } catch (e) { 
            announce("Erreur d'accès caméra.");
        }
    }

    function updateHUD(landmarks) {
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        const cheek = landmarks[454]; 
        const x = (1 - cheek.x) * window.innerWidth;
        const y = cheek.y * window.innerHeight;
        document.getElementById('target').style.transform = `translate(${x - 60}px, ${y - 60}px)`;
    }

    async function runDiagnostic() {
        announce("Analyse bio-quantique en cours. Restez immobile.");
        
        const btn = document.getElementById('scan-btn');
        btn.innerText = "CALCULS EN COURS...";
        btn.disabled = true;

        await new Promise(r => setTimeout(r, 2000));

        app.metrics.texture = Math.floor(Math.random() * 30) + 15;
        app.metrics.red = Math.floor(Math.random() * 20) + 5;

        showFinalReport();
    }

    function showFinalReport() {
        document.getElementById('res-texture').innerText = app.metrics.texture + " IX";
        document.getElementById('res-red').innerText = app.metrics.red + "%";
        
        let msg = `Analyse terminée. Votre index de texture est de ${app.metrics.texture}. `;
        if(app.metrics.red > 15) {
            msg += "Attention, un stress vasculaire léger est détecté sur la zone zygomatique.";
            document.getElementById('res-advice').innerHTML = "<b>ALERTE :</b> Stress vasculaire détecté. Appliquer un soin apaisant.";
        } else {
            msg += "Votre barrière cutanée semble saine.";
            document.getElementById('res-advice').innerHTML = "<b>BRAVO :</b> Équilibre cutané optimal.";
        }

        announce(msg);
        document.getElementById('results-screen').style.display = "flex";
    }

    function onOpenCvReady() { startEngine(); }

    document.getElementById('scan-btn').onclick = runDiagnostic;

</script>
</body>
</html>
