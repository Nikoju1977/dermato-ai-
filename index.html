<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PureSkin AI Elite | V10.0</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="AppCore.onOpenCvReady()"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #c5a059; --bg: #050505; --surface: #0f0f0f; --border: rgba(197, 160, 89, 0.2); --green: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        header { padding: max(45px, env(safe-area-inset-top)) 25px 15px; border-bottom: 0.5px solid var(--border); z-index: 10; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.1rem; letter-spacing: 2px; }
        .logo span { color: var(--gold); }

        #viewport { position: relative; height: 40vh; margin: 10px; border-radius: 20px; overflow: hidden; background: #000; border: 0.5px solid var(--border); }
        video, #overlay-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        
        .track-status { position: absolute; top: 15px; left: 15px; z-index: 20; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 1px; padding: 6px 12px; border-radius: 20px; background: rgba(0,0,0,0.7); border: 0.5px solid var(--border); display: flex; align-items: center; }
        .dot { width: 6px; height: 6px; border-radius: 50%; margin-right: 8px; background: #e74c3c; transition: 0.3s; }
        .dot.active { background: var(--green); box-shadow: 0 0 10px var(--green); }

        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); margin: 0 10px; border-radius: 4px; overflow: hidden; }
        .metric-card { background: var(--bg); padding: 15px 5px; text-align: center; }
        .metric-val { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--gold); display: block; }
        .metric-lab { font-size: 0.45rem; color: #666; text-transform: uppercase; margin-top: 4px; font-weight: 700; }

        .display-panel { flex: 1; background: var(--surface); margin-top: 10px; padding: 25px; overflow-y: auto; border-radius: 25px 25px 0 0; border: 0.5px solid var(--border); }
        .expert-block { margin-bottom: 20px; border-left: 2px solid var(--gold); padding-left: 15px; animation: slideIn 0.4s ease-out; }
        .expert-block b { color: var(--gold); font-size: 0.65rem; text-transform: uppercase; }
        .expert-block p { font-size: 0.85rem; line-height: 1.6; color: #bbb; margin-top: 4px; }

        .footer-actions { padding: 15px 20px max(20px, env(safe-area-inset-bottom)); background: var(--bg); display: flex; gap: 10px; }
        .btn-main { flex: 1; height: 60px; background: var(--gold); border: none; border-radius: 14px; color: #000; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; }
        .btn-main:disabled { background: #1a1a1a; color: #444; }

        #api-modal { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: var(--surface); padding: 40px; border-radius: 20px; border: 0.5px solid var(--border); width: 100%; max-width: 380px; text-align: center; }
        input { width: 100%; padding: 15px; background: #000; border: 0.5px solid var(--border); color: #fff; margin: 25px 0; border-radius: 10px; text-align: center; font-size: 1rem; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .scan-laser { position: absolute; width: 100%; height: 2px; background: var(--gold); z-index: 15; box-shadow: 0 0 15px var(--gold); display: none; top: 0; animation: laserMove 2s infinite linear; }
        @keyframes laserMove { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

<div id="api-modal">
    <div class="modal-box">
        <h2 class="logo">NICOLAS <span>JULIENNE</span></h2>
        <input id="api-key-input" type="password" placeholder="CLÉ API GEMINI">
        <button class="btn-main" style="width:100%;" onclick="AppCore.initApp()">ACTIVER L'IA</button>
    </div>
</div>

<header><div class="logo">PURESKIN <span>AI ELITE</span></div></header>

<div id="viewport">
    <div class="track-status"><span id="status-dot" class="dot"></span> <span id="status-text">Recherche...</span></div>
    <div id="laser" class="scan-laser"></div>
    <video id="v" autoplay playsinline muted></video>
    <canvas id="overlay-canvas"></canvas>
</div>

<div class="dashboard">
    <div class="metric-card"><span class="metric-val" id="val-score">--</span><span class="metric-lab">Pureté</span></div>
    <div class="metric-card"><span class="metric-val" id="val-hydra">--</span><span class="metric-lab">Hydra</span></div>
    <div class="metric-card"><span class="metric-val" id="val-red">--</span><span class="metric-lab">Rougeur</span></div>
    <div class="metric-card"><span class="metric-val" id="val-fitz">--</span><span class="metric-lab">Type</span></div>
</div>

<div class="display-panel" id="display-area">
    <p style="text-align:center; opacity:0.3; padding-top:40px; font-size:0.7rem;">ALIGNEMENT BIOMÉTRIQUE REQUIS</p>
</div>

<div class="footer-actions">
    <button class="btn-main" id="main-btn" onclick="AppCore.runAnalysis()" disabled>Scanner le visage</button>
</div>

<canvas id="proc-canvas" style="display:none;"></canvas>

<script>
const AppCore = (function() {
    const STATE = {
        apiKey: localStorage.getItem('NJ_KEY_V10') || '',
        cvReady: false,
        landmarks: null,
        isAligned: false,
        isScanning: false
    };

    const dom = {
        v: document.getElementById('v'),
        o: document.getElementById('overlay-canvas'),
        p: document.getElementById('proc-canvas'),
        btn: document.getElementById('main-btn'),
        laser: document.getElementById('laser'),
        dot: document.getElementById('status-dot'),
        stext: document.getElementById('status-text'),
        display: document.getElementById('display-area')
    };

    const Voice = {
        speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'fr-FR'; u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }
    };

    function onOpenCvReady() { STATE.cvReady = true; console.log("CV Ready"); }

    async function initApp() {
        const key = document.getElementById('api-key-input').value || STATE.apiKey;
        if (!key) return alert("Clé manquante");
        STATE.apiKey = key;
        localStorage.setItem('NJ_KEY_V10', key);
        document.getElementById('api-modal').style.display = 'none';

        // Safari Unblock
        Voice.speak("");

        const faceMesh = new FaceMesh({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
        faceMesh.setOptions({ 
            maxNumFaces: 1, 
            refineLandmarks: true, 
            minDetectionConfidence: 0.5, // Seuil baissé pour basse lumière
            minTrackingConfidence: 0.5 
        });

        faceMesh.onResults(res => {
            STATE.landmarks = res.multiFaceLandmarks?.[0];
            checkAlignment();
            drawOverlay();
        });

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'user', width: {ideal: 1280}, height: {ideal: 720} } 
            });
            dom.v.srcObject = stream;
            const loop = async () => {
                if(!STATE.isScanning) await faceMesh.send({image: dom.v});
                requestAnimationFrame(loop);
            };
            loop();
        } catch (e) { alert("Erreur Caméra : " + e.message); }
    }

    function checkAlignment() {
        if (!STATE.landmarks) {
            STATE.isAligned = false;
            dom.dot.classList.remove('active');
            dom.stext.innerText = "Face non détectée";
            dom.btn.disabled = true;
            return;
        }

        const nose = STATE.landmarks[1];
        // Zone de détection plus large pour mobile
        STATE.isAligned = nose.x > 0.35 && nose.x < 0.65 && nose.y > 0.3 && nose.y < 0.7;
        
        if (STATE.isAligned) {
            dom.dot.classList.add('active');
            dom.stext.innerText = "Cible Verrouillée";
            dom.btn.disabled = false;
        } else {
            dom.dot.classList.remove('active');
            dom.stext.innerText = "Alignez votre visage";
            dom.btn.disabled = true;
        }
    }

    function drawOverlay() {
        dom.o.width = dom.v.clientWidth; dom.o.height = dom.v.clientHeight;
        const ctx = dom.o.getContext('2d');
        const color = STATE.isAligned ? "rgba(46, 204, 113, 0.6)" : "rgba(197, 160, 89, 0.3)";
        
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        // Guide elliptique
        ctx.ellipse(dom.o.width/2, dom.o.height/2.2, dom.o.width*0.32, dom.o.height*0.35, 0, 0, Math.PI*2);
        ctx.stroke();

        if (STATE.landmarks) {
            ctx.fillStyle = color;
            [1, 33, 263, 61, 291].forEach(i => {
                const p = STATE.landmarks[i];
                ctx.beginPath();
                ctx.arc(p.x * dom.o.width, p.y * dom.o.height, 2, 0, Math.PI*2);
                ctx.fill();
            });
        }
    }

    async function runAnalysis() {
        if (!STATE.isAligned || STATE.isScanning) return;
        STATE.isScanning = true;
        dom.laser.style.display = 'block';
        Voice.speak("Analyse biométrique en cours.");

        try {
            const metrics = await computeCV();
            const ai = await fetchGemini(metrics);
            
            document.getElementById('val-score').innerText = metrics.score + '%';
            document.getElementById('val-hydra').innerText = ai.hydra + '%';
            document.getElementById('val-red').innerText = metrics.erythema;
            document.getElementById('val-fitz').innerText = metrics.type;

            dom.display.innerHTML = `
                <div class="expert-block"><b>Diagnostic Cellulaire</b><p>${ai.diag}</p></div>
                <div class="expert-block"><b>Protocole Matin</b><p>${ai.matin}</p></div>
                <div class="expert-block"><b>Protocole Soir</b><p>${ai.soir}</p></div>
            `;

            Voice.speak("Analyse terminée. Votre score est de " + metrics.score + " pourcent. " + ai.diag);
        } catch (e) { alert("Erreur : " + e.message); }
        finally {
            STATE.isScanning = false;
            dom.laser.style.display = 'none';
        }
    }

    async function computeCV() {
        const pCtx = dom.p.getContext('2d', {willReadFrequently: true});
        dom.p.width = dom.v.videoWidth; dom.p.height = dom.v.videoHeight;
        pCtx.drawImage(dom.v, 0, 0);
        
        const src = cv.imread(dom.p);
        const pt = STATE.landmarks[234]; // Joue
        const roiRect = new cv.Rect(pt.x * src.cols - 40, pt.y * src.rows - 40, 80, 80);
        const roi = src.roi(roiRect);

        const lab = new cv.Mat();
        cv.cvtColor(roi, lab, cv.COLOR_RGBA2RGB);
        cv.cvtColor(lab, lab, cv.COLOR_RGB2Lab);
        const mean = cv.mean(lab);

        const erythema = Math.max(0, Math.round(mean[1] - 128));
        const score = Math.max(0, 100 - (erythema * 2.5));

        const res = {
            score: Math.round(score),
            erythema: erythema,
            type: mean[0] > 150 ? "Clair" : "Mat",
            img: dom.p.toDataURL('image/jpeg', 0.6)
        };

        [src, roi, lab].forEach(m => m.delete());
        return res;
    }

    async function fetchGemini(m) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${STATE.apiKey}`;
        const prompt = `Analyse dermatologique. Score=${m.score}%, Rougeur=${m.erythema}. Répondre en JSON uniquement: {"hydra": "0-100", "diag": "bilan court", "matin": "actifs", "soir": "actifs"}`;
        
        const res = await fetch(url, {
            method: 'POST',
            body: JSON.stringify({
                contents: [{ parts: [{text: prompt}, {inline_data: {mime_type: "image/jpeg", data: m.img.split(',')[1]}}] }],
                generationConfig: { response_mime_type: "application/json", temperature: 0.2 }
            })
        });
        const data = await res.json();
        return JSON.parse(data.candidates[0].content.parts[0].text);
    }

    return { initApp, runAnalysis, onOpenCvReady };
})();
</script>
</body>
</html>
