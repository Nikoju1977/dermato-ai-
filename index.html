<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>PureSkin AI Elite | Cabinet Nicolas Julienne</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="AppCore.onOpenCvReady()"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #c5a059; --bg: #050505; --surface: #0f0f0f; --border: rgba(197, 160, 89, 0.2); --green: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        header { padding: max(40px, env(safe-area-inset-top)) 25px 15px; border-bottom: 0.5px solid var(--border); }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.1rem; letter-spacing: 2px; }
        .logo span { color: var(--gold); }

        #viewport { position: relative; height: 38vh; margin: 10px; border-radius: 15px; overflow: hidden; background: #000; border: 0.5px solid var(--border); }
        video, #overlay-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        
        .scan-laser { position: absolute; width: 100%; height: 3px; background: var(--gold); box-shadow: 0 0 15px var(--gold); display: none; z-index: 10; }

        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); margin: 0 10px; }
        .metric-card { background: var(--bg); padding: 15px 5px; text-align: center; }
        .metric-val { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--gold); display: block; }
        .metric-lab { font-size: 0.45rem; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

        .display-panel { flex: 1; background: var(--surface); margin-top: 10px; padding: 25px; overflow-y: auto; border-radius: 20px 20px 0 0; }
        .expert-block { margin-bottom: 20px; border-left: 2px solid var(--gold); padding-left: 15px; animation: fadeIn 0.5s ease-out; }
        .expert-block b { color: var(--gold); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        .expert-block p { font-size: 0.85rem; line-height: 1.6; color: #ccc; margin-top: 5px; }

        .btn-main { margin: 15px; height: 65px; background: var(--gold); border: none; border-radius: 12px; color: #000; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; transition: 0.3s; }
        .btn-main:disabled { background: #1a1a1a; color: #444; }

        #api-modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: var(--surface); padding: 40px; border-radius: 20px; border: 0.5px solid var(--border); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; background: #000; border: 0.5px solid var(--border); color: #fff; margin: 25px 0; border-radius: 8px; text-align: center; }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="api-modal">
    <div class="modal-box">
        <h2 class="logo">NICOLAS <span>JULIENNE</span></h2>
        <p style="font-size: 0.5rem; letter-spacing: 2px; margin-top: 10px; opacity: 0.5;">BIOMETRIC ACCESS CONTROL</p>
        <input id="api-key-input" type="password" placeholder="CLÉ API GEMINI 1.5">
        <button class="btn-main" style="width:100%; margin:0;" onclick="AppCore.initApp()">ACTIVER LE SYSTÈME</button>
    </div>
</div>

<header><div class="logo">PURESKIN <span>AI ELITE</span></div></header>

<div id="viewport">
    <div id="laser" class="scan-laser"></div>
    <video id="v" autoplay playsinline muted></video>
    <canvas id="overlay-canvas"></canvas>
</div>

<div class="dashboard">
    <div class="metric-card"><span class="metric-val" id="val-score">--</span><span class="metric-lab">Score</span></div>
    <div class="metric-card"><span class="metric-val" id="val-hydra">--</span><span class="metric-lab">Hydra</span></div>
    <div class="metric-card"><span class="metric-val" id="val-ery">--</span><span class="metric-lab">Rougeur</span></div>
    <div class="metric-card"><span class="metric-val" id="val-fitz">--</span><span class="metric-lab">Type</span></div>
</div>

<div class="display-panel" id="display-area">
    <p style="text-align:center; opacity:0.3; padding-top:40px; font-size:0.7rem; letter-spacing:1px;">EN ATTENTE D'ALIGNEMENT BIOMÉTRIQUE</p>
</div>

<button class="btn-main" id="main-btn" onclick="AppCore.runAnalysis()" disabled>Initialisation...</button>

<canvas id="proc-canvas" style="display:none;"></canvas>

<script>
const AppCore = (function() {
    const STATE = {
        apiKey: localStorage.getItem('NJ_KEY') || '',
        cvReady: false,
        landmarks: null,
        isAligned: false,
        isScanning: false
    };

    const dom = {
        v: document.getElementById('v'),
        o: document.getElementById('overlay-canvas'),
        p: document.getElementById('proc-canvas'),
        btn: document.getElementById('main-btn'),
        laser: document.getElementById('laser'),
        display: document.getElementById('display-area'),
        keyInput: document.getElementById('api-key-input')
    };

    // --- MOTEUR VOCAL (Optimisé iOS) ---
    const Voice = {
        synth: window.speechSynthesis,
        speak(text) {
            if (!text) return;
            this.synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'fr-FR';
            utter.rate = 0.9;
            utter.pitch = 1.0;
            this.synth.speak(utter);
        }
    };

    function onOpenCvReady() { STATE.cvReady = true; dom.btn.innerText = "Scanner le visage"; }

    async function initApp() {
        const key = dom.keyInput.value || STATE.apiKey;
        if (!key) return alert("Clé API requise");
        STATE.apiKey = key;
        localStorage.setItem('NJ_KEY', key);
        document.getElementById('api-modal').style.display = 'none';

        // Déclenchement audio initial pour Safari
        Voice.speak(""); 

        const faceMesh = new FaceMesh({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.7 });
        faceMesh.onResults(onResults);

        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'user', width: 1280, height: 720 } 
        });
        dom.v.srcObject = stream;

        const process = async () => {
            if (!STATE.isScanning) await faceMesh.send({image: dom.v});
            requestAnimationFrame(process);
        };
        process();
    }

    function onResults(res) {
        STATE.landmarks = res.multiFaceLandmarks?.[0];
        if (!STATE.landmarks) {
            STATE.isAligned = false;
        } else {
            const nose = STATE.landmarks[1];
            STATE.isAligned = nose.x > 0.4 && nose.x < 0.6 && nose.y > 0.3 && nose.y < 0.7;
        }
        
        dom.btn.disabled = !STATE.isAligned || STATE.isScanning;
        drawOverlay();
    }

    function drawOverlay() {
        dom.o.width = dom.v.clientWidth; dom.o.height = dom.v.clientHeight;
        const ctx = dom.o.getContext('2d');
        if (!STATE.landmarks) return;

        ctx.strokeStyle = STATE.isAligned ? "#2ecc71" : "#c5a059";
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.strokeRect(dom.o.width*0.2, dom.o.height*0.15, dom.o.width*0.6, dom.o.height*0.7);
    }

    async function runAnalysis() {
        if (!STATE.isAligned || STATE.isScanning) return;
        
        STATE.isScanning = true;
        dom.btn.innerText = "Analyse en cours...";
        dom.laser.style.display = 'block';
        dom.laser.style.animation = 'scan 2s infinite linear';
        Voice.speak("Analyse biométrique lancée. Veuillez rester immobile.");

        try {
            const metrics = await computeCV();
            const ai = await fetchGemini(metrics);
            
            // Mise à jour UI
            document.getElementById('val-score').innerText = metrics.score + '%';
            document.getElementById('val-hydra').innerText = ai.hydra + '%';
            document.getElementById('val-ery').innerText = metrics.erythema;
            document.getElementById('val-fitz').innerText = metrics.fitz;

            dom.display.innerHTML = `
                <div class="expert-block"><b>Diagnostic</b><p>${ai.diag}</p></div>
                <div class="expert-block"><b>Rituel Matin</b><p>${ai.matin}</p></div>
                <div class="expert-block"><b>Rituel Soir</b><p>${ai.soir}</p></div>
            `;

            Voice.speak(`Analyse terminée. Votre score est de ${metrics.score}%. ${ai.diag}`);

        } catch (e) {
            alert("Erreur: " + e.message);
        } finally {
            STATE.isScanning = false;
            dom.laser.style.display = 'none';
            dom.btn.innerText = "Scanner le visage";
        }
    }

    async function computeCV() {
        const pCtx = dom.p.getContext('2d', { willReadFrequently: true });
        dom.p.width = dom.v.videoWidth; dom.p.height = dom.v.videoHeight;
        pCtx.drawImage(dom.v, 0, 0);
        
        const src = cv.imread(dom.p);
        const pt = STATE.landmarks[234]; // Joue
        const rect = new cv.Rect(pt.x * src.cols - 30, pt.y * src.rows - 30, 60, 60);
        const roi = src.roi(rect);

        // Lab Color Space pour l'érythème
        const lab = new cv.Mat();
        cv.cvtColor(roi, lab, cv.COLOR_RGBA2RGB);
        cv.cvtColor(lab, lab, cv.COLOR_RGB2Lab);
        const mean = cv.mean(lab);
        
        const erythema = Math.round(mean[1] - 128);
        const phototype = mean[0] > 160 ? "Claire" : "Mate";
        
        // Texture
        const gray = new cv.Mat();
        cv.cvtColor(roi, gray, cv.COLOR_RGBA2GRAY);
        const lap = new cv.Mat();
        cv.Laplacian(gray, lap, cv.CV_8U);
        const texture = Math.round(cv.mean(lap)[0] * 2);

        const res = {
            score: 100 - (erythema + texture),
            erythema,
            fitz: phototype,
            img: dom.p.toDataURL('image/jpeg', 0.6)
        };

        [src, roi, lab, gray, lap].forEach(m => m.delete());
        return res;
    }

    async function fetchGemini(m) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${STATE.apiKey}`;
        const prompt = `Expert Nicolas Julienne. Data: Score=${m.score}, Rougeur=${m.erythema}. Image fournie. Répondre uniquement en JSON: {"hydra": "0-100", "diag": "phrase courte", "matin": "actifs", "soir": "actifs"}`;
        
        const res = await fetch(url, {
            method: 'POST',
            body: JSON.stringify({
                contents: [{ parts: [{text: prompt}, {inline_data: {mime_type: "image/jpeg", data: m.img.split(',')[1]}}] }],
                generationConfig: { response_mime_type: "application/json", temperature: 0.1 }
            })
        });
        const data = await res.json();
        return JSON.parse(data.candidates[0].content.parts[0].text);
    }

    return { initApp, runAnalysis, onOpenCvReady };
})();
</script>
</body>
</html>
