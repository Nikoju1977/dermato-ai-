<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PureSkin AI Elite | Nicolas Julienne Labs</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" id="opencv-rm"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Plus+Jakarta+Sans:wght@200;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #c5a059;
            --bg: #050505;
            --surface: #0f0f0f;
            --border: rgba(197, 160, 89, 0.15);
            --safe-green: #2ecc71;
            --error-red: #e74c3c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* LOADER OVERLAY */
        #boot-loader {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease-out;
        }
        .spinner { width: 40px; height: 40px; border: 2px solid rgba(197, 160, 89, 0.1); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s infinite linear; }
        .boot-text { margin-top: 20px; font-size: 0.5rem; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; text-align: center; }
        .boot-sub { margin-top: 10px; font-size: 0.4rem; color: #444; }

        header { padding: max(45px, calc(20px + env(safe-area-inset-top))) 30px 15px; border-bottom: 0.5px solid var(--border); }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; letter-spacing: 3px; }
        .logo span { color: var(--gold); }

        #viewport { position: relative; height: 35vh; margin: 15px 20px; border: 0.5px solid var(--border); background: #000; overflow: hidden; border-radius: 4px; }
        video, #overlay-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); margin: 0 20px; }
        .metric-card { background: var(--bg); padding: 12px 5px; text-align: center; }
        .metric-val { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--gold); }
        .metric-lab { font-size: 0.35rem; color: #555; text-transform: uppercase; margin-top: 4px; }

        .analysis-card { flex: 1; background: var(--surface); margin-top: 10px; display: flex; flex-direction: column; overflow: hidden; }
        #display-area { flex: 1; overflow-y: auto; padding: 20px; color: #bbb; font-size: 0.75rem; line-height: 1.6; }
        
        .footer-actions { padding: 10px 20px calc(15px + env(safe-area-inset-bottom)); display: flex; gap: 8px; border-top: 0.5px solid var(--border); }
        .btn-ui { height: 55px; border-radius: 4px; border: 0.5px solid var(--border); background: transparent; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-main { flex: 1; background: var(--gold); color: #000; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 0.65rem; border: none; }
        .btn-main:disabled { background: #1a1a1a; color: #444; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="boot-loader">
    <div class="spinner"></div>
    <p class="boot-text">Initialisation des Systèmes</p>
    <p id="boot-status" class="boot-sub">Vérification des moteurs...</p>
</div>

<header>
    <div class="logo">NICOLAS JULIENNE <span>LABS</span></div>
</header>

<div id="viewport">
    <video id="v" autoplay playsinline muted></video>
    <canvas id="overlay-canvas"></canvas>
</div>

<div class="dashboard">
    <div class="metric-card"><span class="metric-val" id="val-score">--</span><div class="metric-lab">Pureté</div></div>
    <div class="metric-card"><span class="metric-val" id="val-red">--</span><div class="metric-lab">Rougeurs</div></div>
    <div class="metric-card"><span class="metric-val" id="val-tex">--</span><div class="metric-lab">Texture</div></div>
    <div class="metric-card"><span class="metric-val" id="val-ita">--</span><div class="metric-lab">Éclat</div></div>
</div>

<div class="analysis-card" id="display-area">
    <div style="text-align:center; padding-top:40px; color:#444; font-size:0.55rem; letter-spacing:2px;">ALIGNEMENT REQUIS</div>
</div>

<div class="footer-actions">
    <button class="btn-ui btn-main" id="main-action" onclick="AppCore.runAnalysis()" disabled>LANCER LE SCAN</button>
    <button class="btn-ui" style="width:60px; color:var(--gold);" onclick="AppCore.share()">📤</button>
</div>

<canvas id="proc-canvas" style="display:none;"></canvas>

<script>
const AppCore = (function() {
    const STATE = {
        cvReady: false,
        fmReady: false,
        apiKey: localStorage.getItem('NJ_GEMINI_KEY') || prompt("Entrez votre clé API Gemini pour activer le Lab :"),
        landmarks: null,
        isAligned: false,
        processing: false
    };

    if (STATE.apiKey) localStorage.setItem('NJ_GEMINI_KEY', STATE.apiKey);

    const dom = {
        v: document.getElementById('v'),
        o: document.getElementById('overlay-canvas'),
        p: document.getElementById('proc-canvas'),
        btn: document.getElementById('main-action'),
        boot: document.getElementById('boot-loader'),
        bootStatus: document.getElementById('boot-status')
    };

    // --- TURBO INITIALIZATION ---
    async function bootSequence() {
        const checkOpenCV = () => new Promise(resolve => {
            if (window.cv && cv.imread) resolve();
            else {
                document.getElementById('opencv-rm').onload = () => resolve();
                // Timeout de sécurité si le CDN est HS
                setTimeout(resolve, 8000); 
            }
        });

        try {
            dom.bootStatus.innerText = "Chargement de la Vision par Ordinateur...";
            await checkOpenCV();
            STATE.cvReady = true;

            dom.bootStatus.innerText = "Synchronisation Biométrique...";
            await initFaceMesh();
            STATE.fmReady = true;

            dom.bootStatus.innerText = "Calibrage Optique...";
            await initCamera();

            // Fin du boot
            dom.boot.classList.add('hidden');
        } catch (e) {
            dom.bootStatus.innerText = "Erreur de boot : " + e.message;
        }
    }

    async function initFaceMesh() {
        const fm = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
        fm.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6 });
        fm.onResults(res => {
            STATE.landmarks = res.multiFaceLandmarks?.[0] || null;
            STATE.isAligned = STATE.landmarks && STATE.landmarks[1].x > 0.35 && STATE.landmarks[1].x < 0.65;
            dom.btn.disabled = !STATE.isAligned || STATE.processing;
            drawUI();
        });
        window.faceMeshEngine = fm; 
    }

    async function initCamera() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 1280, height: 720 } });
        dom.v.srcObject = s;
        return new Promise(res => dom.v.onloadedmetadata = () => {
            renderLoop();
            res();
        });
    }

    function renderLoop() {
        if (dom.v.readyState >= 2) window.faceMeshEngine.send({ image: dom.v });
        requestAnimationFrame(renderLoop);
    }

    function drawUI() {
        const ctx = dom.o.getContext('2d');
        dom.o.width = dom.o.clientWidth; dom.o.height = dom.o.clientHeight;
        if (!STATE.landmarks) return;
        ctx.strokeStyle = STATE.isAligned ? 'rgba(46, 204, 113, 0.4)' : 'rgba(197, 160, 89, 0.2)';
        ctx.lineWidth = 2;
        ctx.strokeRect(dom.o.width*0.25, dom.o.height*0.2, dom.o.width*0.5, dom.o.height*0.6);
    }

    // --- ANALYSE ---
    async function runAnalysis() {
        STATE.processing = true;
        dom.btn.innerText = "CALCUL...";
        
        try {
            const m = await computeMetrics();
            const res = await fetchGemini(m);
            displayResults(m, res);
        } catch (e) { alert(e.message); }
        finally { STATE.processing = false; dom.btn.innerText = "LANCER LE SCAN"; }
    }

    async function computeMetrics() {
        const pCtx = dom.p.getContext('2d');
        dom.p.width = dom.v.videoWidth; dom.p.height = dom.v.videoHeight;
        pCtx.drawImage(dom.v, 0, 0);
        let src = cv.imread(dom.p);
        let res = { redness: 0, texture: 0 };
        // Points : Front, Joues
        [10, 234, 454].forEach(idx => {
            const p = STATE.landmarks[idx];
            let roi = src.roi(new cv.Rect(Math.round(p.x*src.cols-30), Math.round(p.y*src.rows-30), 60, 60));
            let lab = new cv.Mat(); cv.cvtColor(roi, lab, cv.COLOR_RGBA2RGB); cv.cvtColor(lab, lab, cv.COLOR_RGB2Lab);
            let planes = new cv.MatVector(); cv.split(lab, planes);
            res.redness += (cv.mean(planes.get(1))[0] - 128);
            let gray = new cv.Mat(); cv.cvtColor(roi, gray, cv.COLOR_RGBA2GRAY);
            let lap = new cv.Mat(); cv.Laplacian(gray, lap, cv.CV_8U);
            res.texture += cv.mean(lap)[0];
            [roi, lab, planes, gray, lap].forEach(m => m.delete());
        });
        src.delete();
        return { 
            red: Math.round(res.redness/3), 
            tex: Math.round(res.texture/3), 
            score: 100 - Math.round(res.redness/2 + res.texture/4),
            img: dom.p.toDataURL('image/jpeg', 0.6)
        };
    }

    async function fetchGemini(m) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${STATE.apiKey}`;
        const res = await fetch(url, {
            method: 'POST',
            body: JSON.stringify({ contents: [{ parts: [{ text: "Expert Dermato. Analyse Score="+m.score+" JSON: {\"bilan\":\"...\", \"routine\":\"...\"}" }, { inline_data: { mime_type: 'image/jpeg', data: m.img.split(',')[1] } }] }] })
        });
        const d = await res.json();
        return JSON.parse(d.candidates[0].content.parts[0].text.replace(/```json|```/g, ''));
    }

    function displayResults(m, ai) {
        document.getElementById('val-score').innerText = m.score + "%";
        document.getElementById('val-red').innerText = m.red;
        document.getElementById('val-tex').innerText = m.tex;
        document.getElementById('display-area').innerHTML = `
            <div style="padding:20px;">
                <h3 style="color:var(--gold); margin-bottom:10px;">Bilan Elite</h3>
                <p style="margin-bottom:20px;">${ai.bilan}</p>
                <h3 style="color:var(--gold); margin-bottom:10px;">Prescription</h3>
                <p>${ai.routine}</p>
            </div>`;
    }

    return { boot: bootSequence, runAnalysis, share: () => alert("Rapport prêt pour partage.") };
})();

window.onload = AppCore.boot;
</script>
</body>
</html>
