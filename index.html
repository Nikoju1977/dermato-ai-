<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DERMA LÉGENDE X-PRO | EXPERT PDF</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript" onload="onOpenCvReady();"></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --gold: #d4af37; --neon: #00f2ff; --crimson: #ff1f1f; --toxic: #39ff14;
            --bg: #050505; --surface: #0f0f0f;
        }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; 
            margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
        }

        #vision-sector { flex: 1; position: relative; overflow: hidden; background: #000; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #ar-canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 5; pointer-events: none; transform: scaleX(-1); visibility: hidden; }
        
        .zone-marker {
            position: absolute; border: 1px solid var(--neon); background: rgba(0,242,255,0.05);
            pointer-events: none; z-index: 10; display: none; flex-direction: column; align-items: center;
        }
        .zone-label { font-family: 'Orbitron'; font-size: 8px; color: var(--neon); background: #000; padding: 2px 5px; margin-top: -18px; border: 1px solid var(--neon); }

        .ui-panel { background: var(--surface); padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); z-index: 20; border-top: 1px solid #333; }
        .agent-status { display: flex; gap: 10px; margin-bottom: 15px; }
        .agent-box { flex: 1; padding: 12px; border: 1px solid #222; font-size: 9px; font-family: 'Orbitron'; color: #444; text-align: center; text-transform: uppercase; }
        .active-dermato { border-color: var(--crimson); color: var(--crimson); background: rgba(255,31,31,0.05); }
        .active-cosmo { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.05); }

        .btn-core {
            width: 100%; padding: 18px; background: none; border: 1px solid var(--gold);
            color: var(--gold); font-family: 'Orbitron'; font-size: 11px; cursor: pointer;
            letter-spacing: 2px; text-transform: uppercase; outline: none;
        }

        .overlay { position: fixed; inset: 0; background: rgba(5,5,5,0.98); z-index: 100; display: none; flex-direction: column; padding: 30px 20px; overflow-y: auto; }
        .report-box { background: #111; padding: 20px; border-left: 4px solid var(--gold); margin: 20px 0; line-height: 1.6; font-size: 14px; color: #ddd; }
        
        #boot-loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: var(--toxic); top: 0; z-index: 15; box-shadow: 0 0 20px var(--toxic); display: none; }
        @keyframes scanMove { 0% { top: 0; } 100% { top: 100%; } }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="boot-loader">
    <div style="width:40px; height:40px; border:2px solid var(--gold); border-top-color:transparent; border-radius:50%; animation:spin 1s linear infinite;"></div>
    <p style="font-family:'Orbitron'; font-size:10px; color:var(--gold); margin-top:20px; letter-spacing:2px;">INIT_XPRO_REPORT_ENGINE...</p>
</div>

<section id="vision-sector">
    <div id="scanner-line" class="scan-line"></div>
    <video id="video" playsinline muted autoplay></video>
    <canvas id="ar-canvas"></canvas>
    <div id="z-front" class="zone-marker"><span class="zone-label">FRONT</span></div>
    <div id="z-tzone" class="zone-marker"><span class="zone-label">ZONE_T</span></div>
    <div id="z-joue" class="zone-marker"><span class="zone-label">JOUE</span></div>
</section>

<section class="ui-panel">
    <div class="agent-status">
        <div id="box-dermato" class="agent-box">AGENT_DERMATO</div>
        <div id="box-cosmo" class="agent-box">AGENT_COSMO</div>
    </div>
    <button id="scan-btn" class="btn-core" disabled>Initialisation...</button>
</section>

<div id="results-overlay" class="overlay">
    <h1 style="font-family:'Orbitron'; color:var(--gold); font-size:18px; letter-spacing:2px;">RAPPORT DERMA LÉGENDE X-PRO</h1>
    <div style="margin: 15px 0;">
        <span id="res-score" style="font-family:'Orbitron'; font-size:50px; color:var(--toxic);">--%</span>
        <div style="font-size:10px; color:#555;">VITALITÉ CUTANÉE GLOBALE</div>
    </div>
    
    <div id="mistral-report" class="report-box">
        <p style="text-align:center;">Analyse intelligente en cours...</p>
    </div>

    <button onclick="generateExpertPDF()" class="btn-core" style="border-color:var(--toxic); color:var(--toxic); margin-bottom:10px;">Télécharger l'Expertise PDF</button>
    <button onclick="location.reload()" class="btn-core" style="border-color:#333; color:#555;">Nouveau Diagnostic</button>
</div>

<script>
    const MISTRAL_API_KEY = "TA_CLE_MISTRAL"; // <-- TA CLÉ MISTRAL ICI

    const state = {
        metrics: { front: 0, cheeks: 0, tzone: 0, final: 0 },
        landmarks: null,
        audioUnlocked: false,
        iaText: ""
    };

    const video = document.getElementById('video');
    const canvas = document.getElementById('ar-canvas');
    const ctx = canvas.getContext('2d');

    function agentSpeak(agent, message) {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const s = new SpeechSynthesisUtterance(message);
        s.lang = 'fr-FR';
        s.pitch = agent === 'dermato' ? 0.8 : 1.1;
        window.speechSynthesis.speak(s);
        document.getElementById('box-dermato').classList.toggle('active-dermato', agent === 'dermato');
        document.getElementById('box-cosmo').classList.toggle('active-cosmo', agent === 'cosmo');
    }

    async function initVision() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            
            const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.7 });
            
            faceMesh.onResults(results => {
                if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    state.landmarks = results.multiFaceLandmarks[0];
                    updateHUD();
                    if(document.getElementById('boot-loader').style.display !== 'none') {
                        document.getElementById('boot-loader').style.display = 'none';
                        document.getElementById('scan-btn').disabled = false;
                        document.getElementById('scan-btn').innerText = "Démarrer Expertise";
                    }
                }
            });

            const camera = new Camera(video, {
                onFrame: async () => { await faceMesh.send({image: video}); },
                width: 1280, height: 720
            });
            camera.start();
        } catch (e) { alert("Accès caméra requis."); }
    }

    function updateHUD() {
        const move = (id, pt) => {
            const el = document.getElementById(id);
            el.style.display = 'flex';
            el.style.left = `${pt.x * 100}%`; el.style.top = `${pt.y * 100}%`;
        };
        move('z-front', state.landmarks[10]);
        move('z-joue', state.landmarks[234]);
        move('z-tzone', state.landmarks[1]);
    }

    async function runDiagnostic() {
        if(!state.audioUnlocked) { agentSpeak('dermato', "Lancement de la spectrométrie."); state.audioUnlocked = true; }
        
        const scanLine = document.getElementById('scanner-line');
        scanLine.style.display = "block";
        scanLine.style.animation = "scanMove 2.5s infinite linear";
        
        setTimeout(async () => {
            await analyzeZones();
            scanLine.style.display = "none";
            document.getElementById('results-overlay').style.display = "flex";
            await fetchMistralExpertise();
        }, 2600);
    }

    async function analyzeZones() {
        canvas.width = 640; canvas.height = 480;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        let src = cv.imread(canvas);
        
        const getRedness = (pt) => {
            let rect = new cv.Rect(Math.max(0, pt.x * canvas.width - 25), Math.max(0, pt.y * canvas.height - 25), 50, 50);
            let roi = src.roi(rect);
            let lab = new cv.Mat();
            cv.cvtColor(roi, lab, cv.COLOR_RGBA2RGB);
            cv.cvtColor(lab, lab, cv.COLOR_RGB2Lab);
            let planes = new cv.MatVector();
            cv.split(lab, planes);
            let val = Math.round(cv.mean(planes.get(1))[0] - 128);
            roi.delete(); lab.delete(); planes.delete();
            return val;
        };

        state.metrics.cheeks = getRedness(state.landmarks[234]);
        state.metrics.front = getRedness(state.landmarks[10]);
        state.metrics.tzone = getRedness(state.landmarks[1]);
        state.metrics.final = Math.max(0, 100 - (state.metrics.cheeks * 2));
        
        document.getElementById('res-score').innerText = state.metrics.final + "%";
        src.delete();
    }

    async function fetchMistralExpertise() {
        agentSpeak('cosmo', "Génération du rapport multimodal par Mistral.");
        const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

        const prompt = `Expertise Derma X-PRO. Zones : Joues(Rougeur:${state.metrics.cheeks}), Front(Rougeur:${state.metrics.front}). 
        1. Donne un diagnostic par zone. 
        2. Routine MATIN et SOIR complète. 
        3. Propose des produits précis (ex: Sérum Niacinamide, Crème Barrière) et EXPLIQUE pourquoi ils amélioreront la peau de cet utilisateur précisément. 
        Format : Utilisez des balises <b> pour les titres.`;

        try {
            const res = await fetch("https://api.mistral.ai/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${MISTRAL_API_KEY}` },
                body: JSON.stringify({
                    model: "pixtral-12b-2409",
                    messages: [{ role: "user", content: [
                        { type: "text", text: prompt },
                        { type: "image_url", image_url: `data:image/jpeg;base64,${base64}` }
                    ]}]
                })
            });
            const data = await res.json();
            state.iaText = data.choices[0].message.content;
            document.getElementById('mistral-report').innerHTML = state.iaText.replace(/\n/g, '<br>');
            agentSpeak('cosmo', "Rapport d'expertise finalisé.");
        } catch (err) {
            document.getElementById('mistral-report').innerText = "Erreur API.";
        }
    }

    /**
     * GÉNÉRATION PDF EXPERT (jsPDF)
     */
    function generateExpertPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const gold = [212, 175, 55];
        
        // Header
        doc.setFillColor(15, 15, 15); doc.rect(0, 0, 210, 297, 'F');
        doc.setTextColor(gold[0], gold[1], gold[2]);
        doc.setFont("helvetica", "bold"); doc.setFontSize(22);
        doc.text("DERMA LÉGENDE X-PRO", 20, 25);
        
        doc.setTextColor(255, 255, 255); doc.setFontSize(10);
        doc.text("RAPPORT D'EXPERTISE BIOMÉTRIQUE ET MOLÉCULAIRE", 20, 32);
        doc.text(`DATE : ${new Date().toLocaleDateString()}`, 150, 25);

        // Score Section
        doc.setDrawColor(gold[0], gold[1], gold[2]); doc.line(20, 40, 190, 40);
        doc.setFontSize(14); doc.text("SCORE DE SANTÉ : " + state.metrics.final + "%", 20, 52);
        
        // Barre de score visuelle
        doc.setFillColor(40, 40, 40); doc.rect(100, 46, 80, 6, 'F');
        const scoreWidth = (state.metrics.final / 100) * 80;
        doc.setFillColor(57, 255, 20); doc.rect(100, 46, scoreWidth, 6, 'F');

        // Analyse par Zones
        doc.setTextColor(gold[0], gold[1], gold[2]); doc.setFontSize(12);
        doc.text("ANALYSE SEGMENTÉE", 20, 70);
        doc.setTextColor(200, 200, 200); doc.setFontSize(10);
        doc.text(`ZONE JOUES : Erythème ${state.metrics.cheeks}`, 25, 80);
        doc.text(`ZONE FRONT : Erythème ${state.metrics.front}`, 25, 87);
        doc.text(`ZONE T : Erythème ${state.metrics.tzone}`, 25, 94);

        // IA Expertise
        doc.setTextColor(gold[0], gold[1], gold[2]); doc.text("DIAGNOSTIC ET ROUTINE PERSONNALISÉE", 20, 110);
        doc.setTextColor(255, 255, 255);
        
        const iaLines = doc.splitTextToSize(state.iaText.replace(/<b>|<\/b>/g, ""), 170);
        doc.setFontSize(9);
        doc.text(iaLines, 20, 120);

        // Footer
        doc.setTextColor(100, 100, 100); doc.setFontSize(8);
        doc.text("Ce document est généré par une IA. Consultez un dermatologue pour un avis médical.", 20, 285);
        
        doc.save(`Expertise_DermaXPro_${Date.now()}.pdf`);
    }

    function onOpenCvReady() { initVision(); }
    document.getElementById('scan-btn').onclick = runDiagnostic;
</script>
</body>
</html>
