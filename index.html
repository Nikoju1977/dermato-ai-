<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>PureSkin AI | Version Finale</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript" onload="AppCore.onOpenCvReady();"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <style>
        /* === Styles de base === */
        :root { --primary: #00e5ff; --accent: #00ff88; --bg: #050914; --surface: #111a2e; --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .logo { font-weight: 800; font-size: 1.2rem; text-transform: uppercase; letter-spacing: -1px; }
        .logo span { color: var(--primary); }
        .status-tag { padding: 4px 10px; border-radius: 8px; font-size: 0.55rem; font-weight: 800; text-transform: uppercase; border: 1px solid var(--accent); color: var(--accent); background: rgba(0, 255, 136, 0.05); }
        .status-tag.error { border-color: #ff3366; color: #ff3366; background: rgba(255, 51, 102, 0.05); }

        /* === Zone Caméra === */
        #viewport { position: relative; height: 35vh; margin: 0 15px; border-radius: 24px; overflow: hidden; border: 1px solid var(--border); background: #000; }
        video, #overlay-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: var(--primary); top: 0; z-index: 15; box-shadow: 0 0 20px var(--primary); display: none; }
        .mirror-mode { transform: scaleX(-1); }
        .cam-switch-btn { position: absolute; top: 15px; right: 15px; background: rgba(17, 26, 46, 0.8); border: 1px solid var(--border); border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; z-index: 20; cursor: pointer; backdrop-filter: blur(5px); font-size: 1.2rem;}

        /* === KPIs === */
        .kpi-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 15px; }
        .kpi-card { background: var(--surface); padding: 12px 5px; border-radius: 16px; border: 1px solid var(--border); text-align: center; }
        .kpi-card.active { border-color: var(--primary); box-shadow: 0 0 15px rgba(0,229,255,0.1); }
        .kpi-val { font-size: 0.9rem; font-weight: 800; color: var(--primary); display: block; }
        .kpi-lab { font-size: 0.45rem; color: #8b9bb4; text-transform: uppercase; font-weight: 800; margin-top: 4px;}

        /* === Zone Contenu & Onglets === */
        .main-card { flex: 1; margin: 0 15px 15px; background: var(--surface); border-radius: 28px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .tabs { display: flex; background: rgba(0,0,0,0.3); padding: 6px; overflow-x: auto;}
        .tab { flex: 1; padding: 12px 5px; border: none; background: transparent; color: #8b9bb4; font-size: 0.60rem; font-weight: 800; text-transform: uppercase; border-radius: 14px; cursor: pointer; min-width: 70px; text-align: center;}
        .tab.active { background: var(--primary); color: #000; }

        #content { flex: 1; overflow-y: auto; padding: 20px; font-size: 0.85rem; line-height: 1.5; color: #cbd5e1; }
        .report-section { margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .report-section b { color: var(--primary); font-family: 'Orbitron'; font-size: 0.7rem; display: block; margin-bottom: 8px; }
        .report-section ul { padding-left: 20px; margin-top: 10px; }
        .report-section li { margin-bottom: 8px; color: #e2e8f0; }

        /* === Setup API === */
        .api-setup { padding: 15px; margin: 0 15px 15px; background: rgba(0, 0, 0, 0.4); border-radius: 20px; border: 1px dashed var(--accent); display: flex; gap: 10px; }
        .api-setup input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: #fff; font-family: 'Orbitron', monospace; font-size: 0.8rem;}
        .api-setup button { padding: 0 15px; border-radius: 12px; background: var(--accent); border: none; font-weight: 800; cursor: pointer; color: #000; font-size: 0.7rem; text-transform: uppercase;}

        /* === Boutons d'action === */
        .bottom-bar { padding: 15px 20px 30px; background: rgba(10,15,28,0.98); display: flex; gap: 12px; }
        .btn { height: 60px; border-radius: 20px; border: none; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }
        .btn-main { flex: 1; background: var(--primary); color: #000; text-transform: uppercase; letter-spacing: 1px; font-size: 0.80rem;}
        .btn-main:disabled { background: #334155; color: #94a3b8; cursor: not-allowed; }
        .btn-icon { width: 60px; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); font-size: 1.2rem; }

        /* === Animations & Graphiques === */
        .loader { position: absolute; inset: 0; background: var(--surface); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(0,229,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes scanAnim { 0% { top: 0; opacity: 1;} 50% {opacity: 0.5;} 100% { top: 100%; opacity: 1;} }
        #historyChartContainer { position: relative; height: 200px; width: 100%; }
    </style>
</head>
<body>

    <header>
        <div class="logo">PureSkin <span>AI</span></div>
        <div id="sys-status" class="status-tag">Initialisation...</div>
    </header>

    <div id="viewport">
        <button class="cam-switch-btn" onclick="AppCore.toggleCamera()" title="Changer de caméra">🔄</button>
        <div id="scan-line" class="scan-line"></div>
        <video id="v" class="mirror-mode" autoplay playsinline muted></video>
        <canvas id="overlay-canvas" class="mirror-mode"></canvas>
    </div>

    <div class="kpi-container">
        <div class="kpi-card" id="card-score"><span class="kpi-val" id="val-score">--</span><span class="kpi-lab">Santé</span></div>
        <div class="kpi-card" id="card-red"><span class="kpi-val" id="val-red">--</span><span class="kpi-lab">Rougeur</span></div>
        <div class="kpi-card" id="card-tex"><span class="kpi-val" id="val-tex">--</span><span class="kpi-lab">Texture</span></div>
        <div class="kpi-card" id="card-ita"><span class="kpi-val" id="val-ita">--</span><span class="kpi-lab">ITA°</span></div>
    </div>

    <div id="api-setup" class="api-setup">
        <input type="password" id="mistral-key-input" placeholder="Clé API Mistral (sk-...)">
        <button onclick="AppCore.saveApiKey()">Lier</button>
    </div>

    <div class="main-card">
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p id="loader-text" style="margin-top:15px; font-size:0.6rem; color:var(--primary); font-weight:800; letter-spacing:1px;">ACQUISITION EN COURS...</p>
        </div>
        <div class="tabs">
            <button class="tab active" onclick="AppCore.switchTab('lab')">🔬 Lab</button>
            <button class="tab" onclick="AppCore.switchTab('diag')">⚕️ Diag</button>
            <button class="tab" onclick="AppCore.switchTab('routine')">🧪 Routine</button>
            <button class="tab" onclick="AppCore.switchTab('history')">📈 Évol.</button>
        </div>
        <div id="content">
            <div style="text-align:center; padding-top:40px; color:#475569; font-size:0.75rem;">
                Alignez votre visage dans le cadre.<br>Assurez-vous d'avoir lié votre clé API Mistral.
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn btn-icon" onclick="AppCore.shareScore()" title="Partager mon score">📤</button>
        <button class="btn btn-main" id="main-action" onclick="AppCore.runGlobalAnalysis()" disabled>Lancer l'Analyse</button>
        <button class="btn btn-icon" onclick="AppCore.exportPDF()" title="Exporter en PDF">📄</button>
    </div>

    <canvas id="proc-canvas" style="display:none;"></canvas>

    <script>
        const AppCore = (function() {
            const STORAGE_KEY = "PURESKIN_MISTRAL_KEY_V1";
            const HISTORY_KEY = "PURESKIN_HISTORY_V1";
            let chartInstance = null;

            // Variables d'état
            const state = { 
                landmarks: null, cvReady: false, analysisData: null, 
                currentTab: 'lab', videoWidth: 0, videoHeight: 0, 
                isProcessingFrame: false, facingMode: 'user', frameLoopId: null,
                audioUnlocked: false, // Gestion de la voix
                history: JSON.parse(localStorage.getItem(HISTORY_KEY)) || []
            };

            const dom = {
                v: document.getElementById('v'),
                o: document.getElementById('overlay-canvas'),
                oCtx: document.getElementById('overlay-canvas').getContext('2d'),
                p: document.getElementById('proc-canvas'),
                pCtx: document.getElementById('proc-canvas').getContext('2d'),
                loader: document.getElementById('loader'),
                loaderText: document.getElementById('loader-text'),
                mainBtn: document.getElementById('main-action'),
                content: document.getElementById('content'),
                sysStatus: document.getElementById('sys-status'),
                apiSetup: document.getElementById('api-setup'),
                apiInput: document.getElementById('mistral-key-input'),
                kpi: { score: document.getElementById('val-score'), red: document.getElementById('val-red'), tex: document.getElementById('val-tex'), ita: document.getElementById('val-ita') }
            };

            // === 1. Initialisation IA Vision Edge (MediaPipe) ===
            const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
            faceMesh.onResults(res => { state.landmarks = res.multiFaceLandmarks?.[0] || null; drawHUD(); });

            async function onOpenCvReady() {
                state.cvReady = true;
                dom.sysStatus.innerText = "MOTEUR PRÊT";
                if (localStorage.getItem(STORAGE_KEY)) {
                    dom.apiSetup.style.display = 'none';
                    dom.sysStatus.innerText = "CLÉ LIÉE";
                    dom.sysStatus.style.color = "var(--accent)"; dom.sysStatus.style.borderColor = "var(--accent)";
                }
                initCamera();
            }

            // === 2. Gestion de la Caméra (Avec correctif Cross-Platform) ===
            async function initCamera() {
                if (dom.v.srcObject) dom.v.srcObject.getTracks().forEach(t => t.stop());
                
                // Nettoyage de l'ancienne boucle
                if (state.frameLoopId) {
                    if ('cancelVideoFrameCallback' in dom.v) {
                        dom.v.cancelVideoFrameCallback(state.frameLoopId);
                    } else {
                        cancelAnimationFrame(state.frameLoopId);
                    }
                }

                if (state.facingMode === 'user') { dom.v.classList.add('mirror-mode'); dom.o.classList.add('mirror-mode'); } 
                else { dom.v.classList.remove('mirror-mode'); dom.o.classList.remove('mirror-mode'); }

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: state.facingMode, width: { ideal: 1280 }, height: { ideal: 720 } } });
                    dom.v.srcObject = stream;
                    dom.v.onloadedmetadata = () => {
                        state.videoWidth = dom.v.videoWidth; state.videoHeight = dom.v.videoHeight;
                        dom.p.width = state.videoWidth; dom.p.height = state.videoHeight;
                        dom.mainBtn.disabled = false;
                        
                        // Déclenchement de la boucle sécurisée
                        if ('requestVideoFrameCallback' in dom.v) {
                            state.frameLoopId = dom.v.requestVideoFrameCallback(processVideoFrame);
                        } else {
                            state.frameLoopId = requestAnimationFrame(processVideoFrame);
                        }
                    };
                } catch (e) { 
                    dom.sysStatus.classList.add('error'); dom.sysStatus.innerText = "ERREUR CAMÉRA"; 
                }
            }

            async function processVideoFrame() {
                if (state.cvReady && !state.isProcessingFrame && dom.v.readyState === dom.v.HAVE_ENOUGH_DATA) {
                    state.isProcessingFrame = true;
                    try { await faceMesh.send({image: dom.v}); } catch (e) {}
                    state.isProcessingFrame = false;
                }
                
                // Relance de la boucle sécurisée
                if ('requestVideoFrameCallback' in dom.v) {
                    state.frameLoopId = dom.v.requestVideoFrameCallback(processVideoFrame);
                } else {
                    state.frameLoopId = requestAnimationFrame(processVideoFrame);
                }
            }

            function drawHUD() {
                dom.o.width = dom.v.clientWidth; dom.o.height = dom.v.clientHeight;
                dom.oCtx.clearRect(0,0,dom.o.width, dom.o.height);
                if (state.landmarks) {
                    dom.oCtx.strokeStyle = "rgba(0, 229, 255, 0.6)"; dom.oCtx.lineWidth = 1.5;
                    const leftCheek = state.landmarks[234], rightCheek = state.landmarks[454];
                    dom.oCtx.beginPath();
                    dom.oCtx.arc(leftCheek.x * dom.o.width, leftCheek.y * dom.o.height, 5, 0, 2*Math.PI);
                    dom.oCtx.arc(rightCheek.x * dom.o.width, rightCheek.y * dom.o.height, 5, 0, 2*Math.PI);
                    dom.oCtx.stroke();
                }
            }

            // === 3. Fonctions Vocales ===
            function toggleAudio() { 
                // Débloque l'audio sur mobile suite à l'interaction utilisateur
                window.speechSynthesis.speak(new SpeechSynthesisUtterance("")); 
            }

            function agentSpeak(txt) {
                // Annule la lecture en cours s'il y en a une
                window.speechSynthesis.cancel();
                // Nettoie le texte HTML (enlève les balises <b>, <ul>, etc.)
                const cleanText = txt.replace(/<[^>]*>?/gm, ''); 
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'fr-FR';
                utterance.rate = 1.0;
                window.speechSynthesis.speak(utterance);
            }

            // === 4. Processus Principal ===
            function formatLLMText(text) {
                if(!text) return "";
                return text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
            }

            async function runGlobalAnalysis() {
                const apiKey = localStorage.getItem(STORAGE_KEY);
                if (!apiKey) return alert("Veuillez d'abord lier votre clé API Mistral.");
                if (!state.landmarks) return alert("Visage non détecté. Placez le visage dans le cadre.");

                // Activation de la voix au clic
                if (!state.audioUnlocked) { toggleAudio(); state.audioUnlocked = true; }

                dom.loader.style.display = 'flex';
                document.getElementById('scan-line').style.display = 'block';
                document.getElementById('scan-line').style.animation = 'scanAnim 1.5s infinite';
                dom.loaderText.innerText = "TRAITEMENT EDGE (OPENCV)...";

                try {
                    const metrics = await processOpenCV();
                    dom.loaderText.innerText = "INFÉRENCE IA (MISTRAL VISION)...";
                    const aiExpertise = await fetchMistral(metrics, apiKey);
                    
                    state.analysisData = { ...metrics, ai: {
                        bilan: formatLLMText(aiExpertise.bilan),
                        routine_matin: formatLLMText(aiExpertise.routine_matin),
                        routine_soir: formatLLMText(aiExpertise.routine_soir)
                    }};
                    
                    saveToHistory(metrics.score);
                    updateKPIs(); 
                    switchTab('diag'); 
                    
                    // L'assistant lit le bilan
                    agentSpeak("Analyse terminée. Voici le bilan clinique : " + state.analysisData.ai.bilan);

                } catch(e) {
                    console.error(e); alert(e.message || "Erreur d'analyse.");
                } finally {
                    dom.loader.style.display = 'none'; document.getElementById('scan-line').style.display = 'none';
                }
            }

            async function processOpenCV() {
                dom.pCtx.drawImage(dom.v, 0, 0, state.videoWidth, state.videoHeight);
                let src = cv.imread(dom.p);
                let roi, lab, gray, lap, planes;
                
                try {
                    const leftEye = state.landmarks[33], rightEye = state.landmarks[263];
                    const pixelDist = Math.sqrt(Math.pow(rightEye.x - leftEye.x, 2) + Math.pow(rightEye.y - leftEye.y, 2)) * state.videoWidth;
                    const sampleSize = Math.max(20, Math.floor(pixelDist * 0.2));
                    
                    const cheekX = Math.floor(state.landmarks[234].x * state.videoWidth);
                    const cheekY = Math.floor(state.landmarks[234].y * state.videoHeight);
                    
                    const rectX = Math.max(0, Math.min(cheekX - Math.floor(sampleSize/2), state.videoWidth - sampleSize));
                    const rectY = Math.max(0, Math.min(cheekY - Math.floor(sampleSize/2), state.videoHeight - sampleSize));
                    const rectW = Math.min(sampleSize, state.videoWidth - rectX);
                    const rectH = Math.min(sampleSize, state.videoHeight - rectY);

                    roi = src.roi(new cv.Rect(rectX, rectY, rectW, rectH));
                    
                    lab = new cv.Mat(); cv.cvtColor(roi, lab, cv.COLOR_RGBA2RGB); cv.cvtColor(lab, lab, cv.COLOR_RGB2Lab);
                    planes = new cv.MatVector(); cv.split(lab, planes);
                    
                    let L_chan = cv.mean(planes.get(0))[0];
                    let a_chan = cv.mean(planes.get(1))[0] - 128; 
                    let b_chan = cv.mean(planes.get(2))[0] - 128; 
                    let ita = (Math.atan2(L_chan - 50, b_chan) * (180 / Math.PI)).toFixed(1);

                    gray = new cv.Mat(); cv.cvtColor(roi, gray, cv.COLOR_RGBA2GRAY);
                    lap = new cv.Mat(); cv.Laplacian(gray, lap, cv.CV_8U);
                    let textureMean = cv.mean(lap)[0];

                    const rednessScore = Math.min(100, Math.max(0, Math.round(a_chan * 3)));
                    const textureScore = Math.min(100, Math.round(textureMean * 4));
                    const globalScore = Math.max(0, Math.round(100 - (rednessScore * 0.6 + textureScore * 0.4)));

                    return { redness: rednessScore, texture: textureScore, ita: ita, score: globalScore, imgBase64: dom.p.toDataURL('image/jpeg', 0.8) };
                } finally {
                    if(src) src.delete(); if(roi) roi.delete(); if(lab) lab.delete(); 
                    if(gray) gray.delete(); if(lap) lap.delete(); if(planes) planes.delete();
                }
            }

            async function fetchMistral(metrics, apiKey) {
                const base64Clean = metrics.imgBase64.split(',')[1];
                const systemPrompt = `Tu es un Dermatologue IA. Analyse l'image et ces biométriques : Score=${metrics.score}/100, Rougeur=${metrics.redness}/100, Texture=${metrics.texture}/100, ITA=${metrics.ita}°. Rends UNIQUEMENT un JSON : {"bilan": "Texte court", "routine_matin": "<ul><li>...</li></ul>", "routine_soir": "<ul><li>...</li></ul>"}`;

                const res = await fetch("https://api.mistral.ai/v1/chat/completions", {
                    method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
                    body: JSON.stringify({ 
                        model: "pixtral-12b-2409", response_format: { type: "json_object" }, 
                        messages: [{ role: "system", content: systemPrompt }, { role: "user", content: [{ type: "image_url", image_url: `data:image/jpeg;base64,${base64Clean}` }] }] 
                    })
                });
                
                const jsonRes = await res.json();
                if(jsonRes.error) throw new Error(jsonRes.error.message);
                return JSON.parse(jsonRes.choices[0].message.content);
            }

            // === 5. Interface, Historique et Exports ===
            function saveToHistory(score) {
                const today = new Date().toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', hour: '2-digit', minute:'2-digit' });
                state.history.push({ date: today, score: score });
                if(state.history.length > 10) state.history.shift();
                localStorage.setItem(HISTORY_KEY, JSON.stringify(state.history));
            }

            function updateKPIs() {
                const d = state.analysisData;
                dom.kpi.score.innerText = d.score + "%"; dom.kpi.red.innerText = d.redness; dom.kpi.tex.innerText = d.texture; dom.kpi.ita.innerText = d.ita + "°";
                Object.values(dom.kpi).forEach(k => k.parentElement.classList.add('active'));
            }

            function switchTab(t) {
                state.currentTab = t;
                document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.getAttribute('onclick').includes(t)));
                
                if (t === 'history') { renderHistoryTab(); return; }
                if (!state.analysisData) return;
                
                const ai = state.analysisData.ai;
                if (t === 'lab') { dom.content.innerHTML = `<div class="report-section"><b>SCAN MULTISPECTRAL</b><img src="${state.analysisData.imgBase64}" style="width:100%; border-radius:20px; border:1px solid var(--primary); filter: saturate(1.4) contrast(1.1);"><p style="font-size:0.6rem; color:#64748b; margin-top:10px; text-align:center;">Traitement Edge Computing Local</p></div>`; } 
                else if (t === 'diag') { dom.content.innerHTML = `<div class="report-section"><b>BILAN CLINIQUE IA</b><p>${ai.bilan}</p></div>`; } 
                else if (t === 'routine') { dom.content.innerHTML = `<div class="report-section"><b>☀️ PROTOCOLE MATIN</b>${ai.routine_matin}</div><div class="report-section"><b>🌙 PROTOCOLE SOIR</b>${ai.routine_soir}</div>`; }
            }

            function renderHistoryTab() {
                if (state.history.length === 0) {
                    dom.content.innerHTML = `<div style="text-align:center; padding-top:40px; color:#475569;">Aucun historique. Lancez une analyse.</div>`; return;
                }
                dom.content.innerHTML = `<div class="report-section"><b>ÉVOLUTION DE LA SANTÉ (%)</b><div id="historyChartContainer"><canvas id="historyChart"></canvas></div></div>`;
                const ctx = document.getElementById('historyChart').getContext('2d');
                if (chartInstance) chartInstance.destroy();

                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: state.history.map(h => h.date),
                        datasets: [{
                            label: 'Score global', data: state.history.map(h => h.score),
                            borderColor: '#00e5ff', backgroundColor: 'rgba(0, 229, 255, 0.1)',
                            borderWidth: 2, pointBackgroundColor: '#00ff88', pointRadius: 4, fill: true, tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true, max: 100, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b9bb4' } }, x: { grid: { display: false }, ticks: { color: '#8b9bb4', maxRotation: 45, minRotation: 45 } } }
                    }
                });
            }

            function exportPDF() {
                if (!state.analysisData) return alert("Veuillez lancer une analyse d'abord.");
                const { jsPDF } = window.jspdf; const doc = new jsPDF();
                
                doc.setFillColor(5, 9, 20); doc.rect(0,0,210,40,'F'); 
                doc.setTextColor(0, 229, 255); doc.setFontSize(20); doc.text("PURESKIN AI - RAPPORT", 20, 25);
                doc.addImage(state.analysisData.imgBase64, 'JPEG', 150, 45, 40, 40);
                
                doc.setTextColor(0,0,0); doc.setFontSize(12);
                doc.text(`Score de santé: ${state.analysisData.score}% | ITA°: ${state.analysisData.ita}`, 20, 55);
                doc.text(`Rougeur: ${state.analysisData.redness} | Texture: ${state.analysisData.texture}`, 20, 65);
                
                const cleanText = (html) => { const t = document.createElement("div"); t.innerHTML = html; return t.textContent || t.innerText || ""; };
                doc.setFontSize(14); doc.setTextColor(0, 150, 255); doc.text("Bilan Clinique", 20, 85);
                doc.setFontSize(10); doc.setTextColor(50,50,50); doc.text(doc.splitTextToSize(cleanText(state.analysisData.ai.bilan), 170), 20, 95);
                
                doc.save(`PureSkin_Report_${Date.now()}.pdf`);
            }

            // Fonction de partage natif
            function shareScore() {
                if (!state.analysisData) return alert("Lancez une analyse avant de partager !");
                if (navigator.share) {
                    navigator.share({
                        title: 'Mon score PureSkin AI',
                        text: `J'ai obtenu un score de santé de la peau de ${state.analysisData.score}% avec PureSkin AI ! Bilan : ${state.analysisData.ai.bilan.replace(/<[^>]*>?/gm, '')}`,
                        url: window.location.href // Partage le lien de ton GitHub Pages
                    }).catch(console.error);
                } else {
                    alert("Le partage n'est pas supporté sur ce navigateur.");
                }
            }

            return { 
                onOpenCvReady, 
                toggleCamera: () => { state.facingMode = state.facingMode === 'user' ? 'environment' : 'user'; initCamera(); },
                saveApiKey: () => { 
                    const key = dom.apiInput.value.trim();
                    if(key.startsWith("sk-")) {
                        localStorage.setItem(STORAGE_KEY, key); dom.apiSetup.style.display = 'none';
                        dom.sysStatus.innerText = "CLÉ LIÉE"; dom.sysStatus.style.color = "var(--accent)"; dom.sysStatus.style.borderColor = "var(--accent)";
                    } else alert("Format de clé invalide.");
                },
                clearApiKey: () => { 
                    if(confirm("Supprimer la clé API Mistral (historique préservé) ?")) { localStorage.removeItem(STORAGE_KEY); location.reload(); }
                },
                runGlobalAnalysis, switchTab, exportPDF, shareScore
            };
        })();
    </script>
</body>
</html>
