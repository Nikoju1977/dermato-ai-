<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PureSkin AI | Cabinet Nicolas Julienne</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript" onload="AppCore.onOpenCvReady();"></script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Plus+Jakarta+Sans:wght@200;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #c5a059; --bg: #050505; --surface: #0f0f0f; --border: rgba(197, 160, 89, 0.15); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        header { padding: 45px 30px 20px; border-bottom: 0.5px solid var(--border); }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; letter-spacing: 3px; font-weight: 400; }
        .logo span { color: var(--gold); }
        .architect { font-size: 0.5rem; text-transform: uppercase; letter-spacing: 5px; color: var(--gold); margin-top: 12px; opacity: 0.7; font-weight: 600; }
        
        #viewport { position: relative; height: 35vh; margin: 20px; border: 0.5px solid var(--border); background: #000; border-radius: 4px; overflow: hidden; }
        .reticle-scope { position: absolute; inset: 0; pointer-events: none; z-index: 10; border: 40px solid rgba(0,0,0,0.3); }
        .reticle-scope::after { content: ''; position: absolute; top: 50%; left: 50%; width: 120px; height: 120px; border: 0.5px solid var(--gold); transform: translate(-50%, -50%); opacity: 0.3; }

        video, #overlay-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .scan-laser { position: absolute; width: 100%; height: 1px; background: var(--gold); z-index: 15; box-shadow: 0 0 20px var(--gold); display: none; opacity: 0.6; }
        
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); margin: 0 20px 20px; border: 0.5px solid var(--border); }
        .metric-card { background: var(--bg); padding: 22px 5px; text-align: center; }
        .metric-val { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--gold); letter-spacing: 1px; }
        .metric-lab { font-size: 0.4rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; font-weight: 700; }

        .analysis-card { flex: 1; background: var(--surface); display: flex; flex-direction: column; border-top: 0.5px solid var(--border); overflow: hidden; }
        .nav-tabs { display: flex; border-bottom: 0.5px solid var(--border); background: #000; }
        .nav-link { flex: 1; padding: 22px 0; border: none; background: transparent; color: #444; font-size: 0.55rem; font-weight: 700; text-transform: uppercase; cursor: pointer; letter-spacing: 3px; transition: 0.4s; }
        .nav-link.active { color: var(--gold); background: rgba(197, 160, 89, 0.02); border-bottom: 2px solid var(--gold); }

        #display-area { flex: 1; overflow-y: auto; padding: 40px 25px; line-height: 1.9; color: #bbb; font-size: 0.85rem; }
        .expert-block { margin-bottom: 40px; border-left: 1px solid var(--gold); padding-left: 25px; }
        .expert-block b { color: var(--gold); font-family: 'Playfair Display', serif; font-size: 1.1rem; display: block; margin-bottom: 15px; font-weight: 400; }
        .expert-block ul { list-style: none; padding-left: 0; }
        .expert-block li { margin-bottom: 12px; }

        .footer-actions { padding: 25px; display: flex; gap: 15px; background: var(--bg); border-top: 0.5px solid var(--border); }
        .btn-ui { border: 0.5px solid var(--border); background: transparent; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; height: 65px; border-radius: 2px; }
        .btn-main { flex: 1; background: var(--gold); color: #000; text-transform: uppercase; letter-spacing: 4px; font-weight: 700; font-size: 0.7rem; border: none; }
        .btn-main:active { opacity: 0.7; }
        .btn-icon { width: 65px; color: var(--gold); font-size: 1.3rem; }
        
        .sys-loader { position: absolute; inset: 0; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .spinner-luxury { width: 35px; height: 35px; border: 1px solid rgba(197, 160, 89, 0.1); border-top-color: var(--gold); border-radius: 50%; animation: spin 1.2s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes laserMove { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <header>
        <div class="logo">NICOLAS JULIENNE <span>LABS</span></div>
        <div class="architect">Protocol: Multi-Spectral Expertise V6.1</div>
    </header>

    <div id="viewport">
        <div class="reticle-scope"></div>
        <div id="scan-laser" class="scan-laser"></div>
        <video id="v" class="mirror-mode" autoplay playsinline muted></video>
        <canvas id="overlay-canvas" class="mirror-mode"></canvas>
    </div>

    <div class="dashboard">
        <div class="metric-card"><span class="metric-val" id="val-score">--</span><span class="metric-lab">Pureté</span></div>
        <div class="metric-card"><span class="metric-val" id="val-red">--</span><span class="metric-lab">Inflam.</span></div>
        <div class="metric-card"><span class="metric-val" id="val-tex">--</span><span class="metric-lab">Texture</span></div>
        <div class="metric-card"><span class="metric-val" id="val-ita">--</span><span class="metric-lab">Luminance</span></div>
    </div>

    <div class="analysis-card">
        <div class="sys-loader" id="loader">
            <div class="spinner-luxury"></div>
            <p style="margin-top:30px; color:var(--gold); letter-spacing:6px; font-size:0.45rem; text-transform:uppercase;">Calcul Algorithmique</p>
        </div>
        <div class="nav-tabs">
            <button class="nav-link active" onclick="AppCore.switchTab('lab')">Imagerie</button>
            <button class="nav-link" onclick="AppCore.switchTab('diag')">Bilan</button>
            <button class="nav-link" onclick="AppCore.switchTab('routine')">Rituel</button>
            <button class="nav-link" onclick="AppCore.switchTab('history')">Archives</button>
        </div>
        <div id="display-area">
            <div style="text-align:center; padding-top:60px; color:#333; letter-spacing:3px; font-size:0.55rem; text-transform:uppercase;">
                Initialisation des capteurs...
            </div>
        </div>
    </div>

    <div class="footer-actions">
        <button class="btn-ui btn-icon" onclick="AppCore.shareScore()">📤</button>
        <button class="btn-ui btn-main" id="main-action" onclick="AppCore.runAnalysis()" disabled>Lancer l'Analyse</button>
        <button class="btn-ui btn-icon" onclick="AppCore.exportPDF()">📄</button>
    </div>

    <canvas id="proc-canvas" style="display:none;"></canvas>

    <script>
        const AppCore = (function() {
            const API_KEY = "AIzaSyBnf79AADwEsHmm_7VDBOPbb7Uk6XUDneg";
            const HIST_KEY = "JULIENNE_CABINET_V61";
            let chartInstance = null;

            const state = { 
                landmarks: null, cvReady: false, analysis: null, facing: 'user', 
                audioUnlocked: false, history: JSON.parse(localStorage.getItem(HIST_KEY)) || [] 
            };

            const dom = {
                v: document.getElementById('v'),
                o: document.getElementById('overlay-canvas'), oCtx: document.getElementById('overlay-canvas').getContext('2d'),
                p: document.getElementById('proc-canvas'), pCtx: document.getElementById('proc-canvas').getContext('2d'),
                loader: document.getElementById('loader'), mainBtn: document.getElementById('main-action'),
                display: document.getElementById('display-area'),
                kpi: { score: document.getElementById('val-score'), red: document.getElementById('val-red'), tex: document.getElementById('val-tex'), ita: document.getElementById('val-ita') }
            };

            const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.85, minTrackingConfidence: 0.85 });
            faceMesh.onResults(res => { state.landmarks = res.multiFaceLandmarks?.[0] || null; drawHUD(); });

            async function onOpenCvReady() { state.cvReady = true; initCamera(); }

            async function initCamera() {
                if (dom.v.srcObject) dom.v.srcObject.getTracks().forEach(t => t.stop());
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: state.facing, width: {ideal: 1280}, height: {ideal: 720} } });
                    dom.v.srcObject = stream;
                    dom.v.onloadedmetadata = () => { dom.p.width = dom.v.videoWidth; dom.p.height = dom.v.videoHeight; dom.mainBtn.disabled = false; loop(); };
                } catch(e) { console.error("Accès caméra refusé."); }
            }

            function loop() { if (state.cvReady) faceMesh.send({image: dom.v}); requestAnimationFrame(loop); }

            function drawHUD() {
                dom.o.width = dom.v.clientWidth; dom.o.height = dom.v.clientHeight;
                if (!state.landmarks) return;
                dom.oCtx.strokeStyle = "rgba(197, 160, 89, 0.25)"; dom.oCtx.lineWidth = 0.5;
                [1, 10, 234, 454].forEach(idx => {
                    const pt = state.landmarks[idx];
                    dom.oCtx.beginPath(); dom.oCtx.arc(pt.x * dom.o.width, pt.y * dom.o.height, 1, 0, 2*Math.PI); dom.oCtx.stroke();
                });
            }

            async function runAnalysis() {
                if (!state.landmarks) return alert("Positionnez votre visage dans le cadre.");
                
                // Déverrouillage audio iOS
                if (!state.audioUnlocked) {
                    const silentUtterance = new SpeechSynthesisUtterance("");
                    window.speechSynthesis.speak(silentUtterance);
                    state.audioUnlocked = true;
                }

                dom.loader.style.display = 'flex';
                const laser = document.getElementById('scan-laser');
                laser.style.display = 'block'; laser.style.animation = "laserMove 2.5s infinite linear";
                
                try {
                    const metrics = await processMultispectral();
                    const expertise = await fetchGemini(metrics);
                    state.analysis = { ...metrics, ai: expertise };
                    saveData(metrics.score);
                    refreshDashboard(); switchTab('diag');
                    
                    const voice = new SpeechSynthesisUtterance(expertise.bilan.replace(/<[^>]*>?/gm, ''));
                    voice.lang = 'fr-FR'; voice.rate = 0.85; window.speechSynthesis.speak(voice);
                } catch(e) { 
                    alert("Erreur de synchronisation."); console.error(e); 
                } finally { 
                    dom.loader.style.display = 'none'; laser.style.display = 'none'; 
                }
            }

            async function processMultispectral() {
                dom.pCtx.drawImage(dom.v, 0, 0);
                let src = cv.imread(dom.p);
                let roi, lab, gray, gx, gy, planes;
                try {
                    const pt = state.landmarks[234];
                    const s = 100;
                    const x = Math.max(0, Math.min(pt.x * dom.p.width - s/2, dom.p.width - s));
                    const y = Math.max(0, Math.min(pt.y * dom.p.height - s/2, dom.p.height - s));
                    
                    roi = src.roi(new cv.Rect(x, y, s, s));
                    lab = new cv.Mat(); cv.cvtColor(roi, lab, cv.COLOR_RGBA2RGB); cv.cvtColor(lab, lab, cv.COLOR_RGB2Lab);
                    planes = new cv.MatVector(); cv.split(lab, planes);
                    let L = cv.mean(planes.get(0))[0], a = cv.mean(planes.get(1))[0] - 128;

                    gray = new cv.Mat(); cv.cvtColor(roi, gray, cv.COLOR_RGBA2GRAY);
                    gx = new cv.Mat(); cv.Sobel(gray, gx, cv.CV_8U, 1, 0, 3);
                    gy = new cv.Mat(); cv.Sobel(gray, gy, cv.CV_8U, 0, 1, 3);
                    let tex = (cv.mean(gx)[0] + cv.mean(gy)[0]) / 2;

                    return { 
                        redness: Math.round(a * 2.2), texture: Math.round(tex * 4), 
                        luminance: Math.round(L), score: Math.round(100 - (a*1.3 + tex/1.5)),
                        img: dom.p.toDataURL('image/jpeg', 0.9) 
                    };
                } finally { [src, roi, lab, gray, gx, gy, planes].forEach(o => { if(o) o.delete(); }); }
            }

            async function fetchGemini(m) {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                const prompt = `Consultant Maison Nicolas Julienne. Analyse : Score=${m.score}/100, Inflammation=${m.redness}, Relief Sobel=${m.texture}, Luminance=${m.luminance}. 
                Rends JSON STRICT : {
                    "bilan": "Diagnostic cellulaire complet (film hydrolipidique, stress oxydatif)",
                    "routine_matin": "Protocole haute performance (actifs conseillés)",
                    "routine_soir": "Réparation nocturne (actifs conseillés)",
                    "lifestyle": "Conseils hygiène, sommeil et nutrition",
                    "signature": "Le conseil exclusif de l'architecte Nicolas Julienne"
                }`;
                const res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: m.img.split(',')[1] } }] }], generationConfig: { responseMimeType: "application/json" } }) });
                const json = await res.json();
                return JSON.parse(json.candidates[0].content.parts[0].text);
            }

            function saveData(s) { 
                state.history.push({ t: new Date().toLocaleDateString('fr-FR', {day:'2-digit', month:'short'}), s: s }); 
                if(state.history.length > 12) state.history.shift(); 
                localStorage.setItem(HIST_KEY, JSON.stringify(state.history)); 
            }
            
            function refreshDashboard() { 
                const d = state.analysis; 
                dom.kpi.score.innerText = d.score + "%"; dom.kpi.red.innerText = d.redness; dom.kpi.tex.innerText = d.texture; dom.kpi.ita.innerText = d.luminance;
            }

            function switchTab(t) {
                document.querySelectorAll('.nav-link').forEach(btn => btn.classList.toggle('active', btn.getAttribute('onclick').includes(t)));
                if (t === 'history') { renderChart(); return; }
                if (!state.analysis) return;
                const ai = state.analysis.ai;
                if (t === 'lab') dom.display.innerHTML = `<img src="${state.analysis.img}" style="width:100%; border:0.5px solid var(--gold); border-radius:1px; filter: contrast(1.1) saturate(1.1);">`;
                else if (t === 'diag') dom.display.innerHTML = `<div class="expert-block"><b>Bilan Cellulaire</b><p>${ai.bilan}</p></div><div class="expert-block"><b>Conseil Signature</b><p>${ai.signature}</p></div>`;
                else dom.display.innerHTML = `<div class="expert-block"><b>☀️ Matin</b>${ai.routine_matin}</div><div class="expert-block"><b>🌙 Soir</b>${ai.routine_soir}</div><div class="expert-block"><b>🌿 Lifestyle</b>${ai.lifestyle}</div>`;
            }

            function renderChart() {
                dom.display.innerHTML = `<canvas id="historyChart"></canvas>`;
                if (chartInstance) chartInstance.destroy();
                chartInstance = new Chart(document.getElementById('historyChart'), { 
                    type: 'line', 
                    data: { labels: state.history.map(h => h.t), datasets: [{ data: state.history.map(h => h.s), borderColor: '#c5a059', borderWidth: 1, pointRadius: 0, tension: 0.4, fill: true, backgroundColor: 'rgba(197, 160, 89, 0.05)' }] }, 
                    options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: 100 } } } 
                });
            }

            return { onOpenCvReady, runAnalysis, switchTab, toggleCamera: () => { state.facing = state.facing === 'user' ? 'environment' : 'user'; initCamera(); }, exportPDF: () => window.print(), shareScore: () => navigator.share({ title: 'Maison Nicolas Julienne', text: `Expertise PureSkin : ${state.analysis.score}%` }) };
        })();
    </script>
</body>
</html>
