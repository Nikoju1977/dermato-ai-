<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3063/3063176.png">
    <title>PureScan Nexus AI | Edition Clinique</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script async src="https://docs.opencv.org/4.5.0/opencv.js" onload="onOpenCvScriptLoaded();"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --mistral: #7f56d9; --cyan: #00f2ff; --bg: #02060d; --danger: #ff3860; --success: #00e676; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        #viewport { position: relative; flex: 0 0 40vh; background: #000; overflow: hidden; border-bottom: 2px solid var(--mistral); box-shadow: 0 4px 20px rgba(127, 86, 217, 0.2); }
        video, #preview-img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        #preview-img { display: none; z-index: 5; border: 2px solid var(--cyan); }
        .guide-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60vw; height: 60vw; max-width: 250px; max-height: 250px; border: 2px dashed rgba(0, 242, 255, 0.7); border-radius: 30px; z-index: 10; pointer-events: none; transition: all 0.3s ease; }
        .guide-box.scanning { border-color: var(--mistral); transform: translate(-50%, -50%) scale(0.95); }

        .dashboard { flex: 1; padding: 15px 20px; display: flex; flex-direction: column; background: linear-gradient(180deg, #050a14 0%, #000 100%); overflow-y: auto; }
        .status-badge { font-size: 0.65rem; color: var(--cyan); letter-spacing: 1px; text-transform: uppercase; font-weight: 700; padding: 8px; background: rgba(0, 242, 255, 0.1); border-radius: 8px; text-align: center; margin-bottom: 12px; border: 1px solid rgba(0, 242, 255, 0.2); transition: all 0.3s; }
        
        .batch-tracker { display: flex; gap: 10px; margin-bottom: 12px; justify-content: center; align-items: center; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #1a2332; border: 1px solid #334155; transition: 0.3s; }
        .dot.active { background: var(--cyan); border-color: var(--cyan); box-shadow: 0 0 10px var(--cyan); }

        .analysis-card { background: rgba(255,255,255,0.02); border-radius: 16px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .risk-label { font-size: 0.6rem; color: #64748b; text-transform: uppercase; letter-spacing: 2px; }
        #risk-val { font-family: 'Orbitron'; font-size: 3.5rem; color: #334155; line-height: 1; margin: 5px 0 15px 0; transition: color 0.5s; }
        #advice { font-size: 0.85rem; color: #e2e8f0; line-height: 1.6; text-align: left; padding: 12px; background: rgba(0,0,0,0.4); border-radius: 8px; border-left: 3px solid var(--mistral); white-space: pre-line; min-height: 60px; overflow-y: auto;}

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: auto; padding-bottom: 10px; }
        .btn { padding: 16px; border: none; border-radius: 12px; font-family: 'Orbitron'; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-main { background: var(--mistral); color: white; grid-column: span 2; box-shadow: 0 4px 15px rgba(127, 86, 217, 0.3); }
        .btn-main:active { transform: scale(0.98); }
        .btn-main:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; filter: grayscale(1); }
        .btn-sub { background: #0f172a; color: #cbd5e1; border: 1px solid #1e293b; }
        .architect-signature { text-align: center; font-size: 0.55rem; color: #475569; margin-top: 5px; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="viewport">
        <video id="webcam" autoplay playsinline muted></video>
        <img id="preview-img">
        <div class="guide-box" id="guide"></div>
    </div>

    <div class="dashboard">
        <div id="status" class="status-badge">1/3 : VÉRIFICATION MATÉRIELLE...</div>

        <div class="batch-tracker" id="batch-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <span style="font-size:0.6rem; color:#64748b; margin-left:8px; font-weight:600;">MODE BATCH (5)</span>
        </div>

        <div class="analysis-card">
            <div class="risk-label">Indice d'Anomalie Bio-IA</div>
            <div id="risk-val">--%</div>
            <div id="advice">Analyse des composants système en cours...</div>
        </div>

        <div class="controls">
            <input type="file" id="file-in" style="display:none;" accept="image/*">
            <button class="btn btn-main" id="btn-scan" disabled>LANCER L'ANALYSE CLINIQUE</button>
            <button class="btn btn-sub" id="btn-upload">IMPORT HD</button>
            <button class="btn btn-sub" id="btn-reset">RÉINITIALISER</button>
        </div>
        
        <div class="architect-signature">Architecte Logiciel : Nicolas Julienne</div>
    </div>

    <canvas id="proc-canvas" style="display:none;"></canvas>

    <script>
        const MISTRAL_KEY = "TON_API_KEY_MISTRAL"; // ⚠️ A REMPLACER PAR TA CLÉ MISTRAL
        
        const ui = {
            v: document.getElementById('webcam'),
            img: document.getElementById('preview-img'),
            btnScan: document.getElementById('btn-scan'),
            status: document.getElementById('status'),
            advice: document.getElementById('advice'),
            risk: document.getElementById('risk-val'),
            guide: document.getElementById('guide'),
            dots: document.querySelectorAll('.dot'),
            canvas: document.getElementById('proc-canvas')
        };
        
        let state = { cvReady: false, aiReady: false, isLive: true, batchCount: 0, results: [], model: null };

        // ==========================================
        // 1. DÉMARRAGE SÉCURISÉ (SAFE MODE)
        // ==========================================
        window.onload = () => { 
            ui.advice.innerText = "Lancement des processus asynchrones...";
            initAI(); 
            initCamera(); 
        };

        // Remplacement du loader OpenCV par un Poller anti-crash
        function onOpenCvScriptLoaded() {
            updateStatus("2/3 : COMPILATION OPENCV...", "var(--mistral)");
            let retries = 0;
            const checkCv = setInterval(() => {
                if (typeof cv !== 'undefined' && typeof cv.Mat === 'function') {
                    clearInterval(checkCv);
                    state.cvReady = true;
                    checkSystemReady();
                }
                retries++;
                if(retries > 50) { // Timeout après 10 secondes
                    clearInterval(checkCv);
                    updateStatus("ERREUR : OPENCV INJOIGNABLE", "var(--danger)");
                    ui.advice.innerText = "Le moteur optique (OpenCV) a échoué à se charger. Vérifiez votre connexion.";
                }
            }, 200);
        }

        async function initAI() {
            try {
                updateStatus("3/3 : CONNEXION AU MOTEUR IA...", "var(--mistral)");
                
                // FALLBACK SÉCURISÉ : Si WebGL crashe (fréquent sur Android), on passe sur CPU
                try {
                    await tf.setBackend('webgl');
                    await tf.ready();
                } catch (err) {
                    console.warn("WebGL échoué. Passage en mode CPU.", err);
                    await tf.setBackend('cpu');
                    await tf.ready();
                }

                ui.advice.innerText = "Téléchargement du modèle de classification...";
                state.model = await mobilenet.load({version: 2, alpha: 1.0}); 
                state.aiReady = true;
                checkSystemReady();

            } catch (e) {
                console.error(e);
                updateStatus("ERREUR : CRASH IA", "var(--danger)");
                ui.advice.innerText = `Erreur système : ${e.message}`; // Affiche l'erreur exacte !
            }
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1080 } } });
                ui.v.srcObject = stream;
            } catch (e) {
                state.isLive = false;
                updateStatus("CAMÉRA BLOQUÉE - MODE IMPORT", "#f59e0b");
            }
        }

        function checkSystemReady() {
            if (state.cvReady && state.aiReady) {
                updateStatus("SYSTÈME PRÊT", "var(--success)");
                ui.advice.innerText = "Tous les modules sont chargés.\nCentrez la zone dans le viseur clinique.";
                ui.risk.style.color = "var(--cyan)";
                ui.btnScan.disabled = false;
            }
        }

        function updateStatus(text, color = "var(--cyan)") {
            ui.status.innerText = text;
            ui.status.style.borderColor = color;
            ui.status.style.color = color;
        }

        // ==========================================
        // 2. MOTEUR D'ANALYSE (SANS CRASH)
        // ==========================================
        ui.btnScan.onclick = async () => {
            if (!state.cvReady || !state.aiReady) return;
            
            ui.btnScan.disabled = true;
            ui.guide.classList.add('scanning');
            updateStatus("ANALYSE EN COURS...", "var(--mistral)");
            ui.advice.innerText = "Traitement de l'image en cours...";

            const ctx = ui.canvas.getContext('2d');
            ui.canvas.width = 224; ui.canvas.height = 224;
            
            if (state.isLive) {
                const minDim = Math.min(ui.v.videoWidth, ui.v.videoHeight);
                const startX = (ui.v.videoWidth - minDim) / 2;
                const startY = (ui.v.videoHeight - minDim) / 2;
                ctx.drawImage(ui.v, startX, startY, minDim, minDim, 0, 0, 224, 224);
            } else {
                ctx.drawImage(ui.img, 0, 0, ui.img.naturalWidth, ui.img.naturalHeight, 0, 0, 224, 224);
            }

            let srcRGBA, srcRGB, gray, kernel, dst;

            try {
                srcRGBA = cv.imread(ui.canvas);
                srcRGB = new cv.Mat();
                cv.cvtColor(srcRGBA, srcRGB, cv.COLOR_RGBA2RGB); 
                
                gray = new cv.Mat();
                cv.cvtColor(srcRGBA, gray, cv.COLOR_RGBA2GRAY);
                
                kernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(7, 1));
                cv.morphologyEx(gray, gray, cv.MORPH_BLACKHAT, kernel);
                cv.threshold(gray, gray, 15, 255, cv.THRESH_BINARY);
                
                dst = new cv.Mat();
                cv.inpaint(srcRGB, gray, dst, 3, cv.INPAINT_TELEA);
                cv.imshow(ui.canvas, dst); 

                const predictions = await state.model.classify(ui.canvas);
                let rawProb = predictions[0].probability * 100;
                let finalScore = Math.min(Math.round(rawProb * 1.5), 99); 

                state.results.push({ risk: finalScore, img: ui.canvas.toDataURL('image/jpeg', 0.8) });
                ui.dots[state.batchCount].classList.add('active');
                state.batchCount++;

                ui.risk.innerText = finalScore + "%";
                ui.risk.style.color = finalScore > 50 ? "var(--danger)" : "var(--success)";

                ui.advice.innerText = "Consultation de l'Agent Mistral...";
                const routineText = await fetchMistralRoutine(finalScore);
                ui.advice.innerText = routineText;

                if (state.batchCount >= 5) {
                    updateStatus("BILAN TERMINÉ : TÉLÉCHARGEMENT PDF", "var(--success)");
                    generatePDF();
                    ui.btnScan.disabled = true;
                    setTimeout(() => { updateStatus("CLIQUEZ SUR 'RÉINITIALISER'", "var(--mistral)"); }, 3000);
                } else {
                    updateStatus(`ZONE ${state.batchCount} VALIDÉE`, "var(--cyan)");
                    ui.btnScan.disabled = false;
                }

            } catch (err) {
                console.error("Erreur d'analyse:", err);
                updateStatus("ERREUR DE TRAITEMENT", "var(--danger)");
                ui.advice.innerText = `Erreur de calcul : ${err.message}`;
                ui.btnScan.disabled = false;
            } finally {
                if(srcRGBA) srcRGBA.delete(); if(srcRGB) srcRGB.delete();
                if(gray) gray.delete(); if(kernel) kernel.delete(); if(dst) dst.delete();
                ui.guide.classList.remove('scanning');
            }
        };

        // ==========================================
        // 3. AGENT MISTRAL
        // ==========================================
        async function fetchMistralRoutine(riskScore) {
            if(!MISTRAL_KEY || MISTRAL_KEY === "TON_API_KEY_MISTRAL") {
                return riskScore > 50 
                    ? "Routine de Précaution :\n1. Stoppez l'usage d'actifs irritants.\n2. Appliquez un baume cicatrisant neutre.\n3. Prenez rendez-vous avec un dermatologue." 
                    : "Routine Quotidienne :\n1. Nettoyage doux au pH neutre.\n2. Hydratation à l'acide hyaluronique.\n3. Protection solaire SPF 50 stricte.";
            }

            try {
                const response = await fetch('https://api.mistral.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${MISTRAL_KEY}` },
                    body: JSON.stringify({
                        model: "mistral-tiny",
                        messages: [
                            { role: "system", content: "Tu es un expert dermatologue. Rédige une routine de soin claire et structurée en 3 étapes numérotées, adaptée au risque cutané. Reste très concis." },
                            { role: "user", content: `Mon score d'anomalie cutanée est de ${riskScore}%. Quelle est ma routine ?` }
                        ]
                    })
                });
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (e) {
                return "Erreur réseau Mistral.\n1. Nettoyage doux.\n2. Hydratation basique.\n3. Protection UV.";
            }
        }

        // ==========================================
        // 4. GÉNÉRATEUR PDF & UI
        // ==========================================
        function generatePDF() {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                doc.setFillColor(15, 23, 42); doc.rect(0, 0, 210, 297, 'F');
                doc.setTextColor(0, 242, 255); doc.setFontSize(24); doc.text("PURESCAN NEXUS", 20, 30);
                doc.setTextColor(148, 163, 184); doc.setFontSize(12); doc.text("RAPPORT D'ANALYSE CLINIQUE - 5 ZONES", 20, 40);
                doc.setFontSize(10); doc.text("Architecte : Nicolas Julienne", 20, 48);
                
                state.results.forEach((res, i) => {
                    const y = 65 + (i * 42);
                    doc.setTextColor(255, 255, 255); doc.setFontSize(14); doc.text(`Zone scannée n°${i+1}`, 20, y);
                    if(res.risk > 50) doc.setTextColor(255, 56, 96); else doc.setTextColor(0, 230, 118);
                    doc.text(`Indice d'anomalie : ${res.risk}%`, 20, y + 10);
                    doc.setDrawColor(255, 255, 255); doc.rect(149, y - 11, 32, 32);
                    doc.addImage(res.img, 'JPEG', 150, y - 10, 30, 30);
                });
                
                doc.save("PureScan_Bilan.pdf");
            } catch (e) { 
                updateStatus("ERREUR LORS DE LA CRÉATION DU PDF", "var(--danger)"); 
                ui.btnScan.disabled = false; 
            }
        }

        function resetApp() {
            state.batchCount = 0; state.results = [];
            ui.dots.forEach(d => d.classList.remove('active'));
            ui.btnScan.disabled = false;
            ui.risk.innerText = "--%"; ui.risk.style.color = "#334155";
            updateStatus("SYSTÈME RÉINITIALISÉ", "var(--success)");
            ui.advice.innerText = "Nouveau patient. Centrez la zone ou importez une photo.";
        }

        document.getElementById('btn-upload').onclick = () => document.getElementById('file-in').click();
        document.getElementById('file-in').onchange = (e) => {
            if (!e.target.files || e.target.files.length === 0) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                ui.img.src = ev.target.result; ui.img.style.display = "block";
                state.isLive = false; updateStatus("PHOTO HD CHARGÉE", "var(--cyan)");
            };
            reader.readAsDataURL(e.target.files[0]);
        };
        
        document.getElementById('btn-reset').onclick = () => {
            ui.img.style.display = "none"; document.getElementById('file-in').value = "";
            state.isLive = true; resetApp(); updateStatus("RETOUR À LA CAMÉRA", "var(--cyan)");
        };

        if ('serviceWorker' in navigator) {
            const swBlob = new Blob([`
                self.addEventListener('install', e => e.waitUntil(caches.open('purescan-v43').then(c => c.addAll(['index.html']))));
                self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(res => res || fetch(e.request))));
            `], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(swBlob));
        }
    </script>
</body>
</html>
