<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="author" content="Nicolas JULIENNE">
    <meta name="description" content="DERMA X-PRO — Intelligence Artificielle Biométrique cutanée par Nicolas JULIENNE.">
    <meta name="theme-color" content="#0A0A0C">
    <title>DERMA X-PRO | by Nicolas JULIENNE</title>

    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="onOpenCvReady()"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400;500;700&family=Rajdhani:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --champagne: #D4AF37;
            --champagne-light: #F3E5AB;
            --platinum: #E5E4E2;
            --onyx: #0A0A0C;
            --glass: rgba(15,15,18,0.9);
            --border-light: rgba(212,175,55,0.2);
            --danger: #FF4D4D;
            --success: #A8D08D;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--onyx);
            color: var(--platinum);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            min-height: 100dvh;
            -webkit-text-size-adjust: 100%;
        }

        /* ═══ HEADER ═══ */
        #app-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-light);
            background: rgba(10,10,12,1);
            position: relative;
            z-index: 1001;
        }

        .brand-box .brand-main {
            font-family: 'Orbitron';
            font-size: 1rem;
            color: var(--champagne);
            letter-spacing: 0.25em;
            font-weight: 700;
        }

        .brand-box .brand-sub {
            font-family: 'Orbitron';
            font-size: 0.42rem;
            color: #555;
            letter-spacing: 0.1em;
            margin-top: 3px;
        }

        .architect-box { text-align: right; }
        .architect-box .label {
            font-family: 'Orbitron';
            font-size: 0.38rem;
            color: #444;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .architect-box .name {
            font-family: 'Orbitron';
            font-size: 0.6rem;
            color: var(--platinum);
            letter-spacing: 0.1em;
            font-weight: 500;
        }

        /* ═══ VISION SECTOR ═══ */
        #vision-sector {
            position: relative;
            height: 45vh;
            background: #000;
            border-bottom: 1px solid var(--border-light);
            overflow: hidden;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #face-canvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 50;
            transform: scaleX(-1);
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* ═══ LUX METER ═══ */
        #lux-meter {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            max-width: 250px;
            padding: 10px;
            z-index: 100;
            border: 1px solid var(--border-light);
            border-radius: 4px;
        }

        .lux-header {
            display: flex;
            justify-content: space-between;
            font-family: 'Orbitron';
            font-size: 0.5rem;
            color: #666;
            margin-bottom: 5px;
        }

        .lux-track {
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.05);
            position: relative;
        }

        .lux-fill {
            height: 100%;
            transition: width 0.3s ease, background 0.3s ease;
            width: 0%;
        }

        /* ═══ DASHBOARD ═══ */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: var(--border-light);
        }

        .stat-card {
            background: var(--onyx);
            padding: 15px 5px;
            text-align: center;
        }

        .stat-val {
            font-family: 'Orbitron';
            font-size: 1rem;
            color: var(--champagne-light);
        }

        .stat-lbl {
            font-size: 0.5rem;
            text-transform: uppercase;
            color: #555;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* ═══ ACTIONS ═══ */
        .actions {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #api-key {
            width: 100%;
            background: #0e0e10;
            border: 1px solid #1a1a1c;
            padding: 12px;
            color: var(--champagne);
            font-family: 'Orbitron';
            font-size: 0.6rem;
            outline: none;
            -webkit-appearance: none;
            transition: border-color 0.3s;
        }

        .btn-core {
            background: transparent;
            border: 1px solid var(--champagne);
            color: var(--champagne);
            padding: 16px;
            font-family: 'Orbitron';
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-core:active:not(:disabled) {
            background: var(--champagne);
            color: var(--onyx);
        }

        .btn-core:disabled {
            border-color: #222;
            color: #333;
            cursor: not-allowed;
        }

        .btn-alt { border-color: #333; color: #555; font-size: 0.6rem; padding: 12px; }

        /* ═══ OVERLAYS ═══ */
        .overlay {
            position: fixed;
            inset: 0;
            background: var(--onyx);
            z-index: 2000;
            display: none;
            flex-direction: column;
            padding: 30px 25px;
            padding-bottom: max(30px, env(safe-area-inset-bottom));
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .overlay.active { display: flex; }

        .overlay-title {
            font-family: 'Orbitron';
            font-size: 1.1rem;
            color: var(--champagne);
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        #ai-report { width: 100%; max-width: 600px; margin: 0 auto; color: #CCC; }

        /* ═══ FOOTER ═══ */
        #app-footer {
            padding: 15px 20px;
            text-align: center;
            border-top: 1px solid #111;
            font-family: 'Orbitron';
            font-size: 0.38rem;
            color: #222;
            letter-spacing: 0.2em;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--danger);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-family: 'Orbitron';
            font-size: 0.6rem;
            z-index: 10000;
            display: none;
        }

        /* Agent 3 Showcase */
        #product-showcase { margin-top: 25px; border-top: 1px dashed var(--border-light); display: none; padding-top: 15px;}
        .product-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .product-card { min-width: 120px; background: #0e0e10; padding: 10px; border-radius: 4px; text-align: center; border: 1px solid #1a1a1c;}
        .product-img { width: 50px; height: 50px; border-radius: 50%; margin-bottom: 8px; object-fit: cover; background: #fff;}
    </style>
</head>
<body>

    <header id="app-header">
        <div class="brand-box">
            <div class="brand-main">DERMA X-PRO</div>
            <div class="brand-sub">BIOMETRIC ENGINE V14.3</div>
        </div>
        <div class="architect-box">
            <div class="label">Architecte Logiciel</div>
            <div class="name">Nicolas JULIENNE</div>
        </div>
    </header>

    <main>
        <section id="vision-sector">
            <div id="lux-meter" class="glass-panel">
                <div class="lux-header">
                    <span>PHOTOMÉTRIE</span>
                    <span id="lux-text">CALIBRATION...</span>
                </div>
                <div class="lux-track"><div class="lux-fill" id="lux-fill"></div></div>
            </div>
            <video id="video" playsinline muted autoplay></video>
            <canvas id="face-canvas"></canvas>
        </section>

        <section class="dashboard">
            <div class="stat-card"><div class="stat-val" id="val-ita">--</div><div class="stat-lbl">ITA INDEX</div></div>
            <div class="stat-card"><div class="stat-val" id="val-glow">--</div><div class="stat-lbl">RADIANCE</div></div>
            <div class="stat-card"><div class="stat-val" id="val-texture">--</div><div class="stat-lbl">TEXTURE</div></div>
            <div class="stat-card"><div class="stat-val" id="val-uniform">--</div><div class="stat-lbl">UNIFORMITY</div></div>
        </section>

        <section class="actions">
            <input type="password" id="api-key" placeholder="CLÉ SÉCURISÉE MISTRAL" autocomplete="off">
            <button id="main-trigger" class="btn-core" onclick="startDeepAnalysis()" disabled>LUMINOSITÉ REQUISE</button>
            <button class="btn-core btn-alt" onclick="showEvolution()">HISTORIQUE CHRONOS</button>
        </section>
    </main>

    <footer id="app-footer">
        SYSTEM ARCHITECTURE BY NICOLAS JULIENNE © 2026 — DERMA X-PRO V14.3
    </footer>

    <div id="results-layer" class="overlay">
        <h1 class="overlay-title">BILAN CLINIQUE</h1>
        <div id="ai-report"></div>
        <div id="product-showcase"></div>
        <div style="margin-top: 30px; display: flex; flex-direction: column; gap: 10px;">
            <button id="pdf-btn" class="btn-core" onclick="downloadPDF()" style="display:none; background:var(--champagne); color:#000;">EXPORTER PDF</button>
            <button class="btn-core btn-alt" onclick="location.reload()">NOUVELLE ANALYSE</button>
        </div>
    </div>

    <div id="chronos-layer" class="overlay">
        <h1 class="overlay-title">ÉVOLUTION</h1>
        <div style="height: 300px;"><canvas id="evolutionChart"></canvas></div>
        <button class="btn-core btn-alt" onclick="closeOverlay('chronos-layer')" style="margin-top:20px;">RETOUR</button>
    </div>

    <div id="toast"></div>

    <script>
        "use strict";

        // ── VARIABLES GLOBALES ──
        const v = document.getElementById('video');
        const cvs = document.getElementById('face-canvas');
        const ctx = cvs.getContext('2d');
        let stream, faceMesh, cvReady = false, isAnalyzing = false;
        let sessionImg, sessionMetrics, sessionFitz;

        // ── INITIALISATION ──
        async function startApp() {
            const savedKey = localStorage.getItem('derma_api_key');
            if (savedKey) document.getElementById('api-key').value = savedKey;

            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                v.srcObject = stream;
                v.onloadedmetadata = () => {
                    cvs.width = v.videoWidth;
                    cvs.height = v.videoHeight;
                    setupLuxMeter();
                    initFaceMesh();
                };
            } catch(e) { showToast("Erreur caméra : " + e.message); }
        }

        function onOpenCvReady() { cvReady = true; }

        // ── LUX METER ──
        function setupLuxMeter() {
            const lC = document.createElement('canvas');
            const lX = lC.getContext('2d');
            lC.width = lC.height = 64;
            
            setInterval(() => {
                if (isAnalyzing || v.videoWidth === 0) return;
                lX.drawImage(v, 0, 0, 64, 64);
                const d = lX.getImageData(0,0,64,64).data;
                let brightness = 0;
                for(let i=0; i<d.length; i+=4) brightness += (0.21*d[i] + 0.72*d[i+1] + 0.07*d[i+2]);
                const avg = brightness / (64*64);
                updateLuxUI(avg);
            }, 500);
        }

        function updateLuxUI(avg) {
            const fill = document.getElementById('lux-fill');
            const btn = document.getElementById('main-trigger');
            fill.style.width = (avg/255*100) + '%';
            
            if (avg < 50) {
                btn.disabled = true; btn.textContent = "TROP SOMBRE";
                fill.style.background = "var(--danger)";
            } else {
                btn.disabled = false; btn.textContent = "INITIER LE SCAN";
                fill.style.background = "var(--champagne)";
            }
        }

        // ── FACE MESH ──
        function initFaceMesh() {
            faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
            faceMesh.setOptions({maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5});
            faceMesh.onResults(results => {
                ctx.clearRect(0,0,cvs.width, cvs.height);
                if (results.multiFaceLandmarks?.[0]) {
                    drawFace(results.multiFaceLandmarks[0]);
                }
            });
            const meshLoop = async () => {
                if (!isAnalyzing && v.readyState >= 2) await faceMesh.send({image: v});
                requestAnimationFrame(meshLoop);
            };
            meshLoop();
        }

        function drawFace(landmarks) {
            ctx.strokeStyle = "rgba(212,175,55,0.3)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            landmarks.forEach(p => ctx.lineTo(p.x * cvs.width, p.y * cvs.height));
            ctx.stroke();
        }

        // ── ANALYSE MÉTRIQUE (OpenCV) ──
        function computeMetrics(canvas) {
            if (!cvReady) return {ita: 45, glow: 70, textureScore: 80, uniformity: 85};
            
            let src = cv.imread(canvas);
            let lab = new cv.Mat();
            cv.cvtColor(src, lab, cv.COLOR_RGBA2RGB);
            cv.cvtColor(lab, lab, cv.COLOR_RGB2Lab);
            
            let mean = cv.mean(lab);
            let L = mean[0] * 100 / 255;
            let b = mean[2] - 128;
            let ita = Math.atan2(L - 50, b) * (180 / Math.PI);
            
            // Texture via Laplacien
            let gray = new cv.Mat();
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
            let lap = new cv.Mat();
            cv.Laplacian(gray, lap, cv.CV_64F);
            let myMean = new cv.Mat(), myStd = new cv.Mat();
            cv.meanStdDev(lap, myMean, myStd);
            let texture = Math.min(100, myStd.data64F[0] * 5);

            src.delete(); lab.delete(); gray.delete(); lap.delete(); myMean.delete(); myStd.delete();
            
            return {
                ita: Math.round(ita),
                glow: Math.round(L),
                textureScore: Math.round(texture),
                uniformity: Math.round(100 - (myStd.data64F[0]))
            };
        }

        // ── ANALYSE PROFONDE & IA ──
        async function startDeepAnalysis() {
            const key = document.getElementById('api-key').value;
            if (!key) return showToast("Clé API requise");
            
            isAnalyzing = true;
            localStorage.setItem('derma_api_key', key);
            
            const capture = document.createElement('canvas');
            capture.width = v.videoWidth; capture.height = v.videoHeight;
            capture.getContext('2d').drawImage(v, 0, 0);
            sessionImg = capture.toDataURL('image/jpeg', 0.7);
            
            sessionMetrics = computeMetrics(capture);
            updateDashboard(sessionMetrics);
            
            document.getElementById('results-layer').classList.add('active');
            await fetchMistral(key, sessionImg, sessionMetrics);
        }

        function updateDashboard(m) {
            document.getElementById('val-ita').textContent = m.ita + '°';
            document.getElementById('val-glow').textContent = m.glow + '%';
            document.getElementById('val-texture').textContent = m.textureScore + '/100';
            document.getElementById('val-uniform').textContent = m.uniformity + '%';
        }

        async function fetchMistral(key, img, m) {
            const reportEl = document.getElementById('ai-report');
            reportEl.innerHTML = "<p style='text-align:center; padding:20px;'>Génération du protocole neuronal...</p>";
            
            try {
                const response = await fetch('https://api.mistral.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${key}`},
                    body: JSON.stringify({
                        model: "pixtral-12b-2409",
                        messages: [{
                            role: "user",
                            content: [
                                {type: "text", text: `Analyse dermatologique. ITA: ${m.ita}, Radiance: ${m.glow}%, Texture: ${m.textureScore}. Génère un rapport HTML structuré avec Diagnostic, Routine Matin/Soir et Actifs recommandés.`},
                                {type: "image_url", image_url: {url: img}}
                            ]
                        }],
                        stream: true
                    })
                });

                let fullText = "";
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for(const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6));
                            const content = data.choices[0].delta.content || "";
                            fullText += content;
                            reportEl.innerHTML = fullText;
                        }
                    }
                }
                document.getElementById('pdf-btn').style.display = "block";
                saveToHistory(m);
            } catch(e) { reportEl.innerHTML = "Erreur IA : " + e.message; }
        }

        // ── UTILITAIRES ──
        function saveToHistory(m) {
            let history = JSON.parse(localStorage.getItem('derma_history') || '[]');
            history.push({date: new Date().toLocaleDateString(), ...m});
            localStorage.setItem('derma_history', JSON.stringify(history.slice(-10)));
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.textContent = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function closeOverlay(id) { document.getElementById(id).classList.remove('active'); }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("DERMA X-PRO - RAPPORT BIOMÉTRIQUE", 10, 10);
            doc.text(`ITA Index: ${sessionMetrics.ita}`, 10, 20);
            doc.text(`Radiance: ${sessionMetrics.glow}%`, 10, 30);
            doc.save("Bilan_DermaX.pdf");
        }

        function showEvolution() {
            const history = JSON.parse(localStorage.getItem('derma_history') || '[]');
            if(!history.length) return showToast("Aucun historique");
            document.getElementById('chronos-layer').classList.add('active');
            
            new Chart(document.getElementById('evolutionChart'), {
                type: 'line',
                data: {
                    labels: history.map(h => h.date),
                    datasets: [{
                        label: 'Radiance',
                        data: history.map(h => h.glow),
                        borderColor: '#D4AF37',
                        tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        startApp();
    </script>
</body>
</html>
