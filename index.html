<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DERMA LÉGENDE X-PRO | V29 ULTRA</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript" onload="onOpenCvReady();"></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --gold: #d4af37; --neon: #00f2ff; --crimson: #ff1f1f; --toxic: #39ff14;
            --bg: #050505; --surface: #0f0f0f;
        }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; 
            margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Scanner Viewport */
        #vision-sector { flex: 1; position: relative; overflow: hidden; background: #000; border-bottom: 1px solid #222; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #ar-canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 5; pointer-events: none; transform: scaleX(-1); visibility: hidden; }
        
        /* HUD Elements */
        .zone-marker {
            position: absolute; border: 1px solid var(--neon); background: rgba(0,242,255,0.05);
            pointer-events: none; z-index: 10; display: none; flex-direction: column; align-items: center;
            transition: 0.1s linear; box-shadow: 0 0 15px rgba(0,242,255,0.2);
        }
        .zone-label { font-family: 'Orbitron'; font-size: 8px; color: var(--neon); background: #000; padding: 2px 5px; margin-top: -18px; white-space: nowrap; border: 1px solid var(--neon); }

        /* Panel UI */
        .ui-panel { background: var(--surface); padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); z-index: 20; border-top: 1px solid #333; }
        .agent-status { display: flex; gap: 10px; margin-bottom: 15px; }
        .agent-box { flex: 1; padding: 10px; border: 1px solid #222; font-size: 9px; font-family: 'Orbitron'; color: #444; text-align: center; transition: 0.3s; }
        .active-dermato { border-color: var(--crimson); color: var(--crimson); background: rgba(255,31,31,0.05); }
        .active-cosmo { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.05); }

        .btn-core {
            width: 100%; padding: 18px; background: none; border: 1px solid var(--gold);
            color: var(--gold); font-family: 'Orbitron'; font-size: 11px; cursor: pointer;
            letter-spacing: 2px; transition: 0.3s; text-transform: uppercase;
        }
        .btn-core:active { background: var(--gold); color: #000; }
        .btn-core:disabled { opacity: 0.2; cursor: not-allowed; }

        /* Results & Overlays */
        .overlay { position: fixed; inset: 0; background: rgba(5,5,5,0.98); z-index: 100; display: none; flex-direction: column; padding: 40px 20px; overflow-y: auto; }
        .routine-card { background: #111; padding: 20px; border-left: 4px solid var(--gold); margin-bottom: 20px; }
        .step { font-size: 14px; margin: 10px 0; color: #ccc; line-height: 1.4; }
        .step b { color: #fff; display: block; }

        #boot-loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: var(--toxic); top: 0; z-index: 15; box-shadow: 0 0 15px var(--toxic); display: none; }
    </style>
</head>
<body>

<div id="boot-loader">
    <div style="width:40px; height:40px; border:2px solid var(--gold); border-top-color:transparent; border-radius:50%; animation:spin 1s linear infinite;"></div>
    <p id="boot-text" style="font-family:'Orbitron'; font-size:10px; color:var(--gold); margin-top:20px; letter-spacing:2px;">INITIALISATION CORE V29...</p>
</div>

<section id="vision-sector">
    <div id="scanner-line" class="scan-line"></div>
    <video id="video" playsinline muted autoplay></video>
    <canvas id="ar-canvas"></canvas>
    <div id="zone-t" class="zone-marker"><span class="zone-label">ZONE_T : SPECTROMÉTRIE</span></div>
    <div id="zone-cheek" class="zone-marker"><span class="zone-label">ZONE_CHEEK : LIPIDES</span></div>
</section>

<section class="ui-panel">
    <div class="agent-status">
        <div id="box-dermato" class="agent-box">AGENT_DERMATO</div>
        <div id="box-cosmo" class="agent-box">AGENT_COSMO</div>
    </div>
    <button id="scan-btn" class="btn-core" disabled>En attente du noyau...</button>
</section>

<div id="results-overlay" class="overlay">
    <h2 style="font-family:'Orbitron'; color:var(--gold); font-size:18px;">DOSSIER CLINIQUE X-PRO</h2>
    <div id="score-container" style="margin: 20px 0; text-align: center;">
        <div style="font-size:10px; color:#555;">INDICE DE SANTÉ CELLULAIRE</div>
        <div id="res-score" style="font-family:'Orbitron'; font-size:48px; color:var(--toxic);">--%</div>
    </div>
    
    <div class="routine-card" id="card-morning">
        <div style="color:var(--gold); font-weight:bold; margin-bottom:10px;">☀️ PROTOCOLE MATIN</div>
        <div id="morning-list"></div>
    </div>

    <div class="routine-card" id="card-night" style="border-left-color:var(--neon);">
        <div style="color:var(--neon); font-weight:bold; margin-bottom:10px;">🌙 PROTOCOLE SOIR</div>
        <div id="night-list"></div>
    </div>

    <button onclick="generatePDF()" class="btn-core" style="border-color:var(--toxic); color:var(--toxic); margin-bottom:10px;">Exporter Rapport PDF</button>
    <button onclick="location.reload()" class="btn-core" style="border-color:#444; color:#444;">Réinitialiser</button>
</div>

<script>
    /**
     * LOGIQUE SYSTÈME - DERMA LÉGENDE X-PRO
     */
    const state = {
        metrics: { redness: 0, texture: 0, score: 0 },
        cvReady: false,
        audioUnlocked: false
    };

    const video = document.getElementById('video');
    const canvas = document.getElementById('ar-canvas');
    const ctx = canvas.getContext('2d');

    // 1. Synthèse Vocale (Optimisée Mobile)
    function agentSpeak(agent, message) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const speech = new SpeechSynthesisUtterance(message);
        speech.lang = 'fr-FR';
        speech.pitch = agent === 'dermato' ? 0.8 : 1.1;
        window.speechSynthesis.speak(speech);

        document.getElementById('box-dermato').className = 'agent-box ' + (agent === 'dermato' ? 'active-dermato' : '');
        document.getElementById('box-cosmo').className = 'agent-box ' + (agent === 'cosmo' ? 'active-cosmo' : '');
    }

    // 2. Initialisation Vision (MediaPipe)
    async function initVision() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'user', width: 1280, height: 720 } 
            });
            video.srcObject = stream;

            const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.7 });
            
            faceMesh.onResults(results => {
                if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    const lm = results.multiFaceLandmarks[0];
                    updateHUD(lm);
                    if(document.getElementById('boot-loader').style.display !== 'none') {
                        document.getElementById('boot-loader').style.display = 'none';
                        document.getElementById('scan-btn').disabled = false;
                        document.getElementById('scan-btn').innerText = "Démarrer Bio-Scan";
                    }
                }
            });

            const camera = new Camera(video, {
                onFrame: async () => { await faceMesh.send({image: video}); },
                width: 1280, height: 720
            });
            camera.start();
        } catch (e) {
            alert("Accès caméra refusé ou non supporté.");
        }
    }

    function updateHUD(landmarks) {
        const tZone = landmarks[10]; 
        const cheek = landmarks[234];
        
        const move = (id, pt) => {
            const el = document.getElementById(id);
            el.style.display = 'flex';
            el.style.left = `${pt.x * 100}%`;
            el.style.top = `${pt.y * 100}%`;
        };
        
        move('zone-t', tZone);
        move('zone-cheek', cheek);
    }

    // 3. Analyse Avancée OpenCV
    async function runDiagnostic() {
        if(!state.audioUnlocked) { agentSpeak('dermato', "Scan activé."); state.audioUnlocked = true; }
        
        const btn = document.getElementById('scan-btn');
        const scanner = document.getElementById('scanner-line');
        btn.disabled = true;
        scanner.style.display = "block";
        scanner.animate([{top: '0%'}, {top: '100%'}, {top: '0%'}], {duration: 2000, iterations: 1});

        agentSpeak('dermato', "Analyse des chromophores et du micro-relief cutané.");

        // On attend la fin de l'animation pour simuler le calcul
        setTimeout(() => {
            processImage();
        }, 2100);
    }

    function processImage() {
        // Transfert Video -> Canvas pour OpenCV
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        try {
            let src = cv.imread(canvas);
            let lab = new cv.Mat();
            cv.cvtColor(src, lab, cv.COLOR_RGBA2RGB);
            cv.cvtColor(lab, lab, cv.COLOR_RGB2Lab);

            // Analyse de l'inflammation (Canal 'a' de l'espace Lab)
            let planes = new cv.MatVector();
            cv.split(lab, planes);
            let aChannel = planes.get(1);
            let meanRed = cv.mean(aChannel)[0]; // Valeur d'érythème

            // Analyse de texture (Laplacien pour pores/ridules)
            let gray = new cv.Mat();
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
            let lap = new cv.Mat();
            cv.Laplacian(gray, lap, cv.CV_8U, 3);
            let meanTexture = cv.mean(lap)[0];

            // Calcul des scores
            state.metrics.redness = Math.round(Math.max(0, (meanRed - 128) * 2.5));
            state.metrics.texture = Math.round(meanTexture * 4);
            state.metrics.score = Math.max(10, 100 - (state.metrics.redness + state.metrics.texture / 2));

            // Nettoyage mémoire
            src.delete(); lab.delete(); aChannel.delete(); planes.delete(); gray.delete(); lap.delete();

            finishDiagnostic();
        } catch (err) {
            console.error("Erreur OpenCV:", err);
            // Fallback si OpenCV échoue
            state.metrics.score = 75;
            finishDiagnostic();
        }
    }

    function finishDiagnostic() {
        document.getElementById('scanner-line').style.display = "none";
        agentSpeak('cosmo', `Analyse validée. Score de vitalité : ${state.metrics.score} %. Recommandations prêtes.`);
        
        const scoreEl = document.getElementById('res-score');
        scoreEl.innerText = `${state.metrics.score}%`;
        
        // Logique de prescription
        const isSensitive = state.metrics.redness > 15;
        const morning = isSensitive ? 
            ["<b>Nettoyant pH Neutre</b> Calme l'inflammation.", "<b>Sérum B5</b> Répare la barrière."] : 
            ["<b>Sérum Vitamine C</b> Éclat antioxydant.", "<b>Fluide SPF 50</b> Protection UV."];
        
        const night = isSensitive ? 
            ["<b>Cica-Baume</b> Réparation nocturne.", "<b>Eau Thermale</b> Apaisement."] : 
            ["<b>Rétinol 0.2%</b> Renouvellement.", "<b>Acide Hyaluronique</b> Hydratation."];

        document.getElementById('morning-list').innerHTML = morning.map(s => `<div class="step">${s}</div>`).join('');
        document.getElementById('night-list').innerHTML = night.map(s => `<div class="step">${s}</div>`).join('');
        
        document.getElementById('results-overlay').style.display = "flex";
    }

    // 4. Export PDF
    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont("helvetica", "bold");
        doc.text("DERMA LÉGENDE X-PRO - RAPPORT BIOMÉTRIQUE", 20, 20);
        doc.setFont("helvetica", "normal");
        doc.text(`Score de Santé : ${state.metrics.score}%`, 20, 40);
        doc.text(`Indice Inflammation : ${state.metrics.redness}`, 20, 50);
        doc.text(`Indice Texture : ${state.metrics.texture}`, 20, 60);
        doc.save("Diagnostic_DermaPro.pdf");
    }

    function onOpenCvReady() {
        state.cvReady = true;
        document.getElementById('boot-text').innerText = "NOYAU OPENCV CHARGÉ. ACCÈS VIDÉO...";
        initVision();
    }

    document.getElementById('scan-btn').onclick = runDiagnostic;
    
    // Animation de boot simple
    const spin = "keyframes spin { to { transform: rotate(360deg); } }";
    const styleSheet = document.createElement("style");
    styleSheet.innerText = `@keyframes spin { to { transform: rotate(360deg); } }`;
    document.head.appendChild(styleSheet);
</script>
</body>
</html>
