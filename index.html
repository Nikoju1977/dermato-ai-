<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="author" content="Nicolas JULIENNE - Architecte AI Elite">
    <meta name="date" content="Mars 2026">
    <title>PureScan Nexus | V85 Mobile Resilience</title>
    
    <meta name="theme-color" content="#06b6d4">

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #06b6d4; --accent: #10b981; --danger: #ef4444; --neuro: #8b5cf6;
            --bg: #020617; --card: #0f172a; --text: #f8fafc; --border: #1e293b;
            --am: #fbbf24; --pm: #818cf8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { padding: 12px; border-bottom: 1px solid var(--border); background: var(--card); z-index: 100; display: flex; justify-content: space-between; align-items: center;}
        .arch-signature { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--primary); font-weight: 800; }
        .b2b-badge { font-size: 0.5rem; background: rgba(6, 182, 212, 0.2); color: var(--primary); border: 1px solid var(--primary); padding: 3px 6px; border-radius: 4px; font-weight: 800; }

        #viewport { position: relative; flex: 0 0 30vh; background: #000; overflow: hidden; border-bottom: 2px solid var(--primary); }
        video, #output-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; transform: scaleX(-1); }
        #output-canvas { z-index: 6; pointer-events: none; }
        
        .loading-mesh { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--primary); font-weight: 800; z-index: 20; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; display: none; text-align: center;}

        .dashboard { flex: 1; padding: 10px; display: flex; flex-direction: column; overflow-y: auto; gap: 8px; }
        
        .status-badge { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; padding: 8px; background: var(--card); border-radius: 8px; text-align: center; border: 1px solid var(--border); letter-spacing: 1px; transition: all 0.3s; }
        .status-ready { border-color: var(--primary); color: var(--primary); background: rgba(6, 182, 212, 0.1); }
        .status-error { border-color: var(--danger); color: var(--danger); background: rgba(239, 68, 68, 0.1); }

        .bio-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .stat-card { background: var(--card); padding: 12px 4px; border-radius: 12px; border: 1px solid var(--border); text-align: center; position: relative; overflow: hidden;}
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--primary); opacity: 0.5; }
        .stat-label { font-size: 0.45rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; font-weight: 800; }
        .stat-val { font-size: 1.1rem; font-weight: 800; color: var(--text); font-feature-settings: "tnum"; }
        .stat-unit { font-size: 0.55rem; color: #64748b; margin-left: 2px; }

        .main-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .tabs { display: flex; border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; background: transparent; border: none; color: #94a3b8; padding: 12px 4px; font-size: 0.65rem; cursor: pointer; font-weight: 800; text-transform: uppercase; transition: 0.2s; white-space: nowrap; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); background: rgba(6, 182, 212, 0.05); }

        #advice-area { font-size: 0.8rem; line-height: 1.5; padding: 14px; color: #cbd5e1; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 14px;}

        .section-title { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: #f8fafc; border-bottom: 1px solid #334155; padding-bottom: 4px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .report-box { padding: 12px; border-radius: 8px; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); }
        .report-box.synergy { border-left: 3px solid var(--neuro); }
        .report-box.alert { border-left: 3px solid var(--danger); background: rgba(239, 68, 68, 0.05); }
        .synergy-tags { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap;}
        .s-tag { font-size: 0.45rem; padding: 3px 6px; border-radius: 4px; font-weight: bold; background: #1e293b; color: #94a3b8; border: 1px solid #334155; text-transform: uppercase;}
        .s-tag.cmo { color: var(--primary); border-color: var(--primary); background: rgba(6, 182, 212, 0.1);}
        .box-text { font-size: 0.8rem; color: #cbd5e1; }
        .box-text strong { color: var(--primary); }
        ul.clinical-list { list-style: none; margin-top: 8px; padding-left: 0;}
        ul.clinical-list li { position: relative; padding-left: 14px; margin-bottom: 8px; font-size: 0.8rem;}
        ul.clinical-list li::before { content: '▸'; position: absolute; left: 0; color: var(--primary); font-weight: bold; }
        .step-item { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; border: 1px solid #1e293b;}
        .step-num { flex: 0 0 20px; height: 20px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: bold; color: #000;}
        .step-desc { flex: 1; font-size: 0.8rem; }
        .step-desc strong { color: #f8fafc; display: block; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 2px;}

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: auto; padding-top: 5px;}
        .btn { padding: 16px; border: none; border-radius: 12px; font-weight: 800; font-size: 0.75rem; cursor: pointer; text-transform: uppercase; transition: transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-main { background: var(--primary); color: #000; box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3); grid-column: span 2;}
        .btn-main:active { transform: scale(0.98); }
        .btn-main:disabled { background: #334155; color: #64748b; cursor: not-allowed; box-shadow: none;}
        .btn-sub { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
        .btn-sub:disabled { border-color: #334155; color: #475569; cursor: not-allowed; }
        
        .hidden-proc { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="arch-signature">Nexus Master V85</div>
        <div class="b2b-badge">MOBILE RESILIENCE</div>
    </header>

    <div id="viewport">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output-canvas"></canvas>
        <div class="loading-mesh" id="mesh-loader">BOOT MATRICE...</div>
    </div>

    <div class="dashboard">
        <div class="status-badge" id="status">INIT. BIOMÉTRIQUE...</div>
        
        <div class="bio-stats">
            <div class="stat-card">
                <div class="stat-label">Texture</div>
                <div><span id="v-text" class="stat-val">--</span><span class="stat-unit">Hz</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Sensibilité</div>
                <div><span id="v-ery" class="stat-val">--</span><span class="stat-unit">a*</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Éclat</div>
                <div><span id="v-mel" class="stat-val">--</span><span class="stat-unit">ΔL</span></div>
            </div>
        </div>
        
        <div class="main-card">
            <div class="tabs">
                <button class="tab-btn active" data-target="diag">1. Bilan & Soins</button>
                <button class="tab-btn" data-target="rituel">2. Protocoles</button>
                <button class="tab-btn" data-target="produits">3. INCI</button>
            </div>
            <div id="advice-area">
                <div class="report-box synergy">
                    <div class="box-title"><i>🩺</i> Système Opérationnel</div>
                    <div class="box-text">L'acquisition générera le dossier interactif et débloquera la fonction d'export PDF pour le patient.</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-main" id="btn-scan" disabled>Lancer l'Acquisition Clinique</button>
            <button class="btn btn-sub" id="btn-pdf" disabled style="grid-column: span 2;">📄 Exporter l'Ordonnance PDF</button>
        </div>
    </div>

    <canvas id="proc-canvas" class="hidden-proc"></canvas>
    <canvas id="mask-canvas" class="hidden-proc"></canvas>

    <script>
        const ui = {
            v: document.getElementById('webcam'),
            canvas: document.getElementById('output-canvas'),
            ctx: document.getElementById('output-canvas').getContext('2d'),
            proc: document.getElementById('proc-canvas'),
            mask: document.getElementById('mask-canvas'),
            btnScan: document.getElementById('btn-scan'),
            btnPdf: document.getElementById('btn-pdf'),
            advice: document.getElementById('advice-area'),
            status: document.getElementById('status'),
            meshLoader: document.getElementById('mesh-loader'),
            stats: { text: document.getElementById('v-text'), ery: document.getElementById('v-ery'), mel: document.getElementById('v-mel') },
            tabs: document.querySelectorAll('.tab-btn')
        };

        let state = { 
            cvReady: false, meshReady: false, faceMesh: null, lastLandmarks: null, 
            metrics: { text: 0, ery: 0, mel: 0 },
            report: { diag: "", rituel: "", produits: "" } 
        };

        const HTMLGen = {
            title: (icon, text) => `<div class="section-title"><i>${icon}</i> ${text}</div>`,
            synergy: (tags, title, text) => {
                let tagsStr = tags.map(t => `<span class="s-tag ${t === 'CMO' ? 'cmo' : ''}">${t}</span>`).join('');
                return `<div class="report-box synergy"><div class="synergy-tags">${tagsStr}</div><div class="box-text"><strong>${title} :</strong> ${text}</div></div>`;
            },
            list: (items) => `<ul class="clinical-list">${items.map(i => `<li>${i}</li>`).join('')}</ul>`,
            step: (num, title, text) => `<div class="step-item"><div class="step-num">${num}</div><div class="step-desc"><strong>${title}</strong>${text}</div></div>`
        };

        // --- MOTEUR EXPERT AGENTIQUE ---
        const AgenticSwarm = {
            consult: function(text, ery, mel) {
                let isInflamed = (ery > 132); let isRough = (text > 25); let isPigmented = (mel > 15);
                let htmlDiag = ""; let htmlRituel = ""; let htmlProduits = "";

                // DIAGNOSTIC
                htmlDiag += HTMLGen.title("🧠", "1. Analyse Agentique");
                let zones = []; let traitements = [];
                
                if (isInflamed && isRough) {
                    htmlDiag += HTMLGen.synergy(["Vasculaire", "Kératologue", "CMO"], "Inflammation Hyperkératosique", "Altération de la barrière (rougeurs) + épaississement de la couche cornée. L'exfoliation agressive est bloquée.");
                    zones.push("Joues et Ailes du nez (Érythème)", "Zone T (Irrégularités)");
                    traitements.push("LED Thérapie Rouge (Anti-inflammatoire).", "Hydrafacial doux sans acides forts.");
                } else if (isInflamed) {
                    htmlDiag += HTMLGen.synergy(["Vasculaire", "CMO"], "Hyper-réactivité Vasculaire", "Afflux sanguin sous-dermique détecté. Risque d'échauffement ou rosacée.");
                    zones.push("Pommettes, Joues, Sillons nasogéniens.");
                    traitements.push("Laser Vasculaire (VBeam / Nd:YAG).", "Cryothérapie faciale locale.");
                } else if (isRough) {
                    htmlDiag += HTMLGen.synergy(["Kératologue", "CMO"], "Relief Micro-Kystique", "Accumulation de cellules mortes. La peau est calme, l'exfoliation est autorisée.");
                    zones.push("Zone médiane (Zone T) et Menton.");
                    traitements.push("Peeling médical superficiel (Acide Glycolique 20%).", "Microneedling léger.");
                } else if (isPigmented) {
                    htmlDiag += HTMLGen.synergy(["Pigmentaire", "CMO"], "Dyschromie Mélanique", "Amas de mélanine et oxydation détectée. Perte d'homogénéité.");
                    zones.push("Haut des pommettes, Front, Lèvre supérieure.");
                    traitements.push("Laser Q-Switched ou Lumière Pulsée (IPL).", "Peeling dépigmentant léger.");
                } else {
                    htmlDiag += HTMLGen.synergy(["Essaim", "CMO"], "Homéostasie Optimale", "Biomarqueurs au vert. Objectif : Well-Aging.");
                    zones.push("Visage complet unifié.");
                    traitements.push("Radiofréquence (pour la fermeté).", "Mésothérapie (Vitamines).");
                }

                htmlDiag += `<br>` + HTMLGen.title("📍", "2. Zones & Actes Cliniques");
                htmlDiag += HTMLGen.list([...zones, ...traitements]);

                // RITUEL
                htmlRituel += HTMLGen.title("🧼", "3. Protocole de Soin");
                if (isInflamed) {
                    htmlRituel += HTMLGen.list(["Eau tiède/froide uniquement (la chaleur dilate les vaisseaux).", "Matin : Spray d'eau thermale apaisante.", "Soir : Nettoyant lacté aux doigts, sans coton."]);
                    htmlRituel += HTMLGen.step("1", "Séchage Doux", "Tamponnez avec un mouchoir à usage unique.");
                    htmlRituel += HTMLGen.step("2", "Cryo-Massage", "Conservez vos soins au frais et massez de l'intérieur vers l'extérieur.");
                } else {
                    htmlRituel += HTMLGen.list(["Température : Eau tiède.", "Double Nettoyage (Soir) : 1. Baume démaquillant. 2. Gel moussant pH neutre."]);
                    htmlRituel += HTMLGen.step("1", "Séchage Doux", "Tamponnez avec une serviette microfibre.");
                    if (isRough) htmlRituel += HTMLGen.step("2", "Rituel Peeling", "Appliquez la lotion exfoliante aux doigts. Attendez 5 min avant la crème.");
                    else htmlRituel += HTMLGen.step("2", "Massage Liftant", "Lissages ascendants pour stimuler les fibroblastes.");
                }

                // PRODUITS
                htmlProduits += HTMLGen.title("🧪", "4. Prescription INCI (À se procurer)");
                let produits = ["<b>Nettoyant :</b> Base lavante douce sans SLS.", "<b>Jour :</b> Fluide Solaire SPF 50+."];
                
                if (isInflamed && isRough) produits.push("<b>Sérum :</b> Acide Azélaïque 10% (Anti-inflammatoire et lissant).", "<b>Nuit :</b> Baume réparateur (Céramides, Panthénol).");
                else if (isInflamed) produits.push("<b>Sérum :</b> Niacinamide 5% ou extrait de Centella Asiatica.", "<b>Nuit :</b> Crème riche à l'Avoine colloïdale.");
                else if (isRough) produits.push("<b>Lotion Soir :</b> BHA (Acide Salicylique 2%) ou PHA.", "<b>Crème :</b> Gel-crème Acide Hyaluronique.");
                else if (isPigmented) produits.push("<b>Sérum Matin :</b> Vitamine C pure (10-15%).", "<b>Sérum Soir :</b> Alpha-Arbutine ou Acide Tranexamique.");
                else produits.push("<b>Sérum :</b> Complexe de Peptides (Matrixyl).", "<b>Soin Nuit :</b> Rétinol micro-encapsulé (0.1% à 0.3%).");

                htmlProduits += HTMLGen.list(produits);

                return { diag: htmlDiag, rituel: htmlRituel, produits: htmlProduits };
            }
        };

        // --- PIPELINE DE VISION ---
        async function initAll() {
            ui.meshLoader.style.display = 'block';
            state.faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
            state.faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
            state.faceMesh.onResults(onResults);
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                ui.v.srcObject = stream;
                state.camera = new Camera(ui.v, { onFrame: async () => { await state.faceMesh.send({image: ui.v}); }, width: 1280, height: 720 });
                await state.camera.start();
                state.meshReady = true; ui.meshLoader.style.display = 'none';
                checkSystem();
            } catch (e) {
                console.error("Camera error:", e);
                ui.meshLoader.innerHTML = "Caméra non autorisée<br>ou non disponible.";
                ui.meshLoader.style.color = "var(--danger)";
                updateStatus("ERREUR CAMÉRA", false, true);
            }
        }

        function onOpenCvReady() { state.cvReady = true; checkSystem(); }

        function checkSystem() {
            if (state.cvReady && state.meshReady) {
                ui.btnScan.disabled = false; updateStatus("SYSTÈME OPÉRATIONNEL", true);
            }
        }

        function updateStatus(m, ready=false, err=false) {
            ui.status.innerText = m; ui.status.className = 'status-badge';
            if(ready) ui.status.classList.add('status-ready');
            if(err) ui.status.classList.add('status-error');
        }

        function onResults(results) {
            ui.canvas.width = ui.v.videoWidth; ui.canvas.height = ui.v.videoHeight;
            ui.ctx.clearRect(0, 0, ui.canvas.width, ui.canvas.height);
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                state.lastLandmarks = results.multiFaceLandmarks[0];
                drawConnectors(ui.ctx, state.lastLandmarks, FACEMESH_FACE_OVAL, {color: '#06b6d4', lineWidth: 1});
            } else { state.lastLandmarks = null; }
        }

        // ============================================================================
        // 🔬 FIX V85 : CŒUR DU CALCUL TENSORIEL (RÉSILIENCE MOBILE)
        // ============================================================================
        
        // Tableau ordonné fixe de l'ovale du visage (Garantit que le masque ne sera jamais vide)
        const OVAL_INDICES = [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109];
        const EYE_L_INDICES = [33, 7, 163, 144, 145, 153, 154, 155, 133, 173, 157, 158, 159, 160, 161, 246];
        const EYE_R_INDICES = [362, 382, 381, 380, 374, 373, 390, 249, 263, 466, 388, 387, 386, 385, 384, 398];
        const LIPS_INDICES = [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 409, 270, 269, 267, 0, 37, 39, 40];

        function drawSafeMask(ctx, indices, w, h, color, composite) {
            ctx.globalCompositeOperation = composite;
            ctx.fillStyle = color;
            ctx.beginPath();
            indices.forEach((idx, i) => {
                let p = state.lastLandmarks[idx];
                if(i === 0) ctx.moveTo(p.x * w, p.y * h);
                else ctx.lineTo(p.x * w, p.y * h);
            });
            ctx.closePath();
            ctx.fill();
        }

        async function runAnalysis() {
            if (!state.lastLandmarks || !state.cvReady) return;
            
            // On bloque l'interface
            ui.btnScan.disabled = true; ui.btnPdf.disabled = true; 
            updateStatus("CALCUL EN COURS...");
            
            // FIX V85 : Le setTimeout laisse le navigateur afficher "CALCUL EN COURS..." 
            // AVANT de geler le téléphone avec les calculs lourds d'OpenCV
            setTimeout(() => {
                try {
                    const W = ui.v.videoWidth; const H = ui.v.videoHeight;
                    ui.proc.width = W; ui.proc.height = H; ui.mask.width = W; ui.mask.height = H;
                    
                    const procCtx = ui.proc.getContext('2d', {willReadFrequently: true});
                    const maskCtx = ui.mask.getContext('2d', {willReadFrequently: true});

                    procCtx.drawImage(ui.v, 0, 0, W, H);
                    maskCtx.fillStyle = '#000000'; maskCtx.fillRect(0, 0, W, H);
                    
                    // FIX V85 : Dessin de masque garanti sans boucle infinie
                    drawSafeMask(maskCtx, OVAL_INDICES, W, H, '#FFFFFF', 'source-over');
                    drawSafeMask(maskCtx, EYE_L_INDICES, W, H, '#000000', 'destination-out');
                    drawSafeMask(maskCtx, EYE_R_INDICES, W, H, '#000000', 'destination-out');
                    drawSafeMask(maskCtx, LIPS_INDICES, W, H, '#000000', 'destination-out');

                    // EXÉCUTION OPENCV (Blindée)
                    let srcMat = cv.imread(ui.proc);
                    let maskMatRaw = cv.imread(ui.mask); 
                    let maskMat = new cv.Mat(); cv.cvtColor(maskMatRaw, maskMat, cv.COLOR_RGBA2GRAY);
                    
                    let grayMat = new cv.Mat(); cv.cvtColor(srcMat, grayMat, cv.COLOR_RGBA2GRAY);
                    
                    // Conversion mobile-safe : RGBA -> RGB -> LAB
                    let rgbMat = new cv.Mat(); cv.cvtColor(srcMat, rgbMat, cv.COLOR_RGBA2RGB);
                    let labMat = new cv.Mat(); cv.cvtColor(rgbMat, labMat, cv.COLOR_RGB2Lab);
                    let labPlanes = new cv.MatVector(); cv.split(labMat, labPlanes);

                    let lap = new cv.Mat(); cv.Laplacian(grayMat, lap, cv.CV_64F);
                    
                    let meanMat = new cv.Mat(); let stdMat = new cv.Mat(); 
                    
                    cv.meanStdDev(lap, meanMat, stdMat, maskMat); 
                    state.metrics.text = stdMat.data64F ? parseFloat(stdMat.data64F[0].toFixed(2)) : 0;

                    cv.meanStdDev(labPlanes.get(1), meanMat, stdMat, maskMat);
                    state.metrics.ery = meanMat.data64F ? parseFloat(meanMat.data64F[0].toFixed(1)) : 0;

                    cv.meanStdDev(labPlanes.get(0), meanMat, stdMat, maskMat);
                    state.metrics.mel = stdMat.data64F ? parseFloat(stdMat.data64F[0].toFixed(1)) : 0;

                    ui.stats.text.innerText = state.metrics.text; 
                    ui.stats.ery.innerText = state.metrics.ery; 
                    ui.stats.mel.innerText = state.metrics.mel;

                    // NETTOYAGE MÉMOIRE ABSOLU
                    srcMat.delete(); maskMatRaw.delete(); maskMat.delete(); 
                    grayMat.delete(); rgbMat.delete(); labMat.delete(); labPlanes.delete(); 
                    lap.delete(); meanMat.delete(); stdMat.delete();

                    // Affichage des résultats
                    state.report = AgenticSwarm.consult(state.metrics.text, state.metrics.ery, state.metrics.mel);
                    ui.tabs.forEach(t => t.classList.remove('active')); ui.tabs[0].classList.add('active');
                    ui.advice.innerHTML = state.report.diag; 
                    
                    updateStatus("DOSSIER GÉNÉRÉ. EXPORT DISPONIBLE.", true);
                    ui.btnScan.disabled = false;
                    ui.btnPdf.disabled = false;

                } catch (error) {
                    // FIX V85 : En cas de crash OpenCV, l'application ne freeze plus
                    console.error("Crash Matrice Mobile :", error);
                    ui.advice.innerHTML = `<div class="report-box alert"><div class="box-title">🚨 Échec du Calcul Cutané</div><div class="box-text">L'analyse a échoué. Assurez-vous d'être bien éclairé et relancez le scan.</div></div>`;
                    updateStatus("ERREUR D'ANALYSE", false, true);
                    ui.btnScan.disabled = false;
                }
            }, 100); // 100ms de pause pour laisser le téléphone respirer avant le calcul
        }

        ui.btnScan.onclick = runAnalysis;
        
        ui.tabs.forEach(btn => {
            btn.onclick = () => {
                ui.tabs.forEach(t => t.classList.remove('active')); btn.classList.add('active');
                ui.advice.innerHTML = state.report[btn.dataset.target] || "Données en attente.";
            };
        });

        // ============================================================================
        // 🖨️ EXPORT PDF 
        // ============================================================================
        function stripHTMLForPDF(html) {
            let text = html.replace(/<li>/gi, '\n- ').replace(/<\/li>/gi, '');
            text = text.replace(/<div class="step-desc">/gi, ' : ').replace(/<div class="step-num">/gi, '\nÉtape ');
            text = text.replace(/<b>/gi, '').replace(/<\/b>/gi, '');
            text = text.replace(/<strong>/gi, '').replace(/<\/strong>/gi, '');
            text = text.replace(/<br\s*[\/]?>/gi, "\n").replace(/<\/div>/gi, "\n");
            return text.replace(/<[^>]+>/g, '').replace(/\n\s*\n/g, '\n\n').trim();
        }

        ui.btnPdf.onclick = () => {
            updateStatus("GÉNÉRATION DU PDF EN COURS...");
            const { jsPDF } = window.jspdf; 
            const doc = new jsPDF('p', 'mm', 'a4');
            
            doc.setFillColor(248, 250, 252); doc.rect(0, 0, 210, 297, 'F');
            doc.setFillColor(15, 23, 42); doc.rect(0, 0, 210, 35, 'F');
            
            doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.setFont("helvetica", "bold");
            doc.text("ORDONNANCE DERMOCOSMÉTIQUE", 15, 20);
            doc.setFontSize(10); doc.setTextColor(6, 182, 212); doc.setFont("helvetica", "normal");
            doc.text("Généré par Nexus AI System V85", 15, 28);
            
            let today = new Date().toLocaleDateString('fr-FR');
            doc.setTextColor(255, 255, 255); doc.text(`Date : ${today}`, 165, 20);

            doc.setTextColor(15, 23, 42); doc.setFontSize(14); doc.setFont("helvetica", "bold");
            doc.text("1. Relevé Biométrique (CIELAB)", 15, 50);
            doc.setDrawColor(203, 213, 225); doc.line(15, 52, 195, 52);
            
            doc.setFontSize(10); doc.setFont("helvetica", "normal");
            doc.text(`> Relief Cutané (Laplacien) : ${state.metrics.text} Hz`, 15, 60);
            doc.text(`> Sensibilité (Érythème a*) : ${state.metrics.ery}`, 15, 67);
            doc.text(`> Dyschromie (Mélanine ΔL) : ${state.metrics.mel}`, 15, 74);

            let yPos = 90;
            const printSection = (title, rawHTML) => {
                if (yPos > 250) { doc.addPage(); yPos = 20; }
                
                doc.setTextColor(6, 182, 212); doc.setFontSize(14); doc.setFont("helvetica", "bold");
                doc.text(title, 15, yPos);
                doc.setDrawColor(203, 213, 225); doc.line(15, yPos + 2, 195, yPos + 2);
                yPos += 12;

                doc.setTextColor(51, 65, 85); doc.setFontSize(10); doc.setFont("helvetica", "normal");
                let cleanText = stripHTMLForPDF(rawHTML);
                let lines = doc.splitTextToSize(cleanText, 180);
                
                if (yPos + (lines.length * 5) > 280) { doc.addPage(); yPos = 20; }
                doc.text(lines, 15, yPos);
                yPos += (lines.length * 5) + 15;
            };

            printSection("2. Synthèse Clinique & Actes", state.report.diag);
            printSection("3. Protocoles & Gestuelle", state.report.rituel);
            printSection("4. Prescription de Soins INCI", state.report.produits);

            doc.setFontSize(8); doc.setTextColor(148, 163, 184);
            doc.text("Document généré par IA - Nexus System. Ne remplace pas une consultation médicale.", 105, 290, {align: "center"});

            if (/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
                const blob = doc.output('blob');
                window.open(URL.createObjectURL(blob));
            } else {
                doc.save(`Ordonnance_Nexus_${today.replace(/\//g, '-')}.pdf`);
            }
            updateStatus("PDF GÉNÉRÉ AVEC SUCCÈS", true);
        };

        window.onload = initAll;
    </script>
</body>
</html>
