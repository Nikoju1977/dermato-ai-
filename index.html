<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PureScan Nexus | Dispositif d'Analyse Clinique EBM</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.5.0/opencv.js" onload="onOpenCvScriptLoaded();"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #2563eb; --primary-dark: #1e40af; --bg-dark: #0f172a; --bg-panel: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8; --danger: #ef4444; --warning: #f59e0b; --success: #10b981; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
            /* Sécurité pour les anciens navigateurs */
            -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
        }

        #viewport { position: relative; flex: 0 0 30vh; background: #000; overflow: hidden; border-bottom: 1px solid #334155; }
        video, #preview-img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        #preview-img { display: none; z-index: 5; }
        .guide-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40vw; height: 40vw; max-width: 180px; max-height: 180px; border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 12px; z-index: 10; transition: all 0.3s ease; }
        .guide-box::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.5); }
        .guide-box.scanning { border-color: var(--primary); transform: translate(-50%, -50%) scale(0.95); background: rgba(37, 99, 235, 0.1); }

        /* Ajustement dynamique pour les encoches d'iPhone (Safe Area) */
        .dashboard { flex: 1; padding: 10px 14px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); display: flex; flex-direction: column; background: var(--bg-dark); overflow-y: auto; }
        
        .status-badge { font-size: 0.65rem; color: var(--text-main); letter-spacing: 0.5px; text-transform: uppercase; font-weight: 600; padding: 6px 10px; background: var(--bg-panel); border-radius: 6px; text-align: center; margin-bottom: 8px; border: 1px solid #334155; transition: all 0.3s; }
        .batch-tracker { display: flex; gap: 8px; margin-bottom: 8px; justify-content: center; align-items: center; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #334155; transition: 0.3s; }
        .dot.active { background: var(--primary); box-shadow: 0 0 8px rgba(37, 99, 235, 0.6); }

        .analysis-card { background: var(--bg-panel); border-radius: 12px; padding: 12px; border: 1px solid #334155; margin-bottom: 8px; display: flex; flex-direction: column; flex-grow: 1; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #334155; }
        .risk-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 2px; }
        #risk-val { font-size: 2rem; font-weight: 700; color: var(--text-main); line-height: 1; transition: color 0.3s; }
        
        /* Cacher la barre de défilement sur TOUS les navigateurs */
        .tabs { display: flex; gap: 6px; margin-bottom: 8px; overflow-x: auto; padding-bottom: 6px; scrollbar-width: none; -ms-overflow-style: none; -webkit-overflow-scrolling: touch; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { flex: 0 0 auto; background: transparent; border: 1px solid #475569; color: var(--text-muted); padding: 6px 10px; border-radius: 6px; font-size: 0.65rem; cursor: pointer; transition: 0.2s; font-weight: 600; }
        .tab-btn.active { background: #334155; color: var(--text-main); border-color: #64748b; }
        .tab-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        #advice { font-size: 0.75rem; color: var(--text-main); line-height: 1.6; text-align: left; padding: 12px; background: #0f172a; border-radius: 8px; border-left: 3px solid var(--primary); white-space: pre-line; flex-grow: 1; overflow-y: auto; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: auto; padding-bottom: 4px; }
        .btn { padding: 10px; border: none; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-main { background: var(--primary); color: white; grid-column: span 2; padding: 12px; font-size: 0.8rem;}
        .btn-main:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        .btn-sub { background: transparent; color: var(--text-main); border: 1px solid #475569; }
        .btn-full { grid-column: span 2; }
        
        /* Compatibilité Select Safari/Firefox/Chrome */
        .btn-select { 
            grid-column: span 2; background: #0f172a; color: var(--text-main); border: 1px solid #475569; 
            appearance: none; -webkit-appearance: none; -moz-appearance: none; padding-right: 30px;
            background-image: url("data:image/svg+xml;utf8,<svg fill='%2394a3b8' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>");
            background-repeat: no-repeat; background-position-x: 96%; background-position-y: center;
        }
        
        .legal-disclaimer { text-align: center; font-size: 0.5rem; color: #64748b; margin-top: 6px; line-height: 1.4; padding: 0 5px; }
    </style>
</head>
<body>

    <div id="viewport">
        <video id="webcam" autoplay playsinline muted></video>
        <img id="preview-img">
        <div class="guide-box" id="guide"></div>
    </div>

    <div class="dashboard">
        <div id="status" class="status-badge">AUTO-DIAGNOSTIC SYSTÈME...</div>

        <div class="batch-tracker" id="batch-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>

        <div class="analysis-card">
            <div class="top-row">
                <div>
                    <div class="risk-label">Pathologie (HAM10000)</div>
                    <div id="risk-val">--%</div>
                </div>
            </div>

            <div class="tabs" id="agent-tabs">
                <button class="tab-btn active" data-target="bilan" disabled>Physiopathologie</button>
                <button class="tab-btn" data-target="nettoyage" disabled>Lavage</button>
                <button class="tab-btn" data-target="matin" disabled>Rituel Matin</button>
                <button class="tab-btn" data-target="soir" disabled>Rituel Soir</button>
                <button class="tab-btn" data-target="actifs" disabled>Ciblage INCI</button>
            </div>

            <div id="advice">En attente de connexion sécurisée...</div>
        </div>

        <div class="controls">
            <input type="file" id="file-in" style="display:none;" accept="image/*" multiple>
            
            <button class="btn btn-main" id="btn-scan" disabled>DÉMARRER L'EXAMEN CLINIQUE</button>
            <select id="camera-select" class="btn btn-select"><option value="">Détection des capteurs optiques...</option></select>
            <button class="btn btn-sub" id="btn-upload">📁 Import Multiple</button>
            <button class="btn btn-sub" id="btn-reset">🔄 Patient</button>
            <button class="btn btn-sub btn-full" id="btn-api">🔑 Configurer la Clé API Mistral</button>
        </div>
        
        <div class="legal-disclaimer">Dispositif Médical Expérimental (EBM). Ne remplace pas un diagnostic officiel certifié.</div>
    </div>

    <canvas id="proc-canvas" style="display:none;"></canvas>

    <script>
        // ==========================================
        // GESTION SÉCURISÉE DE LA CLÉ API
        // ==========================================
        function getApiKey() { return localStorage.getItem('mistral_api_key') || ""; }
        document.getElementById('btn-api').onclick = () => {
            const newKey = prompt("Veuillez saisir votre clé API Mistral :", getApiKey());
            if (newKey !== null) { localStorage.setItem('mistral_api_key', newKey.trim()); updateStatus("CLÉ API ENREGISTRÉE", "var(--success)"); }
        };

        const ui = {
            v: document.getElementById('webcam'), img: document.getElementById('preview-img'),
            btnScan: document.getElementById('btn-scan'), status: document.getElementById('status'),
            advice: document.getElementById('advice'), risk: document.getElementById('risk-val'),
            guide: document.getElementById('guide'), dots: document.querySelectorAll('.dot'),
            canvas: document.getElementById('proc-canvas'), tabs: document.querySelectorAll('.tab-btn'),
            camSelect: document.getElementById('camera-select')
        };
        
        let state = { cvReady: false, aiReady: false, isLive: true, batchCount: 0, results: [], model: null, isMedicalModel: false, videoReady: false, currentDeviceId: null, videoStream: null, agentData: { bilan: "", nettoyage: "", matin: "", soir: "", actifs: "" } };

        const HAM10000_CLASSES = [
            { id: "akiec", name: "Kératose Actinique (Pré-cancéreux)", danger: 85 },
            { id: "bcc", name: "Carcinome Basocellulaire", danger: 95 },
            { id: "bkl", name: "Kératose Séborrhéique (Bénin)", danger: 15 },
            { id: "df", name: "Dermatofibrome (Bénin)", danger: 10 },
            { id: "mel", name: "Mélanome (Malin)", danger: 100 },
            { id: "nv", name: "Nævus Mélanocytaire (Bénin)", danger: 5 },
            { id: "vasc", name: "Lésion Vasculaire (Bénin)", danger: 20 }
        ];

        window.onload = () => { initAI(); initCamera(); };

        // Poll OpenCV pour éviter les problèmes de cache réseau lents
        function onOpenCvScriptLoaded() {
            let retries = 0; const checkCv = setInterval(() => {
                if (typeof cv !== 'undefined' && typeof cv.Mat === 'function') { clearInterval(checkCv); state.cvReady = true; checkSystemReady(); }
                if(++retries > 50) { clearInterval(checkCv); updateStatus("ERREUR MATÉRIELLE : OPENCV", "var(--danger)"); }
            }, 200);
        }

        async function initAI() {
            updateStatus("CONNEXION AU RÉSEAU MÉDICAL...", "var(--primary)");
            try { await tf.setBackend('webgl'); await tf.ready(); } catch (err) { await tf.setBackend('cpu'); await tf.ready(); }
            try {
                state.model = await tf.loadLayersModel('./model/model.json');
                state.isMedicalModel = true; state.aiReady = true; 
                updateStatus("IA DERMATOLOGIQUE CHARGÉE (HAM10000)", "var(--success)");
                checkSystemReady();
            } catch (e) {
                updateStatus("MODE GÉNÉRALISTE (MODÈLE MÉDICAL ABSENT)", "var(--warning)");
                try {
                    state.model = await mobilenet.load({version: 2, alpha: 1.0}); 
                    state.isMedicalModel = false; state.aiReady = true; 
                    checkSystemReady();
                } catch(e2) { updateStatus("ERREUR MATÉRIELLE IA", "var(--danger)"); }
            }
        }

        async function getCameras() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoInputs = devices.filter(device => device.kind === 'videoinput');
                ui.camSelect.innerHTML = ''; 
                if (videoInputs.length === 0) return;
                videoInputs.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId; option.text = device.label || `Objectif ${index + 1}`;
                    ui.camSelect.appendChild(option);
                });
                if (state.currentDeviceId) { ui.camSelect.value = state.currentDeviceId; } else { state.currentDeviceId = videoInputs[0].deviceId; }
            } catch (e) { console.warn("Erreur capteurs", e); }
        }

        // CORRECTIF iOS SAFARI : Séparation des contraintes de caméra
        async function initCamera(deviceId = null) {
            if (state.videoStream) { state.videoStream.getTracks().forEach(track => track.stop()); }
            try {
                let constraints = { video: {} };
                if (deviceId) {
                    constraints.video.deviceId = { exact: deviceId };
                } else {
                    constraints.video.facingMode = 'environment';
                }
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                state.videoStream = stream; ui.v.srcObject = stream;
                
                // Hack compatibilité mobile pour le démarrage vidéo
                ui.v.setAttribute('autoplay', '');
                ui.v.setAttribute('muted', '');
                ui.v.setAttribute('playsinline', '');
                
                ui.v.onloadedmetadata = async () => { state.videoReady = true; checkSystemReady(); if (ui.camSelect.options.length <= 1) await getCameras(); };
            } catch (e) { state.isLive = false; state.videoReady = true; updateStatus("MODE IMPORTATION", "var(--warning)"); }
        }

        ui.camSelect.addEventListener('change', (e) => { 
            state.currentDeviceId = e.target.value; 
            state.isLive = true; 
            ui.img.style.display = "none"; 
            ui.v.style.display = "block";
            updateStatus("CALIBRAGE...", "var(--primary)"); 
            initCamera(state.currentDeviceId); 
        });

        function checkSystemReady() {
            if (state.cvReady && state.aiReady && state.videoReady) {
                updateStatus(state.isMedicalModel ? "IA CLINIQUE OPÉRATIONNELLE" : "IA SECONDAIRE OPÉRATIONNELLE", "var(--success)"); 
                ui.btnScan.disabled = false; ui.advice.innerText = "Alignez la lésion au centre du viseur.";
            }
        }

        function updateStatus(text, color = "var(--text-main)") { ui.status.innerText = text; ui.status.style.color = color; ui.status.style.borderColor = color === "var(--text-main)" ? "#334155" : color; }

        // ==========================================
        // LE MOTEUR D'EXÉCUTION (BATCH COMPATIBLE)
        // ==========================================
        async function executeAnalysis() {
            if (!state.cvReady || !state.aiReady) return;
            ui.btnScan.disabled = true; ui.guide.classList.add('scanning');
            updateStatus("ANALYSE EN COURS...", "var(--primary)");
            ui.tabs.forEach(t => t.disabled = true);

            const ctx = ui.canvas.getContext('2d'); ui.canvas.width = 224; ui.canvas.height = 224;
            const source = state.isLive ? ui.v : ui.img;
            const sW = state.isLive ? ui.v.videoWidth : ui.img.naturalWidth;
            const sH = state.isLive ? ui.v.videoHeight : ui.img.naturalHeight;
            const size = Math.min(sW, sH);
            ctx.drawImage(source, (sW - size)/2, (sH - size)/2, size, size, 0, 0, 224, 224);

            let srcRGBA, srcRGB, gray, kernel, dst, finalScore, detectedPathology;
            try {
                srcRGBA = cv.imread(ui.canvas); srcRGB = new cv.Mat(); cv.cvtColor(srcRGBA, srcRGB, cv.COLOR_RGBA2RGB); 
                gray = new cv.Mat(); cv.cvtColor(srcRGBA, gray, cv.COLOR_RGBA2GRAY);
                kernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(5, 1));
                cv.morphologyEx(gray, gray, cv.MORPH_BLACKHAT, kernel); cv.threshold(gray, gray, 15, 255, cv.THRESH_BINARY);
                dst = new cv.Mat(); cv.inpaint(srcRGB, gray, dst, 3, cv.INPAINT_TELEA); cv.imshow(ui.canvas, dst); 

                // Pause asynchrone pour laisser le DOM respirer (Anti-Crash Android)
                await tf.nextFrame();

                if (state.isMedicalModel) {
                    let tensor = tf.browser.fromPixels(ui.canvas).resizeNearestNeighbor([224, 224]).toFloat();
                    let normalized = tensor.div(tf.scalar(255.0)).expandDims();
                    const predictions = await state.model.predict(normalized).data();
                    tf.dispose([tensor, normalized]);

                    const maxProbIndex = predictions.indexOf(Math.max(...predictions));
                    const rawProb = predictions[maxProbIndex];
                    
                    detectedPathology = HAM10000_CLASSES[maxProbIndex].name;
                    finalScore = Math.min(Math.round((rawProb * 100 * 0.4) + (HAM10000_CLASSES[maxProbIndex].danger * 0.6)), 99);
                } else {
                    const tensor = tf.browser.fromPixels(ui.canvas);
                    const predictions = await state.model.classify(tensor);
                    tf.dispose(tensor); 
                    finalScore = Math.min(Math.round(predictions[0].probability * 100 * 1.5), 99); 
                    detectedPathology = "Lésion non-classifiée";
                }

                state.batchCount++;
                ui.dots[state.batchCount - 1].classList.add('active');
                ui.risk.innerText = finalScore + "%";
                ui.risk.style.color = finalScore >= 60 ? "var(--danger)" : (finalScore >= 30 ? "var(--warning)" : "var(--success)");

                ui.advice.innerText = `Lésion : ${detectedPathology}. Interrogation EBM...`;
                await fetchMistralMultiAgent(finalScore, detectedPathology);

                state.results.push({ risk: finalScore, pathology: detectedPathology, img: ui.canvas.toDataURL('image/jpeg', 0.8), report: state.agentData });

                ui.tabs.forEach(t => t.disabled = false); switchTab('bilan'); 

                if (state.batchCount >= 5) {
                    updateStatus("ÉDITION DU DOSSIER PATIENT PDF...", "var(--success)"); generatePDF(); ui.btnScan.disabled = true;
                } else {
                    updateStatus(`ZONE ${state.batchCount}/5 ANALYSÉE`, "var(--primary)"); 
                    if(state.isLive) ui.btnScan.disabled = false;
                }
            } catch (err) { 
                updateStatus("ERREUR D'ANALYSE", "var(--danger)"); 
                if(state.isLive) ui.btnScan.disabled = false; 
                console.error(err);
            } finally {
                if(srcRGBA) srcRGBA.delete(); if(srcRGB) srcRGB.delete(); if(gray) gray.delete(); if(kernel) kernel.delete(); if(dst) dst.delete();
                ui.guide.classList.remove('scanning');
            }
        }

        ui.btnScan.onclick = executeAnalysis;

        async function fetchMistralMultiAgent(riskScore, pathology) {
            const apiKey = getApiKey();
            if(!apiKey) {
                state.agentData = { bilan: `Détection : ${pathology}. Dermoscopie requise.`, nettoyage: "Nettoyage syndet.", matin: "1. Antioxydant\n2. SPF50", soir: "1. Lavage\n2. Réparation", actifs: "Niacinamide, Céramides." }; return;
            }
            try {
                const systemPrompt = `Tu es un Professeur en Dermatologie (EBM). Analyse la pathologie suspectée: "${pathology}" (Score gravité: ${riskScore}%).
                Fournis un JSON strict avec: 'bilan' (physiopathologie), 'nettoyage' (pH/microbiome), 'matin' (3 étapes diurnes), 'soir' (3 étapes nocturnes), 'actifs' (Molécules INCI). Ton académique. Ne coupe pas les phrases.`;

                const response = await fetch('https://api.mistral.ai/v1/chat/completions', {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({ model: "mistral-small-latest", response_format: { type: "json_object" }, messages: [{ role: "system", content: systemPrompt }, { role: "user", content: `Génère le rapport.` }] })
                });
                
                let content = (await response.json()).choices[0].message.content;
                content = content.replace(/```json/gi, '').replace(/```/g, '').trim();
                let parsed;
                try { parsed = JSON.parse(content); } catch (e) {
                    const first = content.indexOf('{'); const last = content.lastIndexOf('}');
                    if (first !== -1 && last > first) { parsed = JSON.parse(content.substring(first, last + 1)); } 
                    else { parsed = { bilan: "Erreur IA", nettoyage: "-", matin: "-", soir: "-", actifs: "-" }; }
                }
                state.agentData = { 
                    bilan: (parsed && parsed.bilan) ? String(parsed.bilan) : "-", 
                    nettoyage: (parsed && parsed.nettoyage) ? String(parsed.nettoyage) : "-", 
                    matin: (parsed && parsed.matin) ? String(parsed.matin) : "-", 
                    soir: (parsed && parsed.soir) ? String(parsed.soir) : "-", 
                    actifs: (parsed && parsed.actifs) ? String(parsed.actifs) : "-" 
                };
            } catch (e) { state.agentData = { bilan: "Erreur Réseau", nettoyage: "-", matin: "-", soir: "-", actifs: "-" }; }
        }

        ui.tabs.forEach(btn => { btn.addEventListener('click', () => { if(!btn.disabled) switchTab(btn.dataset.target); }); });
        function switchTab(targetAgent) {
            ui.tabs.forEach(t => t.classList.remove('active')); document.querySelector(`button[data-target="${targetAgent}"]`).classList.add('active');
            ui.advice.innerText = state.agentData[targetAgent];
            const colors = { bilan: "var(--primary)", nettoyage: "#38bdf8", matin: "#fcd34d", soir: "#818cf8", actifs: "var(--success)" };
            ui.advice.style.borderLeftColor = colors[targetAgent];
        }

        // ==========================================
        // MOTEUR PDF UNIVERSEL
        // ==========================================
        function generatePDF() {
            try {
                const { jsPDF } = window.jspdf; const doc = new jsPDF();
                let pageNum = 1; const pageWidth = doc.internal.pageSize.width; const pageHeight = doc.internal.pageSize.height; const margin = 20;

                const printHeader = () => {
                    doc.setFillColor(248, 250, 252); doc.rect(0, 0, pageWidth, 50, 'F'); doc.setTextColor(15, 23, 42); doc.setFont("helvetica", "bold"); doc.setFontSize(18); doc.text("PURESCAN NEXUS | EXPERTISE CLINIQUE", margin, 20); doc.setTextColor(100, 116, 139); doc.setFont("helvetica", "normal"); doc.setFontSize(10); doc.text("DOSSIER PATIENT EBM", margin, 28);
                    doc.setFontSize(9); doc.setTextColor(15, 23, 42); doc.text("Patient : ________________________", margin, 40); doc.text("ID : ________________", margin + 85, 40); doc.text(`Date : ${new Date().toLocaleDateString('fr-FR')}`, margin + 150, 40); doc.setDrawColor(203, 213, 225); doc.line(margin, 50, pageWidth - margin, 50);
                };
                const printFooter = () => {
                    doc.setTextColor(148, 163, 184); doc.setFont("helvetica", "italic"); doc.setFontSize(7); doc.text("Document IA. Validation médicale requise.", pageWidth / 2, pageHeight - 11, { align: "center" }); doc.setFont("helvetica", "normal"); doc.text(`Page ${pageNum}`, pageWidth - margin, pageHeight - 10, { align: "right" });
                };

                printHeader(); let yOffset = 60;
                state.results.forEach((res, i) => {
                    if (yOffset > 150) { printFooter(); doc.addPage(); pageNum++; printHeader(); yOffset = 60; }
                    doc.setTextColor(15, 23, 42); doc.setFont("helvetica", "bold"); doc.setFontSize(14); doc.text(`Lésion n°${i+1} : ${res.pathology}`, margin, yOffset); doc.setFont("helvetica", "normal"); doc.setFontSize(10); if(res.risk >= 60) doc.setTextColor(220, 38, 38); else if(res.risk >= 30) doc.setTextColor(217, 119, 6); else doc.setTextColor(5, 150, 105); doc.text(`Gravité évaluée : ${res.risk}%`, margin, yOffset + 6); doc.setDrawColor(203, 213, 225); doc.rect(164, yOffset - 4, 27, 27); doc.addImage(res.img, 'JPEG', 165, yOffset - 3, 25, 25); yOffset += 16;
                    const printBlock = (title, text, color) => { doc.setFontSize(9); const lines = doc.splitTextToSize(text.replace(/\\n/g, '\n').replace(/\*/g, ''), 115); const bH = (lines.length * 4) + 8; if (yOffset + bH > 270) { printFooter(); doc.addPage(); pageNum++; printHeader(); yOffset = 60; } doc.setTextColor(color[0], color[1], color[2]); doc.setFont("helvetica", "bold"); doc.text(title, margin, yOffset); doc.setTextColor(71, 85, 105); doc.setFont("helvetica", "normal"); doc.text(lines, margin + 28, yOffset); yOffset += bH; };
                    printBlock("Bilan :", res.report.bilan, [37, 99, 235]); printBlock("Lavage :", res.report.nettoyage, [14, 165, 233]); printBlock("Matin :", res.report.matin, [217, 119, 6]); printBlock("Soir :", res.report.soir, [79, 70, 229]); printBlock("INCI :", res.report.actifs, [5, 150, 105]);
                    if (yOffset + 25 > 275) { printFooter(); doc.addPage(); pageNum++; printHeader(); yOffset = 60; } doc.setFontSize(9); doc.setTextColor(15, 23, 42); doc.setFont("helvetica", "bold"); doc.text("Prescription :", margin, yOffset + 4); try { var tf = new jsPDF.API.AcroForm.TextField(); tf.Rect = [margin + 28, yOffset, 130, 12]; tf.multiline = true; tf.V = ""; tf.T = "Prescription" + i; doc.addField(tf); doc.setDrawColor(203, 213, 225); doc.rect(margin + 28, yOffset, 130, 12); } catch(e) { doc.setDrawColor(203, 213, 225); doc.rect(margin + 28, yOffset, 130, 12); } yOffset += 18; doc.setDrawColor(226, 232, 240); doc.line(margin, yOffset, pageWidth - margin, yOffset); yOffset += 8;
                });
                printFooter(); 
                
                // Fallback sécurité Partage Web vs Ordinateur
                if (navigator.share && /Mobi|Android|iPhone/i.test(navigator.userAgent)) {
                    const blob = doc.output('blob'); const file = new File([blob], "Dossier_Medical.pdf", { type: 'application/pdf' });
                    navigator.share({ title: 'Dossier Clinique', files: [file] }).catch(() => window.open(URL.createObjectURL(blob), '_blank'));
                } else { doc.save(`Dossier_Medical_PureScan.pdf`); }
            } catch (e) { updateStatus("ERREUR PDF", "var(--danger)"); ui.btnScan.disabled = false; console.error(e); }
        }

        // ==========================================
        // SÉQUENCEUR DE FICHIERS MULTIPLES (BATCH)
        // ==========================================
        document.getElementById('btn-upload').onclick = () => document.getElementById('file-in').click();
        
        document.getElementById('file-in').onchange = async (e) => { 
            if (!e.target.files || e.target.files.length === 0) return; 
            
            if(state.videoStream) { state.videoStream.getTracks().forEach(t => t.stop()); } 
            state.isLive = false; 
            ui.v.style.display = "none";
            ui.img.style.display = "block";
            
            let files = Array.from(e.target.files);
            let slots = 5 - state.batchCount;
            
            if(files.length > slots) {
                alert(`Le dossier médical est limité à 5 lésions. Seules les ${slots} premières images seront analysées.`);
                files = files.slice(0, slots);
            }
            
            ui.btnScan.disabled = true;
            document.getElementById('btn-upload').disabled = true;
            
            for (let i = 0; i < files.length; i++) {
                updateStatus(`CHARGEMENT IMAGE ${i+1}/${files.length}...`, "var(--warning)");
                
                await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        ui.img.src = ev.target.result;
                        // Donne le temps au DOM de peindre l'image pour l'extraction Canvas
                        setTimeout(resolve, 250); 
                    };
                    reader.readAsDataURL(files[i]);
                });
                
                await executeAnalysis();
                if (state.batchCount >= 5) break;
                // Protection contre la saturation réseau Mistral API
                await new Promise(r => setTimeout(r, 1500));
            }
            
            document.getElementById('btn-upload').disabled = false;
        };

        document.getElementById('btn-reset').onclick = () => { 
            ui.img.style.display = "none"; 
            ui.v.style.display = "block";
            document.getElementById('file-in').value = ""; 
            state.isLive = true; 
            initCamera(state.currentDeviceId); 
            state.batchCount = 0; 
            state.results = []; 
            ui.dots.forEach(d => d.classList.remove('active')); 
            ui.btnScan.disabled = false; 
            ui.risk.innerText = "--%"; 
            ui.risk.style.color = "var(--text-main)"; 
            ui.tabs.forEach(t => { t.disabled = true; t.classList.remove('active'); }); 
            ui.tabs[0].classList.add('active'); 
            ui.advice.style.borderLeftColor = "var(--primary)"; 
            updateStatus("SYSTÈME PRÊT", "var(--success)"); 
            ui.advice.innerText = "Dossier réinitialisé. Nouveau patient."; 
        };
        
        if ('serviceWorker' in navigator) { const swBlob = new Blob([`self.addEventListener('install', e => e.waitUntil(caches.open('purescan').then(c => c.addAll(['index.html'])))); self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(res => res || fetch(e.request))));`], { type: 'application/javascript' }); navigator.serviceWorker.register(URL.createObjectURL(swBlob)); }
    </script>
</body>
</html>
