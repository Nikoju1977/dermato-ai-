<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3063/3063176.png">
    <title>PureScan Nexus | Dispositif Clinique</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.5.0/opencv.js" onload="onOpenCvScriptLoaded();"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #2563eb; --primary-dark: #1e40af; 
            --bg-dark: #0f172a; --bg-panel: #1e293b; 
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --danger: #ef4444; --warning: #f59e0b; --success: #10b981;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* OPTIQUE CLINIQUE */
        #viewport { position: relative; flex: 0 0 32vh; background: #000; overflow: hidden; border-bottom: 1px solid #334155; }
        video, #preview-img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        #preview-img { display: none; z-index: 5; }
        .guide-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 45vw; height: 45vw; max-width: 200px; max-height: 200px; border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 12px; z-index: 10; transition: all 0.3s ease; }
        .guide-box::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.5); }
        .guide-box.scanning { border-color: var(--primary); transform: translate(-50%, -50%) scale(0.95); background: rgba(37, 99, 235, 0.1); }

        /* TABLEAU DE BORD */
        .dashboard { flex: 1; padding: 12px 16px; display: flex; flex-direction: column; background: var(--bg-dark); overflow-y: auto; }
        .status-badge { font-size: 0.65rem; color: var(--text-main); letter-spacing: 0.5px; text-transform: uppercase; font-weight: 600; padding: 6px 10px; background: var(--bg-panel); border-radius: 6px; text-align: center; margin-bottom: 10px; border: 1px solid #334155; transition: all 0.3s; }
        .batch-tracker { display: flex; gap: 8px; margin-bottom: 10px; justify-content: center; align-items: center; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #334155; transition: 0.3s; }
        .dot.active { background: var(--primary); box-shadow: 0 0 8px rgba(37, 99, 235, 0.6); }

        /* CARTE D'ANALYSE */
        .analysis-card { background: var(--bg-panel); border-radius: 12px; padding: 12px; border: 1px solid #334155; margin-bottom: 12px; display: flex; flex-direction: column; flex-grow: 1; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #334155; }
        .risk-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 2px; }
        #risk-val { font-size: 2rem; font-weight: 700; color: var(--text-main); line-height: 1; transition: color 0.3s; }
        
        /* ONGLETS */
        .tabs { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { flex: 0 0 auto; background: transparent; border: 1px solid #475569; color: var(--text-muted); padding: 6px 10px; border-radius: 6px; font-size: 0.65rem; cursor: pointer; transition: 0.2s; font-weight: 600; }
        .tab-btn.active { background: #334155; color: var(--text-main); border-color: #64748b; }
        .tab-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        #advice { font-size: 0.8rem; color: var(--text-main); line-height: 1.5; text-align: left; padding: 10px; background: #0f172a; border-radius: 8px; border-left: 3px solid var(--primary); white-space: pre-line; flex-grow: 1; overflow-y: auto; }

        /* CONTRÔLES ÉTENDUS */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: auto; padding-bottom: 4px; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-main { background: var(--primary); color: white; grid-column: span 2; padding: 14px; font-size: 0.85rem;}
        .btn-main:active { background: var(--primary-dark); }
        .btn-main:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        
        /* SELECTEUR DE CAMÉRA DYNAMIQUE */
        .btn-select { 
            grid-column: span 2; background: #0f172a; color: var(--text-main); border: 1px solid #475569; 
            appearance: none; -webkit-appearance: none; padding-right: 30px;
            background-image: url("data:image/svg+xml;utf8,<svg fill='%2394a3b8' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>");
            background-repeat: no-repeat; background-position-x: 96%; background-position-y: center;
        }
        .btn-select:focus { outline: none; border-color: var(--primary); }
        
        .btn-sub { background: transparent; color: var(--text-main); border: 1px solid #475569; }
        .btn-sub:active { background: #334155; }
        .btn-full { grid-column: span 2; }
        
        /* FOOTER LÉGAL */
        .legal-disclaimer { text-align: center; font-size: 0.5rem; color: #64748b; margin-top: 8px; line-height: 1.4; padding: 0 5px; }
        .signature { font-weight: 700; color: #94a3b8; display: block; margin-top: 2px; }
    </style>
</head>
<body>

    <div id="viewport">
        <video id="webcam" autoplay playsinline muted></video>
        <img id="preview-img">
        <div class="guide-box" id="guide"></div>
    </div>

    <div class="dashboard">
        <div id="status" class="status-badge">AUTO-DIAGNOSTIC SYSTÈME...</div>

        <div class="batch-tracker" id="batch-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>

        <div class="analysis-card">
            <div class="top-row">
                <div>
                    <div class="risk-label">Probabilité d'Altération Structurelle</div>
                    <div id="risk-val">--%</div>
                </div>
            </div>

            <div class="tabs" id="agent-tabs">
                <button class="tab-btn active" data-target="bilan" disabled>Bilan Clinique</button>
                <button class="tab-btn" data-target="nettoyage" disabled>Lavage</button>
                <button class="tab-btn" data-target="routine" disabled>Thérapeutique</button>
                <button class="tab-btn" data-target="produits" disabled>Actifs (INCI)</button>
            </div>

            <div id="advice">Initialisation des modules EBM...</div>
        </div>

        <div class="controls">
            <input type="file" id="file-in" style="display:none;" accept="image/*">
            <button class="btn btn-main" id="btn-scan" disabled>DÉMARRER L'ANALYSE CLINIQUE</button>
            
            <select id="camera-select" class="btn btn-select">
                <option value="">Détection des capteurs optiques...</option>
            </select>
            
            <button class="btn btn-sub" id="btn-upload">📁 Importer</button>
            <button class="btn btn-sub" id="btn-reset">🔄 Patient</button>
            <button class="btn btn-sub btn-full" id="btn-api">🔑 Configurer la Clé API Mistral</button>
        </div>
        
        <div class="legal-disclaimer">
            Dispositif d'Intelligence Artificielle EBM. Ce rapport interactif ne remplace pas une prescription médicale.
            <span class="signature">Architecte Logiciel : Nicolas Julienne</span>
        </div>
    </div>

    <canvas id="proc-canvas" style="display:none;"></canvas>

    <script>
        // ==========================================
        // GESTION SÉCURISÉE DE LA CLÉ API
        // ==========================================
        function getApiKey() { return localStorage.getItem('mistral_api_key') || ""; }
        
        document.getElementById('btn-api').onclick = () => {
            const newKey = prompt("Entrez votre clé API Mistral :", getApiKey());
            if (newKey !== null) { 
                localStorage.setItem('mistral_api_key', newKey.trim()); 
                updateStatus("CLÉ API SAUVEGARDÉE EN LOCAL", "var(--success)"); 
            }
        };

        const ui = {
            v: document.getElementById('webcam'), img: document.getElementById('preview-img'),
            btnScan: document.getElementById('btn-scan'), status: document.getElementById('status'),
            advice: document.getElementById('advice'), risk: document.getElementById('risk-val'),
            guide: document.getElementById('guide'), dots: document.querySelectorAll('.dot'),
            canvas: document.getElementById('proc-canvas'), tabs: document.querySelectorAll('.tab-btn'),
            camSelect: document.getElementById('camera-select')
        };
        
        let state = { 
            cvReady: false, aiReady: false, isLive: true, batchCount: 0, results: [], 
            model: null, videoReady: false, currentDeviceId: null, videoStream: null, 
            agentData: { bilan: "", nettoyage: "", routine: "", produits: "" } 
        };

        // ==========================================
        // 1. DÉMARRAGE ROBUSTE
        // ==========================================
        window.onload = () => { initAI(); initCamera(); };

        function onOpenCvScriptLoaded() {
            let retries = 0;
            const checkCv = setInterval(() => {
                if (typeof cv !== 'undefined' && typeof cv.Mat === 'function') { clearInterval(checkCv); state.cvReady = true; checkSystemReady(); }
                if(++retries > 50) { clearInterval(checkCv); updateStatus("ERREUR MATÉRIELLE : OPENCV", "var(--danger)"); }
            }, 200);
        }

        async function initAI() {
            try {
                updateStatus("CHARGEMENT DU MODÈLE NEURONAL...");
                try { await tf.setBackend('webgl'); await tf.ready(); } catch (err) { await tf.setBackend('cpu'); await tf.ready(); }
                state.model = await mobilenet.load({version: 2, alpha: 1.0}); 
                state.aiReady = true; checkSystemReady();
            } catch (e) { updateStatus("ERREUR : IA INACCESSIBLE", "var(--danger)"); }
        }

        // ==========================================
        // GESTION MULTI-CAPTEURS MATÉRIELS
        // ==========================================
        async function getCameras() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoInputs = devices.filter(device => device.kind === 'videoinput');
                
                ui.camSelect.innerHTML = ''; 
                
                if (videoInputs.length === 0) {
                    ui.camSelect.innerHTML = '<option value="">Aucune caméra détectée</option>';
                    return;
                }

                videoInputs.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Capteur Optique ${index + 1}`;
                    ui.camSelect.appendChild(option);
                });
                
                if (state.currentDeviceId) {
                    ui.camSelect.value = state.currentDeviceId;
                } else {
                    state.currentDeviceId = videoInputs[0].deviceId;
                }
            } catch (e) { console.warn("Erreur d'énumération :", e); }
        }

        async function initCamera(deviceId = null) {
            if (state.videoStream) {
                state.videoStream.getTracks().forEach(track => track.stop());
            }
            try {
                const constraints = {
                    video: deviceId ? { deviceId: { exact: deviceId } } : { facingMode: 'environment' }
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                state.videoStream = stream; ui.v.srcObject = stream;
                
                ui.v.onloadedmetadata = async () => { 
                    state.videoReady = true; 
                    checkSystemReady(); 
                    if (ui.camSelect.options.length <= 1) await getCameras();
                };
            } catch (e) { 
                state.isLive = false; state.videoReady = true; 
                updateStatus("OPTIQUE DÉSACTIVÉE - MODE IMPORT", "var(--warning)"); 
            }
        }

        ui.camSelect.addEventListener('change', (e) => {
            state.currentDeviceId = e.target.value;
            state.isLive = true; ui.img.style.display = "none";
            updateStatus("CALIBRAGE DE L'OBJECTIF...", "var(--primary)");
            initCamera(state.currentDeviceId);
        });

        function checkSystemReady() {
            if (state.cvReady && state.aiReady && state.videoReady) {
                updateStatus("SYSTÈME PRÊT", "var(--success)"); ui.btnScan.disabled = false;
                ui.advice.innerText = "Alignez la zone cutanée au centre du guide clinique, puis déclenchez l'analyse.";
            }
        }

        function updateStatus(text, color = "var(--text-main)") {
            ui.status.innerText = text; ui.status.style.color = color; ui.status.style.borderColor = color === "var(--text-main)" ? "#334155" : color;
        }

        // ==========================================
        // MOTEUR D'ANALYSE (SANS FUITE MÉMOIRE)
        // ==========================================
        ui.btnScan.onclick = async () => {
            if (!state.cvReady || !state.aiReady) return;
            ui.btnScan.disabled = true; ui.guide.classList.add('scanning');
            updateStatus("TRAITEMENT NUMÉRIQUE...", "var(--primary)");
            ui.advice.innerText = "Analyse stratigraphique..."; ui.tabs.forEach(t => t.disabled = true);

            const ctx = ui.canvas.getContext('2d'); ui.canvas.width = 224; ui.canvas.height = 224;
            const source = state.isLive ? ui.v : ui.img;
            const sW = state.isLive ? ui.v.videoWidth : ui.img.naturalWidth;
            const sH = state.isLive ? ui.v.videoHeight : ui.img.naturalHeight;
            const size = Math.min(sW, sH);
            ctx.drawImage(source, (sW - size)/2, (sH - size)/2, size, size, 0, 0, 224, 224);

            let srcRGBA, srcRGB, gray, kernel, dst;
            try {
                // OPENCV: Digital Shaving & Normalisation
                srcRGBA = cv.imread(ui.canvas); srcRGB = new cv.Mat(); cv.cvtColor(srcRGBA, srcRGB, cv.COLOR_RGBA2RGB); 
                gray = new cv.Mat(); cv.cvtColor(srcRGBA, gray, cv.COLOR_RGBA2GRAY);
                kernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(5, 1));
                cv.morphologyEx(gray, gray, cv.MORPH_BLACKHAT, kernel); cv.threshold(gray, gray, 15, 255, cv.THRESH_BINARY);
                dst = new cv.Mat(); cv.inpaint(srcRGB, gray, dst, 3, cv.INPAINT_TELEA); cv.imshow(ui.canvas, dst); 

                // TENSORFLOW: Inférence
                const tensor = tf.browser.fromPixels(ui.canvas);
                const predictions = await state.model.classify(tensor);
                tf.dispose(tensor); 

                let finalScore = Math.min(Math.round(predictions[0].probability * 100 * 1.5), 99); 
                ui.dots[state.batchCount].classList.add('active');
                ui.risk.innerText = finalScore + "%";
                ui.risk.style.color = finalScore >= 60 ? "var(--danger)" : (finalScore >= 30 ? "var(--warning)" : "var(--success)");

                ui.advice.innerText = "Interrogation de la Base Médicale EBM...";
                await fetchMistralMultiAgent(finalScore);

                state.results.push({ risk: finalScore, img: ui.canvas.toDataURL('image/jpeg', 0.8), report: state.agentData });
                state.batchCount++;

                ui.tabs.forEach(t => t.disabled = false); switchTab('bilan'); 

                if (state.batchCount >= 5) {
                    updateStatus("ÉDITION DU RAPPORT INTERACTIF PDF...", "var(--success)");
                    generatePDF();
                    ui.btnScan.disabled = true;
                    setTimeout(() => { updateStatus("PATIENT TERMINÉ.", "var(--warning)"); }, 3000);
                } else {
                    updateStatus(`ZONE ${state.batchCount}/5 ANALYSÉE`, "var(--primary)"); ui.btnScan.disabled = false;
                }
            } catch (err) { updateStatus("ERREUR D'ANALYSE", "var(--danger)"); ui.advice.innerText = `Erreur: ${err.message}`; ui.btnScan.disabled = false;
            } finally {
                if(srcRGBA) srcRGBA.delete(); if(srcRGB) srcRGB.delete(); if(gray) gray.delete(); if(kernel) kernel.delete(); if(dst) dst.delete();
                ui.guide.classList.remove('scanning');
            }
        };

        // ==========================================
        // IA MÉDICALE MULTI-AGENTS
        // ==========================================
        async function fetchMistralMultiAgent(riskScore) {
            const apiKey = getApiKey();
            if(!apiKey) {
                const isHigh = riskScore >= 60;
                state.agentData = {
                    bilan: isHigh ? "Suspicion d'atypie. Dermoscopie clinique recommandée (règle ABCDE)." : "Intégrité cutanée préservée. Homogénéité pigmentaire.",
                    nettoyage: "Nettoyant Syndet (pH physiologique). Éviction stricte des tensioactifs sulfatés.",
                    routine: isHigh ? "1. Éviction acides.\n2. Restauration barrière épidermique.\n3. Photoprotection stricte." : "1. Antioxydants.\n2. Émollient relipidant.\n3. Photoprotection urbaine.",
                    produits: "Recommandés : Ceramides NP, Niacinamide, Panthenol.\nÀ proscrire : Alcohol Denat, Fragrance."
                }; return;
            }
            try {
                const response = await fetch('https://api.mistral.ai/v1/chat/completions', {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: "mistral-small-latest", response_format: { type: "json_object" },
                        messages: [
                            { role: "system", content: "Vous êtes un collège d'experts en dermatologie clinique (EBM). Générez un JSON avec: 'bilan' (évaluation médicale), 'nettoyage' (protocole microbiome), 'routine' (3 étapes), 'produits' (INCI recommandés). Phrases très concises." },
                            { role: "user", content: `Score altération : ${riskScore}%. JSON:` }
                        ]
                    })
                });
                const data = await response.json();
                const content = data.choices[0].message.content;
                
                // Parseur JSON sécurisé avec Regex
                let parsed;
                try {
                    const jsonMatch = content.match(/\{[\s\S]*\}/);
                    if (jsonMatch) { parsed = JSON.parse(jsonMatch[0]); } else { throw new Error("JSON invalide"); }
                } catch(parseError) {
                    parsed = { bilan: "Erreur d'extraction.", nettoyage: "Illisible.", routine: "Illisible.", produits: "Illisible." };
                }
                
                state.agentData = { bilan: parsed.bilan||"-", nettoyage: parsed.nettoyage||"-", routine: parsed.routine||"-", produits: parsed.produits||"-" };
            } catch (e) { state.agentData = { bilan: "Erreur IA", nettoyage: "Erreur IA", routine: "Erreur IA", produits: "Erreur IA" }; }
        }

        ui.tabs.forEach(btn => { btn.addEventListener('click', () => { if(!btn.disabled) switchTab(btn.dataset.target); }); });
        function switchTab(targetAgent) {
            ui.tabs.forEach(t => t.classList.remove('active')); document.querySelector(`button[data-target="${targetAgent}"]`).classList.add('active');
            ui.advice.innerText = state.agentData[targetAgent];
            const colors = { bilan: "var(--primary)", nettoyage: "#38bdf8", routine: "var(--success)", produits: "var(--warning)" };
            ui.advice.style.borderLeftColor = colors[targetAgent];
        }

        // ==========================================
        // MOTEUR PDF ÉDITABLE (ACROFORMS & GRID)
        // ==========================================
        function generatePDF() {
            try {
                const { jsPDF } = window.jspdf; const doc = new jsPDF();
                doc.setProperties({ title: 'Dossier Clinique', subject: 'Analyse', author: 'PureScan Nexus AI', creator: 'Nicolas Julienne' });
                let pageNum = 1; const pageWidth = doc.internal.pageSize.width; const pageHeight = doc.internal.pageSize.height; const margin = 20;

                const printHeader = () => {
                    doc.setFillColor(248, 250, 252); doc.rect(0, 0, pageWidth, 55, 'F');
                    doc.setTextColor(15, 23, 42); doc.setFont("helvetica", "bold"); doc.setFontSize(22); doc.text("PURESCAN NEXUS", margin, 20);
                    doc.setTextColor(100, 116, 139); doc.setFont("helvetica", "normal"); doc.setFontSize(10); doc.text("RAPPORT D'ANALYSE CLINIQUE", margin, 28);
                    
                    doc.setFontSize(9); doc.setTextColor(15, 23, 42);
                    doc.text("Patient : ________________________", margin, 40); doc.text("ID/Date de Naissance : ________________", margin + 80, 40);
                    doc.text(`Édité le : ${new Date().toLocaleDateString('fr-FR')}`, margin + 145, 40);
                    doc.setDrawColor(203, 213, 225); doc.setLineWidth(0.5); doc.line(margin, 55, pageWidth - margin, 55);
                };

                const printFooter = () => {
                    doc.setTextColor(148, 163, 184); doc.setFont("helvetica", "italic"); doc.setFontSize(7);
                    doc.text("Rapport généré par IA basé sur EBM. Ne remplace pas un diagnostic médical.", pageWidth / 2, pageHeight - 11, { align: "center" });
                    doc.setFont("helvetica", "normal"); doc.text(`Page ${pageNum}`, pageWidth - margin, pageHeight - 10, { align: "right" });
                };

                printHeader(); let yOffset = 65;
                
                state.results.forEach((res, i) => {
                    if (yOffset > 200) { printFooter(); doc.addPage(); pageNum++; printHeader(); yOffset = 65; }
                    doc.setTextColor(15, 23, 42); doc.setFont("helvetica", "bold"); doc.setFontSize(14); doc.text(`Évaluation Clinique : Zone n°${i+1}`, margin, yOffset);
                    doc.setFont("helvetica", "normal"); doc.setFontSize(10);
                    if(res.risk >= 60) doc.setTextColor(220, 38, 38); else if(res.risk >= 30) doc.setTextColor(217, 119, 6); else doc.setTextColor(5, 150, 105);
                    doc.text(`Probabilité d'altération structurelle : ${res.risk}%`, margin, yOffset + 6);
                    
                    doc.setDrawColor(203, 213, 225); doc.setLineWidth(0.3); doc.rect(154, yOffset - 4, 32, 32); doc.addImage(res.img, 'JPEG', 155, yOffset - 3, 30, 30);
                    yOffset += 16;

                    const printBlock = (title, text, color) => {
                        doc.setFontSize(9); doc.setTextColor(color[0], color[1], color[2]); doc.setFont("helvetica", "bold"); doc.text(title, margin, yOffset);
                        doc.setTextColor(71, 85, 105); doc.setFont("helvetica", "normal");
                        const lines = doc.splitTextToSize(text, 105); doc.text(lines, margin + 25, yOffset);
                        yOffset += Math.max((lines.length * 4), 6) + 3; 
                    };

                    printBlock("Bilan :", res.report.bilan, [37, 99, 235]); printBlock("Lavage :", res.report.nettoyage, [15, 23, 42]);
                    printBlock("Thérapeutique :", res.report.routine, [15, 23, 42]); printBlock("INCI :", res.report.produits, [15, 23, 42]);
                    
                    yOffset += 2; doc.setFontSize(9); doc.setTextColor(15, 23, 42); doc.setFont("helvetica", "bold"); doc.text("Notes du Praticien :", margin, yOffset + 4);
                    try {
                        var tf = new jsPDF.API.AcroForm.TextField(); tf.Rect = [margin + 35, yOffset, 120, 15]; tf.multiline = true; tf.V = ""; tf.T = "NotesZone" + i; doc.addField(tf);
                        doc.setDrawColor(203, 213, 225); doc.setLineWidth(0.2); doc.rect(margin + 35, yOffset, 120, 15);
                    } catch(e) { doc.setDrawColor(203, 213, 225); doc.rect(margin + 35, yOffset, 120, 15); }
                    yOffset += 25; doc.setDrawColor(226, 232, 240); doc.line(margin, yOffset, pageWidth - margin, yOffset); yOffset += 12;
                });
                
                printFooter(); doc.save(`Dossier_Dermatologique_PureScan.pdf`);
            } catch (e) { updateStatus("ERREUR LORS DE L'ÉDITION DU PDF", "var(--danger)"); ui.btnScan.disabled = false; console.error(e); }
        }

        function resetApp() {
            state.batchCount = 0; state.results = []; ui.dots.forEach(d => d.classList.remove('active'));
            ui.btnScan.disabled = false; ui.risk.innerText = "--%"; ui.risk.style.color = "var(--text-main)";
            ui.tabs.forEach(t => { t.disabled = true; t.classList.remove('active'); }); ui.tabs[0].classList.add('active'); ui.advice.style.borderLeftColor = "var(--primary)";
            updateStatus("SYSTÈME PRÊT", "var(--success)"); ui.advice.innerText = "Dossier patient initialisé.";
        }

        // ==========================================
        // CONTRÔLES UI
        // ==========================================
        document.getElementById('btn-upload').onclick = () => document.getElementById('file-in').click();
        document.getElementById('file-in').onchange = (e) => {
            if (!e.target.files || e.target.files.length === 0) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                ui.img.src = ev.target.result; ui.img.style.display = "block";
                if(state.videoStream) { state.videoStream.getTracks().forEach(track => track.stop()); }
                state.isLive = false; updateStatus("ACQUISITION RÉUSSIE", "var(--primary)");
            }; reader.readAsDataURL(e.target.files[0]);
        };
        document.getElementById('btn-reset').onclick = () => {
            ui.img.style.display = "none"; document.getElementById('file-in').value = "";
            state.isLive = true; initCamera(); resetApp(); updateStatus("RETOUR OPTIQUE DIRECT", "var(--primary)");
        };
        
        // PWA Offline
        if ('serviceWorker' in navigator) { const swBlob = new Blob([`self.addEventListener('install', e => e.waitUntil(caches.open('purescan-pro').then(c => c.addAll(['index.html'])))); self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(res => res || fetch(e.request))));`], { type: 'application/javascript' }); navigator.serviceWorker.register(URL.createObjectURL(swBlob)); }
    </script>
</body>
</html>
