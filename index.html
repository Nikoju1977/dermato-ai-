<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3063/3063176.png">
    
    <title>PureScan Nexus AI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.5.0/opencv.js" onload="cvInit();"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --mistral: #7f56d9; --cyan: #00f2ff; --bg: #020408; --danger: #ff3860; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }

        /* Viewport & HUD */
        #viewport { position: relative; height: 42vh; background: #000; overflow: hidden; border-bottom: 2px solid var(--mistral); }
        video, #preview-img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        #preview-img { display: none; z-index: 5; border: 2px solid var(--cyan); }
        .guide-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; border: 1px dashed var(--cyan); border-radius: 40px; z-index: 10; pointer-events: none; }

        /* Dashboard */
        .dashboard { height: 58vh; padding: 20px; display: flex; flex-direction: column; background: #05070a; overflow-y: auto; }
        .status-bar { font-size: 0.6rem; color: var(--cyan); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; font-weight: 700; }
        
        .batch-counter { display: flex; gap: 8px; margin-bottom: 15px; align-items: center; }
        .dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #222; transition: 0.3s; }
        .dot.active { background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }

        .res-card { background: rgba(255,255,255,0.02); border-radius: 16px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; }
        #risk-val { font-family: 'Orbitron'; font-size: 3rem; color: var(--cyan); line-height: 1; }
        #advice { font-size: 0.85rem; color: #888; margin-top: 12px; line-height: 1.4; }

        /* Actions */
        .btn-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: auto; padding-bottom: 25px; }
        .btn { padding: 18px; border: none; border-radius: 14px; font-family: 'Orbitron'; font-size: 0.75rem; font-weight: 900; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-primary { background: var(--mistral); color: white; grid-column: span 2; }
        .btn-secondary { background: #1a1f26; color: #fff; }
        .btn:disabled { opacity: 0.1; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="viewport">
        <video id="webcam" autoplay playsinline muted></video>
        <img id="preview-img">
        <div class="guide-box"></div>
    </div>

    <div class="dashboard">
        <div id="status" class="status-bar">INITIALISATION SENTINEL...</div>

        <div class="batch-counter" id="batch-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <span style="font-size:0.6rem; color:#444; margin-left:5px;">MODE BATCH (5 ZONES)</span>
        </div>

        <div class="res-card">
            <div style="font-size: 0.5rem; color: #555; text-transform: uppercase; margin-bottom: 5px;">Analyse Spectrale Bio-IA</div>
            <div id="risk-val">--%</div>
            <div id="advice">Chargement des modules...</div>
        </div>

        <div class="btn-group">
            <input type="file" id="file-in" style="display:none;" accept="image/*">
            <button class="btn btn-primary" id="btn-scan" disabled>EXÉCUTER SCAN SENTINEL</button>
            <button class="btn btn-secondary" id="btn-upload">IMPORT HD</button>
            <button class="btn btn-secondary" id="btn-reset">RESET LIVE</button>
        </div>
    </div>

    <canvas id="proc-canvas" style="display:none;"></canvas>

    <script>
        /**
         * PURESCAN NEXUS v42.1 - CODE FINAL CERTIFIÉ
         * Architecte : Nicolas JULIENNE
         */
        const MISTRAL_KEY = "TON_API_KEY_MISTRAL"; // ⚠️ Remplace par ta vraie clé Mistral
        
        const v = document.getElementById('webcam');
        const btn = document.getElementById('btn-scan');
        const dots = document.querySelectorAll('.dot');
        const status = document.getElementById('status');
        
        let model, cvReady = false, batchCount = 0, batchResults = [], isLive = true;

        // --- 1. BOOT SÉCURISÉ ---
        async function init() {
            try {
                await tf.setBackend('webgl'); // Forçage GPU
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                v.srcObject = s;
                
                // Attente des dimensions réelles de la caméra
                v.onloadedmetadata = async () => {
                    status.innerText = "CHARGEMENT IA...";
                    model = await tf.loadLayersModel('https://storage.googleapis.com/tfjs-models/tfjs/mobilenet_v2_1.0_224/model.json');
                    tf.tidy(() => model.predict(tf.zeros([1, 224, 224, 3]))); // Warm-up
                    checkEngines();
                };
            } catch (e) { status.innerText = "ERREUR MATÉRIELLE CAMÉRA"; }
        }

        // OpenCV callback
        function cvInit() { cvReady = true; checkEngines(); }
        function checkEngines() { if(cvReady && model) { btn.disabled = false; status.innerText = "SYSTÈME 100% OPÉRATIONNEL"; } }

        // --- 2. PIPELINE MULTI-AGENT ---
        btn.onclick = async () => {
            btn.disabled = true;
            status.innerText = "TRAITEMENT OPENCV + TENSORFLOW...";

            const canvas = document.getElementById('proc-canvas');
            canvas.width = 224; canvas.height = 224;
            const ctx = canvas.getContext('2d');
            
            // Capture Source (Caméra ou Image HD)
            if(isLive) ctx.drawImage(v, (v.videoWidth-224)/2, (v.videoHeight-224)/2, 224, 224, 0, 0, 224, 224);
            else ctx.drawImage(document.getElementById('preview-img'), 0, 0, 224, 224);

            // OpenCV: Digital Shaving (Correction RGBA -> RGB)
            let srcRGBA = cv.imread(canvas);
            let srcRGB = new cv.Mat();
            cv.cvtColor(srcRGBA, srcRGB, cv.COLOR_RGBA2RGB);

            let gray = new cv.Mat();
            cv.cvtColor(srcRGBA, gray, cv.COLOR_RGBA2GRAY);
            
            let kernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(5, 1));
            cv.morphologyEx(gray, gray, cv.MORPH_BLACKHAT, kernel);
            cv.threshold(gray, gray, 15, 255, cv.THRESH_BINARY);
            
            let dst = new cv.Mat();
            cv.inpaint(srcRGB, gray, dst, 3, cv.INPAINT_TELEA);
            cv.imshow(canvas, dst); // Renvoi au canvas pour TF.js

            // TensorFlow.js: Inférence avec Normalisation Mathématique [-1, 1]
            const risk = tf.tidy(() => {
                const tensor = tf.browser.fromPixels(canvas)
                                .toFloat()
                                .div(tf.scalar(127.5))
                                .sub(tf.scalar(1))
                                .expandDims();
                const prediction = model.predict(tensor).dataSync();
                return Math.round(Math.max(...prediction) * 100);
            });

            // Archivage Batch
            batchResults.push({ risk, img: canvas.toDataURL('image/jpeg', 0.8) });
            dots[batchCount].classList.add('active');
            batchCount++;

            // Mise à jour UI
            document.getElementById('risk-val').innerText = risk + "%";
            document.getElementById('risk-val').style.color = risk > 60 ? "var(--danger)" : "var(--cyan)";

            // Appel Agent Mistral
            status.innerText = "CONSULTATION AGENT MISTRAL...";
            const routine = await getMistralAdvice(risk);
            document.getElementById('advice').innerText = routine;

            // Logique de progression Batch
            if(batchCount >= 5) {
                status.innerText = "BATCH COMPLET : GÉNÉRATION DU PDF";
                generateReport();
            } else {
                btn.disabled = false;
                status.innerText = `ZONE ${batchCount} ANALYSÉE. PRÊT POUR SUIVANTE.`;
            }

            // Purge RAM rigoureuse
            srcRGBA.delete(); srcRGB.delete(); gray.delete(); kernel.delete(); dst.delete();
        };

        // --- 3. AGENT MISTRAL API ---
        async function getMistralAdvice(risk) {
            if(MISTRAL_KEY === "TON_API_KEY_MISTRAL") return "Mode Local : Activez votre clé API Mistral dans le code pour recevoir une routine experte.";
            try {
                const res = await fetch('https://api.mistral.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${MISTRAL_KEY}` },
                    body: JSON.stringify({
                        model: "mistral-tiny",
                        messages: [{ role: "system", content: "Expert dermato bio. Donne une routine de soin courte selon le risque." },
                                   { role: "user", content: `Risque détecté: ${risk}%.` }]
                    })
                });
                const data = await res.json();
                return data.choices[0].message.content;
            } catch (e) { return "Serveur distant indisponible. Hydratation douce recommandée."; }
        }

        // --- 4. EXPORT PDF BATCH ---
        function generateReport() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(10, 14, 20); doc.rect(0, 0, 210, 297, 'F');
            doc.setTextColor(0, 242, 255); doc.setFontSize(22); doc.text("PURESCAN NEXUS - RAPPORT SENTINEL", 20, 30);
            
            batchResults.forEach((res, i) => {
                const y = 60 + (i * 45);
                doc.setTextColor(255, 255, 255); doc.setFontSize(12);
                doc.text(`Zone ${i+1} : Risque d'atypie à ${res.risk}%`, 20, y + 15);
                doc.addImage(res.img, 'JPEG', 150, y, 35, 35);
            });
            
            doc.save("PureScan_Nexus_Report.pdf");
            
            // Réinitialisation globale
            batchCount = 0; batchResults = [];
            dots.forEach(d => d.classList.remove('active'));
            btn.disabled = false;
            status.innerText = "RAPPORT GÉNÉRÉ. SYSTÈME PRÊT.";
        }

        // --- 5. GESTION DES FICHIERS (HD IMPORT) ---
        document.getElementById('btn-upload').onclick = () => document.getElementById('file-in').click();
        document.getElementById('file-in').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = document.getElementById('preview-img');
                img.src = ev.target.result;
                img.style.display = "block";
                isLive = false;
                status.innerText = "MODE PHOTO HD ACTIVÉ";
            };
            reader.readAsDataURL(e.target.files[0]);
        };
        document.getElementById('btn-reset').onclick = () => {
            document.getElementById('preview-img').style.display = "none";
            isLive = true;
            status.innerText = "MODE CAMÉRA DIRECT";
        };

        window.onload = init;
        
        // --- 6. SERVICE WORKER EMBARQUÉ (PWA INSTALLABLE) ---
        if ('serviceWorker' in navigator) {
            const swBlob = new Blob([`
                self.addEventListener('install', e => e.waitUntil(caches.open('purescan-v42').then(c => c.addAll(['index.html']))));
                self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(res => res || fetch(e.request))));
            `], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(swBlob));
        }
    </script>
</body>
</html>
