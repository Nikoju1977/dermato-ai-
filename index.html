<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus Clinical | V108 Bulletproof</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050914">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --primary: #00e5ff; --accent: #00ff88; --warning: #ffaa00; --danger: #ff3366; 
            --bg: #050914; --surface: rgba(18, 25, 43, 0.7); --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* FIX DVH: S'adapte parfaitement à iOS Safari et Chrome Android */
        body { 
            background: var(--bg); color: #fff; 
            height: 100vh; height: 100dvh; 
            display: flex; flex-direction: column; overflow: hidden; 
        }

        header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .logo { font-weight: 800; font-size: 1rem; letter-spacing: 1px; }
        .logo span { color: var(--primary); }

        #viewport { 
            position: relative; height: 28vh; margin: 0 15px; border-radius: 24px; 
            overflow: hidden; border: 1px solid var(--border); background: #000; flex-shrink: 0; 
        }
        video, #output-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; transform: scaleX(-1); }
        .face-guide { position: absolute; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .face-guide svg { width: 50%; height: 70%; opacity: 0.2; stroke: #fff; fill: none; transition: 0.3s; }
        .face-guide.ready svg { stroke: var(--primary); opacity: 0.6; }

        /* ZONE SCROLLABLE OPTIMISÉE */
        .dashboard { 
            flex: 1; padding: 12px 15px; 
            display: flex; flex-direction: column; gap: 12px; 
            overflow-y: auto; -webkit-overflow-scrolling: touch; 
        }
        
        .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .kpi-card { background: var(--surface); padding: 12px 5px; border-radius: 16px; border: 1px solid var(--border); text-align: center; }
        .kpi-val { font-size: 1.1rem; font-weight: 800; color: #fff; display: block; }
        .kpi-lab { font-size: 0.45rem; color: #8b9bb4; text-transform: uppercase; font-weight: 800; margin-top: 4px; }

        .glass-panel { 
            background: var(--surface); backdrop-filter: blur(20px); border-radius: 20px; 
            display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border); 
            min-height: 180px; position: relative;
        }
        .tabs { display: flex; background: rgba(0,0,0,0.4); padding: 4px; }
        .tab { flex: 1; padding: 12px; border: none; background: transparent; color: #8b9bb4; font-size: 0.65rem; font-weight: 800; border-radius: 16px; text-transform: uppercase; }
        .tab.active { background: var(--primary); color: #000; }

        #content { padding: 15px; }

        .loader { position: absolute; inset: 0; background: rgba(5, 9, 20, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { width: 35px; height: 35px; border: 3px solid rgba(0, 229, 255, 0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* BOTTOM BAR ANCRÉE */
        .bottom-bar { 
            background: rgba(10, 15, 28, 0.98); border-top: 1px solid var(--border); 
            padding: 12px 20px calc(15px + env(safe-area-inset-bottom)); 
            display: flex; gap: 12px; flex-shrink: 0; z-index: 1000;
        }
        
        .btn { border: none; border-radius: 18px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; height: 52px; transition: 0.2s; }
        .btn-main { flex: 1; background: #fff; color: #000; font-size: 0.8rem; text-transform: uppercase; }
        .btn-main.ready { background: var(--primary); box-shadow: 0 0 20px rgba(0, 229, 255, 0.2); }
        .btn-icon { width: 55px; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); border-radius: 18px; font-size: 1.3rem; }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { opacity: 0.2; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">NEXUS <span>CLINICAL</span></div>
        <button style="background:var(--surface); border:none; color:white; width:35px; height:35px; border-radius:10px;" onclick="configureKey()">⚙️</button>
    </header>

    <div id="viewport">
        <div class="face-guide" id="face-guide"><svg viewBox="0 0 100 130"><ellipse cx="50" cy="65" rx="40" ry="55" stroke-dasharray="8 8"/></svg></div>
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output-canvas"></canvas>
    </div>

    <div class="dashboard">
        <div class="kpi-row">
            <div class="kpi-card"><span class="kpi-val" id="val-text">--</span><span class="kpi-lab">Texture</span></div>
            <div class="kpi-card"><span class="kpi-val" id="val-ery">--</span><span class="kpi-lab">Inflamm.</span></div>
            <div class="kpi-card"><span class="kpi-val" id="val-mel">--</span><span class="kpi-lab">Pigment</span></div>
        </div>

        <div class="glass-panel">
            <div class="loader" id="loader">
                <div class="spinner"></div>
                <span id="load-msg" style="font-size: 0.6rem; color: var(--primary); margin-top: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;">Moteur Neural V108</span>
            </div>
            <div class="tabs">
                <button class="tab active" id="tab-diag" onclick="handleTabSwitch('diag')" disabled>Bilan</button>
                <button class="tab" id="tab-routine" onclick="handleTabSwitch('routine')" disabled>Routine</button>
            </div>
            <div id="content">
                <div style="text-align: center; color: #475569; padding-top: 20px;">
                    <p style="font-size: 0.8rem;">Initialisation des capteurs optiques...</p>
                </div>
            </div>
        </div>
        <div style="height: 30px; flex-shrink: 0;"></div>
    </div>

    <div class="bottom-bar">
        <button class="btn btn-icon" onclick="location.reload()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
        </button>
        <button class="btn btn-main" id="btn-scan" onclick="handleAction()" disabled>Démarrer</button>
        <button class="btn btn-icon" id="btn-pdf" disabled onclick="exportToPDF()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
        </button>
    </div>

    <canvas id="proc-canvas" class="hidden" width="512" height="512"></canvas>

    <script>
        const ui = {
            v: document.getElementById('webcam'),
            canvas: document.getElementById('output-canvas'),
            ctx: document.getElementById('output-canvas').getContext('2d'),
            proc: document.getElementById('proc-canvas'),
            content: document.getElementById('content'),
            loader: document.getElementById('loader'),
            msg: document.getElementById('load-msg'),
            btnScan: document.getElementById('btn-scan'),
            btnPdf: document.getElementById('btn-pdf'),
            tabDiag: document.getElementById('tab-diag'),
            tabRoutine: document.getElementById('tab-routine'),
            guide: document.getElementById('face-guide')
        };

        let state = { landmarks: null, aiData: null, isRunning: false, isBusy: false, isAiProcessing: false };

        function configureKey() {
            const k = prompt("Clé API Mistral :");
            if (k) localStorage.setItem('nexus_mistral_key', k.trim());
        }

        async function init() {
            const fm = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
            fm.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6 });
            
            fm.onResults(res => {
                state.landmarks = res.multiFaceLandmarks && res.multiFaceLandmarks.length > 0 ? res.multiFaceLandmarks[0] : null;
                if (state.landmarks) {
                    ui.guide.classList.add('ready');
                    ui.btnScan.disabled = false; ui.btnScan.classList.add('ready');
                } else {
                    ui.guide.classList.remove('ready');
                    ui.btnScan.disabled = true; ui.btnScan.classList.remove('ready');
                }
                drawOverlay();
            });

            try {
                // Permission unique
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                ui.v.srcObject = s;

                const cam = new Camera(ui.v, {
                    onFrame: async () => {
                        // FIX LAG: On ne traite une frame que si l'IA a fini la précédente
                        if (!state.isBusy && !state.isAiProcessing) {
                            await fm.send({image: ui.v});
                        }
                    },
                    width: 640, height: 480
                });
                await cam.start();
                
                state.isRunning = true;
                ui.loader.style.display = 'none';
                ui.btnScan.innerText = "Lancer Analyse";
            } catch (e) {
                ui.msg.innerText = "CAMÉRA BLOQUÉE";
                ui.btnScan.innerText = "Réessayer";
                ui.btnScan.disabled = false;
            }
        }

        function handleAction() {
            if (!state.isRunning) init();
            else analyze();
        }

        function drawOverlay() {
            ui.canvas.width = ui.v.videoWidth; ui.canvas.height = ui.v.videoHeight;
            ui.ctx.clearRect(0, 0, ui.canvas.width, ui.canvas.height);
            if (state.landmarks) {
                ui.ctx.fillStyle = "rgba(0, 229, 255, 0.4)";
                [10, 152, 234, 454].forEach(i => {
                    const p = state.landmarks[i];
                    ui.ctx.beginPath(); ui.ctx.arc(p.x * ui.canvas.width, p.y * ui.canvas.height, 3, 0, 7); ui.ctx.fill();
                });
            }
        }

        async function analyze() {
            const k = localStorage.getItem('nexus_mistral_key');
            if (!k) return configureKey();

            state.isAiProcessing = true;
            ui.loader.style.display = 'flex';
            ui.msg.innerText = "ANALYSE CLINIQUE...";

            try {
                const W = 512, H = Math.floor(512 * (ui.v.videoHeight / ui.v.videoWidth));
                ui.proc.height = H;
                const pCtx = ui.proc.getContext('2d');
                pCtx.drawImage(ui.v, 0, 0, W, H);
                
                const pix = pCtx.getImageData(0,0,W,H).data;
                let r=0, g=0, b=0, vL=0, step=16;
                for(let i=0; i<pix.length; i+=step) {
                    r+=pix[i]; g+=pix[i+1]; b+=pix[i+2];
                    if(i+step+4 < pix.length) vL += Math.abs(pix[i+1] - pix[i+5]);
                }
                const count = pix.length/step;
                const metrics = { 
                    text:(vL/count*4).toFixed(1), ery:((r-g)/count*2.2).toFixed(1), mel:(100-(r+g+b)/(3*count)).toFixed(1) 
                };

                document.getElementById('val-text').innerText = metrics.text;
                document.getElementById('val-ery').innerText = metrics.ery;
                document.getElementById('val-mel').innerText = metrics.mel;

                const b64 = ui.proc.toDataURL('image/jpeg', 0.5);
                const res = await fetch('https://api.mistral.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${k}` },
                    body: JSON.stringify({
                        model: "pixtral-12b-2409",
                        messages: [{ role: "user", content: [
                            {type:"text", text:`Dermatologue Clinique. Analyse: Texture ${metrics.text}Hz, Erythème ${metrics.ery}, Mélanine ${metrics.mel}. JSON STRICT: {"score":85, "title":"Diagnostic", "physio":"Explication", "routine":[{"step":"Matin", "prod":"Soin", "why":"Raison"}]}`},
                            {type:"image_url", image_url:{url:b64}}
                        ] }],
                        response_format: { type: "json_object" }
                    })
                });
                const d = await res.json();
                state.aiData = JSON.parse(d.choices[0].message.content);

                ui.loader.style.display = 'none';
                ui.tabDiag.disabled = false; ui.tabRoutine.disabled = false;
                render('diag');
                ui.btnPdf.disabled = false;
                ui.btnScan.innerText = "Nouveau Scan";
            } catch (e) {
                alert("Erreur: " + e.message);
                ui.loader.style.display = 'none';
            } finally {
                state.isAiProcessing = false;
            }
        }

        function handleTabSwitch(t) {
            ui.tabDiag.classList.toggle('active', t === 'diag');
            ui.tabRoutine.classList.toggle('active', t === 'routine');
            render(t);
        }

        function render(mode) {
            if (!state.aiData) return;
            if (mode === 'diag') {
                ui.content.innerHTML = `
                    <div style="background:rgba(0,229,255,0.1); padding:18px; border-radius:18px; border:1px solid rgba(0,229,255,0.2);">
                        <h3 style="color:var(--primary); font-size:0.95rem; font-weight:800;">${state.aiData.title}</h3>
                        <p style="font-size:0.8rem; color:#d1d5db; margin-top:10px; line-height:1.5;">${state.aiData.physio}</p>
                    </div>
                    <div style="text-align:center; padding:25px;">
                        <div style="font-size:2.8rem; font-weight:800; color:var(--primary);">${state.aiData.score}%</div>
                        <span style="font-size:0.55rem; color:#8b9bb4; letter-spacing:2px; font-weight:700;">INDICE DE VITALITÉ</span>
                    </div>`;
            } else {
                ui.content.innerHTML = state.aiData.routine.map(r => `
                    <div style="border-left:3px solid var(--accent); padding:15px; background:rgba(255,255,255,0.03); margin-bottom:12px; border-radius:0 15px 15px 0;">
                        <span style="font-size:0.55rem; color:var(--accent); font-weight:800; text-transform:uppercase; letter-spacing:1px;">${r.step}</span>
                        <div style="font-weight:800; font-size:0.9rem; margin:6px 0; color:#fff;">${r.prod}</div>
                        <p style="font-size:0.75rem; color:#94a3b8; line-height:1.4;">${r.why}</p>
                    </div>`).join('');
            }
        }

        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(5, 9, 20); doc.rect(0, 0, 210, 45, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.text("BILAN NEXUS CLINICAL", 15, 25);
            doc.setTextColor(80, 80, 80); doc.setFontSize(12);
            doc.text("Diagnostic : " + state.aiData.title, 15, 60);
            doc.text("Score : " + state.aiData.score + "%", 15, 70);
            if (/Mobi|Android|iPhone/i.test(navigator.userAgent)) window.open(URL.createObjectURL(doc.output('blob')));
            else doc.save("Nexus_Report.pdf");
        }

        window.onload = () => { ui.btnScan.disabled = false; ui.btnScan.innerText = "Démarrer Nexus"; };
    </script>
</body>
</html>
