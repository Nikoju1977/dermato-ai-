<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="author" content="Nicolas JULIENNE">
    <meta name="theme-color" content="#0A0A0C">
    <title>DERMA X-PRO | APEX V14.9 VOCAL AI</title>
    
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="onOpenCvReady()"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --champagne: #D4AF37;
            --platinum: #E5E4E2;
            --onyx: #0A0A0C;
            --glass: rgba(15,15,18,0.95);
            --border: rgba(212,175,55,0.25);
            --danger: #FF4D4D;
            --success: #4CAF7D;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--onyx); color: var(--platinum);
            font-family: 'Rajdhani', sans-serif; min-height: 100dvh;
            overflow-x: hidden; display: flex; flex-direction: column;
        }

        /* ═══ HEADER ═══ */
        header {
            padding: 15px 20px; display: flex; justify-content: space-between;
            align-items: flex-end; border-bottom: 1px solid var(--border);
            background: #000; z-index: 100;
        }
        .brand-name { font-family: 'Orbitron'; color: var(--champagne); font-size: 1.1rem; letter-spacing: 2px; }
        .architect { text-align: right; font-family: 'Orbitron'; font-size: 0.5rem; color: #555; }
        .architect span { color: var(--platinum); font-size: 0.65rem; display: block; margin-top: 2px; }

        /* ═══ VISION SECTOR ═══ */
        #vision-container { position: relative; height: 42vh; background: #000; overflow: hidden; border-bottom: 1px solid var(--border); }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #overlay-canvas { position: absolute; inset: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; z-index: 5; }
        
        #lux-widget {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            width: 75%; max-width: 280px; padding: 12px; background: var(--glass);
            border: 1px solid var(--border); border-radius: 4px; z-index: 10;
        }
        .lux-info { display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 0.55rem; color: #777; margin-bottom: 6px; }
        .lux-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.05); }
        #lux-fill { height: 100%; width: 0%; transition: 0.4s ease; background: var(--champagne); }

        /* ═══ DASHBOARD ═══ */
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); background: var(--border); gap: 1px; }
        .stat-card { background: var(--onyx); padding: 18px 5px; text-align: center; }
        .stat-val { font-family: 'Orbitron'; font-size: 1rem; color: var(--champagne); font-weight: 700; }
        .stat-lbl { font-size: 0.5rem; color: #555; letter-spacing: 1px; margin-top: 5px; text-transform: uppercase; }

        /* ═══ CONTROLS ═══ */
        .ui-panel { padding: 25px 20px; flex-grow: 1; display: flex; flex-direction: column; gap: 12px; }
        input {
            background: #0e0e10; border: 1px solid #1a1a1c; padding: 14px;
            color: var(--champagne); font-family: 'Orbitron'; font-size: 0.65rem;
            outline: none; transition: 0.3s; -webkit-appearance: none; border-radius: 0;
        }
        input:focus { border-color: var(--champagne); }
        .btn-main {
            background: transparent; border: 1px solid var(--champagne); color: var(--champagne);
            padding: 18px; font-family: 'Orbitron'; font-size: 0.8rem; cursor: pointer;
            letter-spacing: 2px; text-transform: uppercase; transition: 0.3s;
        }
        .btn-main:active:not(:disabled) { background: var(--champagne); color: #000; }
        .btn-main:disabled { border-color: #222; color: #333; cursor: not-allowed; }
        .btn-sub { border-color: #333; color: #666; font-size: 0.65rem; padding: 12px; }

        /* ═══ OVERLAYS ═══ */
        .full-overlay {
            position: fixed; inset: 0; background: var(--onyx); z-index: 2000;
            display: none; flex-direction: column; padding: 30px 20px;
            padding-bottom: max(30px, env(safe-area-inset-bottom)); overflow-y: auto;
        }
        .full-overlay.active { display: flex; }
        .report-title { font-family: 'Orbitron'; color: var(--champagne); text-align: center; margin-bottom: 10px; letter-spacing: 2px; }
        
        /* ═══ ANIMATION VOCALE ═══ */
        .voice-indicator {
            display: none; justify-content: center; align-items: center; gap: 4px; margin-bottom: 20px;
        }
        .voice-indicator.active { display: flex; }
        .bar {
            width: 4px; height: 15px; background: var(--champagne); border-radius: 2px;
            animation: sound 0ms -800ms linear infinite alternate;
        }
        .bar:nth-child(1) { animation-duration: 474ms; }
        .bar:nth-child(2) { animation-duration: 433ms; }
        .bar:nth-child(3) { animation-duration: 407ms; }
        .bar:nth-child(4) { animation-duration: 458ms; }
        .bar:nth-child(5) { animation-duration: 400ms; }
        @keyframes sound {
            0% { opacity: 0.35; height: 3px; }
            100% { opacity: 1; height: 20px; }
        }

        #ai-report-body { line-height: 1.7; color: #CCC; font-size: 0.95rem; max-width: 600px; margin: 0 auto; }
        #ai-report-body h3 { color: var(--champagne); font-family: 'Orbitron'; margin-top: 20px; font-size: 1rem; letter-spacing: 1px;}
        #ai-report-body ul { padding-left: 20px; margin: 10px 0; }
        
        #stream-progress { font-family: 'Orbitron'; font-size: 0.55rem; color: #444; text-align: right; max-width: 600px; margin: 0 auto 8px; min-height: 1em; }
        #historyChartCanvas { display: block; }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: #fff; padding: 12px 25px; border-radius: 30px; font-size: 0.7rem;
            font-family: 'Orbitron'; display: none; z-index: 5000; white-space: nowrap; transition: background 0.2s;
        }
        #toast.toast-error { background: var(--danger); }
        #toast.toast-success { background: var(--success); }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .analyzing { animation: pulse 1.5s infinite; }
    </style>
</head>
<body>

    <header>
        <div class="brand-name">DERMA X-PRO</div>
        <div class="architect">Architecte Logiciel<span>NICOLAS JULIENNE</span></div>
    </header>

    <main>
        <section id="vision-container">
            <div id="lux-widget">
                <div class="lux-info"><span>LUMINOSITÉ</span><span id="lux-status">CALIBRATION...</span></div>
                <div class="lux-bar"><div id="lux-fill"></div></div>
            </div>
            <video id="video" playsinline muted autoplay></video>
            <canvas id="overlay-canvas"></canvas>
        </section>

        <section class="dashboard">
            <div class="stat-card"><div class="stat-val" id="d-ita">--</div><div class="stat-lbl">ITA INDEX</div></div>
            <div class="stat-card"><div class="stat-val" id="d-glow">--</div><div class="stat-lbl">RADIANCE</div></div>
            <div class="stat-card"><div class="stat-val" id="d-tex">--</div><div class="stat-lbl">TEXTURE</div></div>
            <div class="stat-card"><div class="stat-val" id="d-uni">--</div><div class="stat-lbl">HOMOGÉNÉITÉ</div></div>
        </section>

        <section class="ui-panel">
            <input type="password" id="api-key" placeholder="CLÉ MISTRAL API" autocomplete="off">
            <button id="cta-btn" class="btn-main" onclick="initDeepAnalysis()" disabled>LUMINOSITÉ REQUISE</button>
            <button class="btn-main btn-sub" onclick="openHistory()">HISTORIQUE CHRONOS</button>
        </section>
    </main>

    <div id="results-layer" class="full-overlay">
        <h2 class="report-title">BILAN MULTI-AGENTS</h2>
        
        <div id="voice-waves" class="voice-indicator">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>

        <div id="stream-progress"></div>
        <div id="ai-report-body"></div>
        <div style="margin-top:40px; display:flex; flex-direction:column; gap:12px;">
            <button id="pdf-btn" class="btn-main" style="background:var(--champagne); color:#000; display:none;" onclick="exportPDF()">EXPORTER LE RAPPORT PDF</button>
            <button class="btn-main btn-sub" onclick="stopVoice()">🛑 COUPER LA VOIX</button>
            <button class="btn-main btn-sub" onclick="location.reload()">NOUVELLE SESSION</button>
        </div>
    </div>

    <div id="history-layer" class="full-overlay">
        <h2 class="report-title">SUIVI CHRONOS</h2>
        <div style="height:300px; width:100%;"><canvas id="historyChartCanvas"></canvas></div>
        <button class="btn-main btn-sub" style="margin-top:auto;" onclick="closeOverlay('history-layer')">RETOUR</button>
    </div>

    <div id="toast"></div>

<script>
"use strict";

// ── ASSISTANT VOCAL SYNCHRONISÉ ──
const synth = window.speechSynthesis;

function speak(text) {
    if (!synth) return;
    synth.cancel(); // Coupe la voix précédente s'il y en a une
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.lang = 'fr-FR'; // Voix française
    utterThis.rate = 1.0; 

    // Affiche l'animation quand la voix démarre
    utterThis.onstart = () => {
        document.getElementById('voice-waves').classList.add('active');
    };
    
    // Cache l'animation quand la voix s'arrête
    utterThis.onend = () => {
        document.getElementById('voice-waves').classList.remove('active');
    };
    
    // Cache l'animation en cas d'erreur
    utterThis.onerror = () => {
        document.getElementById('voice-waves').classList.remove('active');
    };

    synth.speak(utterThis);
}

function stopVoice() {
    if (synth) synth.cancel();
    document.getElementById('voice-waves').classList.remove('active');
    showToast("Assistant vocal désactivé", "success");
}

// ── ÉTAT GLOBAL ──
const v = document.getElementById('video');
const cvs = document.getElementById('overlay-canvas');
const ctx = cvs.getContext('2d');
let stream, faceMesh, cvReady = false, isBusy = false;
let lastMetrics = null, lastImg = null, lastAIText = "";
let chronosChart = null;

// ── INITIALISATION ──
async function startSystem() {
    const saved = localStorage.getItem('derma_key_v14');
    if (saved) document.getElementById('api-key').value = saved;

    try {
        stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } 
        });
        v.srcObject = stream;
        v.onloadedmetadata = () => {
            cvs.width = v.videoWidth;
            cvs.height = v.videoHeight;
            initPhotometry();
            initFaceMesh();
        };
    } catch(e) {
        showToast("ERREUR CAMÉRA : " + e.message, 'error');
    }
}

function onOpenCvReady() {
    cvReady = true;
    showToast("MOTEUR BIOMÉTRIQUE PRÊT", 'success');
    refreshCtaState();
}

// ── PHOTOMÉTRIE ──
function initPhotometry() {
    const c = document.createElement('canvas');
    const x = c.getContext('2d');
    c.width = c.height = 64;

    setInterval(() => {
        if (isBusy || v.videoWidth === 0) return;
        x.drawImage(v, 0, 0, 64, 64);
        const d = x.getImageData(0, 0, 64, 64).data;
        let bright = 0;
        for(let i = 0; i < d.length; i += 4) bright += (d[i] + d[i+1] + d[i+2]) / 3;
        updateLuxUI(bright / (64*64));
    }, 500);
}

let lastAvg = 0;
function updateLuxUI(avg) {
    lastAvg = avg;
    const fill = document.getElementById('lux-fill');
    const status = document.getElementById('lux-status');

    fill.style.width = Math.min(100, (avg / 200) * 100) + '%';
    if (avg < 45) {
        status.textContent = "TROP SOMBRE";
        fill.style.background = "var(--danger)";
    } else {
        status.textContent = "OPTIMAL";
        fill.style.background = "var(--champagne)";
    }
    refreshCtaState();
}

function refreshCtaState() {
    const btn = document.getElementById('cta-btn');
    if (isBusy) return;
    if (lastAvg < 45) {
        btn.disabled = true;
        btn.textContent = "LUMINOSITÉ REQUISE";
    } else if (!cvReady) {
        btn.disabled = true;
        btn.textContent = "CHARGEMENT IA...";
    } else {
        btn.disabled = false;
        btn.textContent = "INITIER LE SCAN";
    }
}

// ── FACE MESH ──
function initFaceMesh() {
    faceMesh = new FaceMesh({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6 });
    faceMesh.onResults(res => {
        ctx.clearRect(0, 0, cvs.width, cvs.height);
        if (res.multiFaceLandmarks?.[0]) {
            ctx.fillStyle = "rgba(212,175,55,0.4)";
            res.multiFaceLandmarks[0].forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x * cvs.width, p.y * cvs.height, 0.8, 0, 2*Math.PI);
                ctx.fill();
            });
        }
    });

    const loop = async () => {
        if (!isBusy && v.readyState >= 2) await faceMesh.send({ image: v });
        requestAnimationFrame(loop);
    };
    loop();
}

// ── ANALYSE BIOMÉTRIQUE OPENCV ──
function computeBio(canvas) {
    if (!cvReady) return { ita: 45, glow: 60, tex: 75, uni: 80 };
    let src = null, lab = null, gray = null;
    let labMean = null, labStd = null, grayMean = null, grayStd = null;

    try {
        src = cv.imread(canvas);
        cv.cvtColor(src, src, cv.COLOR_RGBA2RGB);

        lab = new cv.Mat(); labMean = new cv.Mat(); labStd = new cv.Mat();
        cv.cvtColor(src, lab, cv.COLOR_RGB2Lab);
        cv.meanStdDev(lab, labMean, labStd);

        const L = labMean.data64F[0] * 100 / 255;
        const b_v = labMean.data64F[2] - 128;
        const ita = Math.atan2(L - 50, b_v) * (180 / Math.PI);
        const uni = Math.max(0, Math.min(100, Math.round(100 - labStd.data64F[0] * 1.5)));

        gray = new cv.Mat(); grayMean = new cv.Mat(); grayStd = new cv.Mat();
        cv.cvtColor(src, gray, cv.COLOR_RGB2GRAY);
        cv.meanStdDev(gray, grayMean, grayStd);

        const tex = Math.max(0, Math.min(100, Math.round(100 - grayStd.data64F[0] * 0.6)));
        return { ita: Math.round(ita), glow: Math.round(L), tex, uni };

    } catch(e) {
        return { ita: 45, glow: 60, tex: 75, uni: 80 };
    } finally {
        if (src) src.delete(); if (lab) lab.delete(); if (gray) gray.delete();
        if (labMean) labMean.delete(); if (labStd) labStd.delete();
        if (grayMean) grayMean.delete(); if (grayStd) grayStd.delete();
    }
}

// ── ANALYSE PROFONDE ──
async function initDeepAnalysis() {
    const key = document.getElementById('api-key').value.trim();
    if (!key) return showToast("CLÉ API REQUISE", 'error');

    isBusy = true;
    localStorage.setItem('derma_key_v14', key);

    const btn = document.getElementById('cta-btn');
    btn.disabled = true;
    btn.textContent = "CAPTURE BIOMÉTRIQUE...";
    
    // Annonce le début de l'analyse (déclenche l'animation)
    speak("Acquisition biométrique validée. Démarrage de l'analyse multi-agents. Veuillez patienter.");

    const cap = document.createElement('canvas');
    cap.width = v.videoWidth; cap.height = v.videoHeight;
    cap.getContext('2d').drawImage(v, 0, 0);
    
    lastImg = cap.toDataURL('image/jpeg', 0.7);
    lastMetrics = computeBio(cap);
    updateDashboard(lastMetrics);

    document.getElementById('results-layer').classList.add('active');
    await callMistral(key);
}

function updateDashboard(m) {
    document.getElementById('d-ita').textContent = m.ita + '°';
    document.getElementById('d-glow').textContent = m.glow + '%';
    document.getElementById('d-tex').textContent = m.tex + '/100';
    document.getElementById('d-uni').textContent = m.uni + '%';
}

// ── APPEL MISTRAL MULTI-AGENTS ──
async function callMistral(key) {
    const body = document.getElementById('ai-report-body');
    const progress = document.getElementById('stream-progress');
    
    body.innerHTML = `<div style="text-align:center; padding:50px 0;">
        <p class="analyzing" style="font-family:'Orbitron'; color:var(--champagne);">
            ANALYSE MULTI-AGENTS EN COURS...
        </p></div>`;
    progress.textContent = "";
    lastAIText = "";

    const abortCtrl = new AbortController();
    const timeoutId = setTimeout(() => abortCtrl.abort(), 45000);

    const systemPrompt = `Tu es le système Multi-Agent DERMA X-PRO. Scores : ITA ${lastMetrics.ita}°, Radiance ${lastMetrics.glow}%, Texture ${lastMetrics.tex}/100, Homogénéité ${lastMetrics.uni}%.
L'Agent 1 (Vision Pixtral) a terminé l'extraction. Rédige le rapport sous forme de consultation à deux voix :
1. "AGENT CLINICIEN :" : Rédige une analyse dermatologique clinique luxueuse.
2. "AGENT BIO-BOTANISTE :" : Rédige une routine de soins naturelle et ciblée.
CONSIGNES STRICTES : Utilise UNIQUEMENT les balises HTML <h3>, <p>, <ul>, <li>. Sépare les agents par des <h3>. N'ajoute AUCUN code CSS, AUCUNE balise <style>, AUCUNE balise <html> ou <body>, et AUCUN markdown (\`\`\`, **). Ne réponds QUE le HTML.`;

    try {
        const response = await fetch('https://api.mistral.ai/v1/chat/completions', {
            method: 'POST',
            signal: abortCtrl.signal,
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
            body: JSON.stringify({
                model: "pixtral-12b-2409",
                max_tokens: 1024,
                messages: [
                    { role: "user", content: [ { type: "text", text: systemPrompt }, { type: "image_url", image_url: { url: lastImg } } ] }
                ],
                stream: true
            })
        });

        if (!response.ok) {
            const err = await response.json();
            throw new Error(`Clé invalide ou quota dépassé (${response.status})`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullText = ""; let tokenCount = 0; let rafPending = false; let streamDone = false; 

        body.innerHTML = "";

        function scheduleRender() {
            if (rafPending) return;
            rafPending = true;
            requestAnimationFrame(() => {
                rafPending = false;
                body.innerHTML = fullText.replace(/```html|```/g, "");
                progress.textContent = `~${tokenCount} tokens`;
            });
        }

        while (!streamDone) {
            const { done, value } = await reader.read();
            if (done) break;

            for (const line of decoder.decode(value).split('\n')) {
                if (!line.startsWith('data: ')) continue;
                const dataStr = line.slice(6).trim();
                if (dataStr === "[DONE]") { streamDone = true; break; }
                
                try {
                    const json = JSON.parse(dataStr);
                    const content = json.choices?.[0]?.delta?.content || "";
                    if (content) { fullText += content; tokenCount++; scheduleRender(); }
                } catch(_) {}
            }
        }

        lastAIText = fullText.replace(/```html|```/g, "");
        body.innerHTML = lastAIText;
        progress.textContent = "";
        document.getElementById('pdf-btn').style.display = 'block';
        
        saveSession(lastMetrics);

        // Lecture vocale du rapport et lancement de l'animation
        const tmpDiv = document.createElement('div');
        tmpDiv.innerHTML = lastAIText;
        const textToRead = tmpDiv.innerText.trim();
        speak("Analyse terminée. Voici le bilan de nos experts : " + textToRead);

    } catch(e) {
        const msg = e.name === 'AbortError' ? "TIMEOUT 45s — vérifiez votre connexion." : e.message;
        body.innerHTML = `
            <div style="border:1px solid var(--danger); padding:20px; color:var(--danger); text-align:center;">
                <h3 style="margin-bottom:10px;">ERREUR SYSTÈME</h3>
                <p>${msg}</p>
                <p style="font-size:0.7rem; margin-top:10px; color:#aaa;">Vérifiez que votre clé API ne contient pas d'espace à la fin et que vous avez des crédits Mistral actifs.</p>
            </div>`;
        speak("Erreur système. Veuillez vérifier votre clé A P I ou votre connexion.");
    } finally {
        clearTimeout(timeoutId);
        isBusy = false;
        refreshCtaState();
    }
}

// ── HISTORIQUE ──
function saveSession(m) {
    let history = JSON.parse(localStorage.getItem('derma_history_v14') || '[]');
    history.push({ date: new Date().toLocaleDateString('fr-FR'), glow: m.glow, ita: m.ita, tex: m.tex, uni: m.uni });
    localStorage.setItem('derma_history_v14', JSON.stringify(history.slice(-15)));
}

function openHistory() {
    const history = JSON.parse(localStorage.getItem('derma_history_v14') || '[]');
    if (history.length === 0) return showToast("AUCUNE DONNÉE", 'error');
    
    speak("Ouverture de l'historique chronos.");
    document.getElementById('history-layer').classList.add('active');

    if (chronosChart) { chronosChart.destroy(); chronosChart = null; }

    const darkScales = {
        x: { ticks: { color: '#555', font: { family: 'Rajdhani' } }, grid: { color: 'rgba(255,255,255,0.04)' }, border: { color: 'rgba(255,255,255,0.08)' } },
        y: { ticks: { color: '#555', font: { family: 'Rajdhani' } }, grid: { color: 'rgba(255,255,255,0.04)' }, border: { color: 'rgba(255,255,255,0.08)' } }
    };

    chronosChart = new Chart(document.getElementById('historyChartCanvas'), {
        type: 'line',
        data: {
            labels: history.map(h => h.date),
            datasets: [
                { label: 'Radiance', data: history.map(h => h.glow), borderColor: '#D4AF37', backgroundColor: 'rgba(212,175,55,0.1)', fill: true, tension: 0.4, pointRadius: 4 },
                { label: 'Texture', data: history.map(h => h.tex ?? null), borderColor: '#4DA6FF', backgroundColor: 'rgba(77,166,255,0.05)', fill: true, tension: 0.4, pointRadius: 3 },
                { label: 'Homogénéité', data: history.map(h => h.uni ?? null), borderColor: '#7FD9A0', backgroundColor: 'rgba(127,217,160,0.05)', fill: true, tension: 0.4, pointRadius: 3 }
            ]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#777', font: { family: 'Rajdhani' } } } }, scales: darkScales }
    });
}

// ── EXPORT PDF PRO ──
function exportPDF() {
    if (!lastMetrics) return showToast("AUCUNE ANALYSE À EXPORTER", 'error');
    
    speak("Création de votre document sécurisé P D F en cours.");

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const W = doc.internal.pageSize.getWidth();

    // Header
    doc.setFillColor(10, 10, 12); doc.rect(0, 0, W, 40, 'F');
    doc.setTextColor(212, 175, 55); doc.setFontSize(22); doc.setFont('helvetica', 'bold');
    doc.text("DERMA X-PRO REPORT", 20, 22);
    doc.setFontSize(8); doc.setFont('helvetica', 'normal'); doc.setTextColor(130, 110, 60);
    doc.text("APEX V14.9 PRO — VOCAL AGENTS", 20, 30);
    doc.setTextColor(90, 90, 90); doc.text(new Date().toLocaleString('fr-FR'), W - 15, 30, { align: 'right' });

    let y = 50;

    // Image
    if (lastImg) { try { doc.addImage(lastImg, 'JPEG', 140, y, 50, 38); } catch(e) {} }

    // Métriques
    const metrics = [ ["ITA INDEX", `${lastMetrics.ita}°`], ["RADIANCE", `${lastMetrics.glow}%`], ["TEXTURE", `${lastMetrics.tex}/100`], ["HOMOGÉNÉITÉ", `${lastMetrics.uni}%`] ];
    metrics.forEach(([lbl, val], i) => {
        const my = y + i * 10;
        doc.setFontSize(7); doc.setFont('helvetica', 'normal'); doc.setTextColor(100, 100, 100); doc.text(lbl, 20, my);
        doc.setFontSize(11); doc.setFont('helvetica', 'bold'); doc.setTextColor(212, 175, 55); doc.text(val, 20, my + 5.5);
    });
    
    y += 48;
    doc.setDrawColor(212, 175, 55); doc.setLineWidth(0.25); doc.line(15, y, W - 15, y); y += 8;

    // Rapport IA (Nettoyage Sécurisé du CSS/HTML)
    if (lastAIText) {
        const tmpDiv = document.createElement('div');
        tmpDiv.innerHTML = lastAIText;
        
        const forbiddenTags = tmpDiv.querySelectorAll('style, script, head, html, body');
        forbiddenTags.forEach(tag => tag.remove());
        
        const plainText = tmpDiv.innerText.trim();
        
        const pageH = doc.internal.pageSize.getHeight();
        doc.setFontSize(8.5); doc.setFont('helvetica', 'normal'); doc.setTextColor(40, 40, 40);
        
        doc.splitTextToSize(plainText, W - 30).forEach(line => {
            if (y > pageH - 18) {
                doc.addPage(); doc.setFillColor(10, 10, 12); doc.rect(0, 0, W, 10, 'F'); y = 18;
            }
            doc.text(line, 15, y); y += 5;
        });
    }

    // Footer
    const pages = doc.internal.getNumberOfPages();
    for (let p = 1; p <= pages; p++) {
        doc.setPage(p); doc.setFontSize(6); doc.setTextColor(80, 80, 80);
        doc.text(`DERMA X-PRO — Multi-Agents AI Architecture — ${p}/${pages}`, W / 2, doc.internal.pageSize.getHeight() - 7, { align: 'center' });
    }

    doc.save(`DermaXPro_Vocal_${Date.now()}.pdf`);
}

// ── UTILITAIRES ──
function showToast(msg, type = 'error') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = type === 'success' ? 'toast-success' : 'toast-error';
    t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 4000);
}
function closeOverlay(id) { 
    stopVoice(); // Coupe la voix si on quitte l'écran
    document.getElementById(id).classList.remove('active'); 
}

// ── BOOT ──
startSystem();
</script>
