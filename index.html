<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="author" content="Nicolas JULIENNE - Lead Architect">
    <meta name="date" content="Mars 2026">
    <title>Nexus | V92 Fullstack Resilience</title>
    
    <meta name="theme-color" content="#0f172a">

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #38bdf8; 
            --primary-dark: #0284c7;
            --accent: #10b981; 
            --danger: #fb7185; 
            --neuro: #a855f7; 
            --bg: #0f172a; 
            --surface: rgba(30, 41, 59, 0.7); 
            --surface-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --am: #fbbf24; --pm: #818cf8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
               background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%); }

        header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; background: transparent; z-index: 100; }
        .logo-area { display: flex; flex-direction: column; }
        .app-title { font-size: 1.1rem; font-weight: 800; letter-spacing: 1px; color: #fff; display: flex; align-items: center; gap: 6px;}
        .app-title span { color: var(--primary); }
        .app-subtitle { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 600;}
        .badge-pro { background: linear-gradient(135deg, var(--neuro), #7e22ce); color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.6rem; font-weight: 700; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);}

        #viewport { position: relative; flex: 0 0 25vh; margin: 0 16px; border-radius: 24px; background: #000; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--surface-border); }
        video, #output-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; transform: scaleX(-1); }
        #output-canvas { z-index: 6; pointer-events: none; }
        .scan-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(15,23,42,0.8)); z-index: 5; pointer-events: none;}
        .loading-mesh { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--primary); font-weight: 700; z-index: 20; text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; text-align: center; text-shadow: 0 2px 10px rgba(0,0,0,0.8);}

        .dashboard { flex: 1; padding: 16px; display: flex; flex-direction: column; overflow-y: auto; gap: 16px; }
        
        .status-container { display: flex; justify-content: space-between; align-items: center; padding: 0 4px; }
        .status-text { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); box-shadow: 0 0 10px var(--primary); animation: pulse 2s infinite;}
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; box-shadow: 0 0 15px var(--primary); } 100% { opacity: 0.5; } }

        .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .kpi-card { background: var(--surface); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--surface-border); border-radius: 16px; padding: 16px 12px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.2);}
        .kpi-value { font-size: 1.4rem; font-weight: 800; color: #fff; margin-bottom: 2px; font-feature-settings: "tnum";}
        .kpi-unit { font-size: 0.6rem; color: var(--primary); font-weight: 600; margin-left: 2px;}
        .kpi-label { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600;}

        .report-section { background: var(--surface); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--surface-border); border-radius: 20px; display: flex; flex-direction: column; flex: 1; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.3);}
        
        .tabs { display: flex; background: rgba(0,0,0,0.2); padding: 6px; gap: 6px; }
        .tab-btn { flex: 1; background: transparent; border: none; color: var(--text-muted); padding: 12px 0; font-size: 0.65rem; cursor: pointer; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border-radius: 12px; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: #fff; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4); }
        .tab-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        #content-area { padding: 20px; overflow-y: auto; flex: 1; font-size: 0.85rem; line-height: 1.6; color: #e2e8f0; }

        .clinical-scales { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
        .scale-box { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; padding: 10px 8px; text-align: center; }
        .scale-title { font-size: 0.5rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .scale-val { font-size: 0.75rem; font-weight: 800; color: #fff; }

        .health-score-container { display: flex; align-items: center; gap: 20px; background: rgba(0,0,0,0.3); padding: 16px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px;}
        .score-circle { width: 60px; height: 60px; border-radius: 50%; background: conic-gradient(var(--primary) calc(var(--score) * 1%), #1e293b 0); display: flex; align-items: center; justify-content: center; position: relative;}
        .score-circle::inner { content: ""; position: absolute; inset: 4px; background: var(--bg); border-radius: 50%; }
        .score-value { position: relative; z-index: 2; font-weight: 800; font-size: 1.2rem; color: #fff; }
        .score-text h3 { font-size: 0.9rem; margin-bottom: 2px; color: #fff;}
        .score-text p { font-size: 0.7rem; color: var(--text-muted);}

        .content-block { margin-bottom: 20px; }
        .block-title { font-size: 0.75rem; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; font-weight: 800; margin-bottom: 10px; display: flex; align-items: center; gap: 8px;}
        .block-text { color: #cbd5e1; font-size: 0.85rem; }
        
        .routine-card { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; margin-bottom: 10px; border-left: 3px solid var(--text-muted);}
        .routine-card.am { border-left-color: var(--am); }
        .routine-card.pm { border-left-color: var(--pm); }
        .r-header { display: flex; justify-content: space-between; margin-bottom: 6px; align-items: center;}
        .r-step { font-size: 0.65rem; font-weight: 800; color: #fff; text-transform: uppercase; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 10px;}
        .r-product { font-weight: 700; color: var(--primary); font-size: 0.85rem;}
        .r-reason { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;}

        .pill-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .pill { background: rgba(16, 185, 129, 0.1); color: var(--accent); border: 1px solid rgba(16, 185, 129, 0.3); padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;}

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: auto; padding-top: 5px;}
        .btn { padding: 16px; border: none; border-radius: 16px; font-weight: 800; font-size: 0.75rem; cursor: pointer; text-transform: uppercase; transition: transform 0.2s, box-shadow 0.2s; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .btn-main { background: #fff; color: #0f172a; box-shadow: 0 4px 20px rgba(255, 255, 255, 0.2); grid-column: span 2;}
        .btn-main:active { transform: scale(0.98); }
        .btn-main:disabled { background: #1e293b; color: #475569; cursor: not-allowed; box-shadow: none;}
        .btn-sub { background: transparent; color: var(--text-main); border: 1px solid var(--surface-border); backdrop-filter: blur(10px);}
        .btn-sub:active { background: rgba(255,255,255,0.05); }
        .btn-sub:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .hidden-proc { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="app-title">NEXUS <span>CLINICAL</span></div>
            <div class="app-subtitle">Fullstack Resilience V92</div>
        </div>
        <div class="badge-pro">EXPERT</div>
    </header>

    <div id="viewport">
        <video id="webcam" autoplay playsinline muted></video>
        <div class="scan-overlay"></div>
        <canvas id="output-canvas"></canvas>
        <div class="loading-mesh" id="mesh-loader">Initialisation Systèmes...</div>
    </div>

    <div class="dashboard">
        <div class="status-container">
            <div class="status-text" id="status"><div class="status-dot" id="s-dot"></div> <span id="status-msg">En attente d'acquisition</span></div>
        </div>
        
        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-value" id="v-text">--<span class="kpi-unit">Hz</span></div>
                <div class="kpi-label">Relief</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value" id="v-ery">--<span class="kpi-unit">a*</span></div>
                <div class="kpi-label">Érythème</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value" id="v-mel">--<span class="kpi-unit">ΔL</span></div>
                <div class="kpi-label">Mélanine</div>
            </div>
        </div>
        
        <div class="report-section">
            <div class="tabs">
                <button class="tab-btn active" data-target="diag" id="tab-diag" disabled>Bilan Expert</button>
                <button class="tab-btn" data-target="routine" id="tab-routine" disabled>Prescription</button>
                <button class="tab-btn" data-target="holistic" id="tab-holis" disabled>Holistique</button>
            </div>
            <div id="content-area">
                <div style="text-align:center; padding: 40px 20px; color: var(--text-muted);">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:15px; opacity:0.5;">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line>
                    </svg>
                    <p style="font-size:0.85rem;">Système prêt.<br>Lancez le scanner clinique.</p>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-main" id="btn-scan" disabled>Scanner le Patient</button>
            <button class="btn btn-sub" id="btn-reset">🔄 Nouveau Patient</button>
            <button class="btn btn-sub" id="btn-pdf" disabled>📄 Dossier PDF</button>
        </div>
    </div>

    <canvas id="proc-canvas" class="hidden-proc"></canvas>
    <canvas id="mask-canvas" class="hidden-proc"></canvas>
    
    <script>
        const ui = {
            v: document.getElementById('webcam'),
            canvas: document.getElementById('output-canvas'),
            ctx: document.getElementById('output-canvas').getContext('2d'),
            proc: document.getElementById('proc-canvas'),
            mask: document.getElementById('mask-canvas'),
            btnScan: document.getElementById('btn-scan'),
            btnPdf: document.getElementById('btn-pdf'),
            btnReset: document.getElementById('btn-reset'),
            content: document.getElementById('content-area'),
            statusMsg: document.getElementById('status-msg'),
            sDot: document.getElementById('s-dot'),
            meshLoader: document.getElementById('mesh-loader'),
            stats: { text: document.getElementById('v-text'), ery: document.getElementById('v-ery'), mel: document.getElementById('v-mel') },
            tabs: document.querySelectorAll('.tab-btn'),
            tabBtns: { diag: document.getElementById('tab-diag'), routine: document.getElementById('tab-routine'), holis: document.getElementById('tab-holis') }
        };

        let state = { 
            meshReady: false, lastLandmarks: null, 
            metrics: { text: 0, ery: 0, mel: 0 },
            aiData: null, 
            htmlRender: { diag: "", routine: "", holistic: "" } 
        };

        // --- FULLSTACK FIX: API Key Management via prompt or direct config ---
        function checkApiKey() {
            if(!localStorage.getItem('pixtral_api_key')) {
                const key = prompt("Veuillez entrer votre clé API Mistral (obligatoire pour Pixtral-12b) :");
                if (key) localStorage.setItem('pixtral_api_key', key.trim());
            }
            return !!localStorage.getItem('pixtral_api_key');
        }

        // --- API CALL AVEC SÉCURITÉ REGEX JSON (FULLSTACK FIX) ---
        async function fetchPixtralAnalysis(base64Image, text, ery, mel) {
            const apiKey = localStorage.getItem('pixtral_api_key');
            if (!apiKey) throw new Error("Clé API Mistral manquante.");

            const prompt = `Tu es Professeur en Dermatologie Clinique.
Analyse la photo du patient croisée avec ces marqueurs biométriques mathématiques : [Relief: ${text}Hz (norme<22)], [Érythème a*: ${ery} (norme<14.5)], [Dyschromie ΔL: ${mel} (norme<4.5)].

1. Évalue le Phototype de Fitzpatrick (Type I à VI).
2. Évalue l'Échelle de Glogau du vieillissement (Type I à IV).
3. Détermine l'indice visuel d'hydratation.

Génère une réponse UNIQUEMENT en JSON valide avec cette structure stricte, sans aucun blabla avant ou après :
{
  "score_sante": 85,
  "echelles_cliniques": {
    "fitzpatrick": "Type X",
    "glogau": "Type Y",
    "hydratation": "Niveau d'hydratation"
  },
  "diagnostic_principal": "Titre clinique précis",
  "explication_clinique": "Physiopathologie en 3 lignes maximum.",
  "actes_esthetiques": ["Nom d'acte 1", "Nom d'acte 2"],
  "routine_am": [
    {"etape": "Bouclier", "produit": "Actif INCI", "raison": "Explication"}
  ],
  "routine_pm": [
    {"etape": "Traitement", "produit": "Actif INCI", "raison": "Explication"}
  ],
  "conseils_holistiques": ["Conseil 1", "Conseil 2"]
}`;
            
            const payload = {
                model: "pixtral-12b-2409",
                response_format: { type: "json_object" },
                temperature: 0.1,
                messages: [ 
                    { 
                        role: "user", 
                        content: [ 
                            { type: "image_url", image_url: base64Image }, // Format strict Mistral
                            { type: "text", text: prompt } 
                        ] 
                    } 
                ]
            };

            const response = await fetch('https://api.mistral.ai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify(payload)
            });

            if (!response.ok) throw new Error(`Erreur API Mistral (${response.status})`);
            const data = await response.json();
            
            // FULLSTACK FIX: Robust JSON extraction via Regex to bypass LLM markdown hallucinations
            const rawContent = data.choices[0].message.content;
            const jsonMatch = rawContent.match(/\{[\s\S]*\}/);
            if (!jsonMatch) throw new Error("Le modèle n'a pas retourné de structure de données lisible.");
            
            return JSON.parse(jsonMatch[0]);
        }

        // --- GÉNÉRATION DYNAMIQUE UI ---
        function renderUI(data) {
            let colorScore = data.score_sante > 80 ? 'var(--accent)' : (data.score_sante > 60 ? 'var(--primary)' : 'var(--danger)');
            
            let htmlDiag = `
                <div class="health-score-container" style="--score:${data.score_sante}; --primary:${colorScore}">
                    <div class="score-circle"><div class="score-value">${data.score_sante}</div></div>
                    <div class="score-text">
                        <h3>Vitalité Cutanée</h3>
                        <p>Index quantifié par Pixtral IA.</p>
                    </div>
                </div>

                <div class="content-block">
                    <div class="block-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg> Classifications Internationales</div>
                    <div class="clinical-scales">
                        <div class="scale-box">
                            <div class="scale-title">Fitzpatrick</div>
                            <div class="scale-val" style="color:var(--primary)">${data.echelles_cliniques.fitzpatrick}</div>
                        </div>
                        <div class="scale-box">
                            <div class="scale-title">Glogau</div>
                            <div class="scale-val" style="color:var(--neuro)">${data.echelles_cliniques.glogau}</div>
                        </div>
                        <div class="scale-box">
                            <div class="scale-title">Hydratation</div>
                            <div class="scale-val" style="color:var(--accent)">${data.echelles_cliniques.hydratation}</div>
                        </div>
                    </div>
                </div>

                <div class="content-block">
                    <div class="block-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg> Diagnostic Physiologique : ${data.diagnostic_principal}</div>
                    <div class="block-text">${data.explication_clinique}</div>
                </div>
                <div class="content-block">
                    <div class="block-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> Actes Cliniques Valables</div>
                    <div class="pill-list">
                        ${data.actes_esthetiques.map(a => `<span class="pill">${a}</span>`).join('')}
                    </div>
                </div>
            `;

            let htmlRoutine = `<div class="block-title" style="color:var(--am);">☀️ Protocole de Jour (Bouclier)</div>`;
            data.routine_am.forEach((step, i) => {
                htmlRoutine += `<div class="routine-card am"><div class="r-header"><span class="r-step">${step.etape}</span></div><div class="r-product">${step.produit}</div><div class="r-reason">${step.raison}</div></div>`;
            });

            htmlRoutine += `<div class="block-title" style="color:var(--pm); margin-top:20px;">🌙 Protocole de Nuit (Régénération)</div>`;
            data.routine_pm.forEach((step, i) => {
                htmlRoutine += `<div class="routine-card pm"><div class="r-header"><span class="r-step">${step.etape}</span></div><div class="r-product">${step.produit}</div><div class="r-reason">${step.raison}</div></div>`;
            });

            let htmlHolis = `<div class="content-block"><div class="block-title" style="color:var(--accent);">🌿 Épigénétique & Nutrition</div>`;
            data.conseils_holistiques.forEach(c => {
                htmlHolis += `<div class="routine-card" style="border-left-color:var(--accent);"><div class="r-reason" style="color:#e2e8f0; font-size:0.8rem;">${c}</div></div>`;
            });
            htmlHolis += `</div>`;

            state.htmlRender = { diag: htmlDiag, routine: htmlRoutine, holistic: htmlHolis };
        }

        // --- INIT VISION SYSTEM ---
        async function initAll() {
            state.faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
            state.faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
            state.faceMesh.onResults(onResults);
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                ui.v.srcObject = stream;
                
                // Attente que la vidéo soit prête pour garantir les dimensions (Fullstack Fix)
                ui.v.onloadedmetadata = async () => {
                    state.camera = new Camera(ui.v, { onFrame: async () => { await state.faceMesh.send({image: ui.v}); }, width: 1280, height: 720 });
                    await state.camera.start();
                    state.meshReady = true; ui.meshLoader.style.display = 'none';
                    checkSystem();
                };
            } catch (e) {
                updateStatus("Autorisez la caméra", false, true);
                ui.meshLoader.innerText = "Caméra Bloquée";
            }
        }

        function checkSystem() {
            if (state.meshReady) {
                ui.btnScan.disabled = false; updateStatus("Système Armé", true);
            }
        }

        function updateStatus(m, ready=false, err=false) {
            ui.statusMsg.innerText = m;
            ui.sDot.style.background = err ? "var(--danger)" : (ready ? "var(--accent)" : "var(--primary)");
            ui.sDot.style.boxShadow = `0 0 10px ${ui.sDot.style.background}`;
        }

        function onResults(results) {
            ui.canvas.width = ui.v.videoWidth; ui.canvas.height = ui.v.videoHeight;
            ui.ctx.clearRect(0, 0, ui.canvas.width, ui.canvas.height);
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                state.lastLandmarks = results.multiFaceLandmarks[0];
                drawConnectors(ui.ctx, state.lastLandmarks, FACEMESH_FACE_OVAL, {color: '#38bdf844', lineWidth: 1.5});
            } else { state.lastLandmarks = null; }
        }

        // --- MATHS LOCALES ---
        function rgb2lab(r, g, b) {
            let r_=r/255, g_=g/255, b_=b/255;
            r_=(r_>0.04045)?Math.pow((r_+0.055)/1.055,2.4):r_/12.92; g_=(g_>0.04045)?Math.pow((g_+0.055)/1.055,2.4):g_/12.92; b_=(b_>0.04045)?Math.pow((b_+0.055)/1.055,2.4):b_/12.92;
            let x=(r_*0.4124+g_*0.3576+b_*0.1805)*100, y=(r_*0.2126+g_*0.7152+b_*0.0722)*100, z=(r_*0.0193+g_*0.1192+b_*0.9505)*100;
            x/=95.047; y/=100.000; z/=108.883;
            x=(x>0.008856)?Math.pow(x,1/3):(7.787*x)+16/116; y=(y>0.008856)?Math.pow(y,1/3):(7.787*y)+16/116; z=(z>0.008856)?Math.pow(z,1/3):(7.787*z)+16/116;
            return { l: (116*y)-16, a: 500*(x-y) };
        }

        const OVAL_INDICES = [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109];
        const EYE_L = [33, 7, 163, 144, 145, 153, 154, 155, 133, 173, 157, 158, 159, 160, 161, 246];
        const EYE_R = [362, 382, 381, 380, 374, 373, 390, 249, 263, 466, 388, 387, 386, 385, 384, 398];
        const LIPS = [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 409, 270, 269, 267, 0, 37, 39, 40];

        function drawSafeMask(ctx, indices, w, h, color, composite) {
            ctx.globalCompositeOperation = composite; ctx.fillStyle = color; ctx.beginPath();
            indices.forEach((idx, i) => { i===0 ? ctx.moveTo(state.lastLandmarks[idx].x*w, state.lastLandmarks[idx].y*h) : ctx.lineTo(state.lastLandmarks[idx].x*w, state.lastLandmarks[idx].y*h); });
            ctx.closePath(); ctx.fill();
        }

        // --- CŒUR D'EXÉCUTION CLINIQUE ---
        async function runAnalysis() {
            if (!state.lastLandmarks) return;
            if (!checkApiKey()) return;
            
            // FULLSTACK FIX: Clear previous state completely
            state.htmlRender = { diag: "", routine: "", holistic: "" };
            Object.values(ui.tabBtns).forEach(btn => btn.disabled = true);
            ui.btnPdf.disabled = true;
            ui.btnScan.disabled = true; 
            ui.content.innerHTML = `<div style="text-align:center; padding: 40px 20px;"><div class="status-dot" style="display:inline-block; margin-bottom:15px; width:15px; height:15px;"></div><p>Extraction Biométrique et Analyse Pixtral en cours...</p></div>`;
            
            updateStatus("Calcul Biomarkers...", false);
            
            setTimeout(async () => {
                try {
                    // FULLSTACK FIX: Security check for video dimensions
                    if(!ui.v.videoWidth || ui.v.videoWidth === 0) throw new Error("Flux vidéo instable. Veuillez réessayer.");

                    const scale = 512 / ui.v.videoWidth;
                    const W = 512; const H = Math.floor(ui.v.videoHeight * scale);
                    ui.proc.width = W; ui.proc.height = H; ui.mask.width = W; ui.mask.height = H;
                    
                    const procCtx = ui.proc.getContext('2d', {willReadFrequently: true});
                    const maskCtx = ui.mask.getContext('2d', {willReadFrequently: true});

                    procCtx.drawImage(ui.v, 0, 0, W, H);
                    maskCtx.fillStyle = '#000000'; maskCtx.fillRect(0, 0, W, H);
                    drawSafeMask(maskCtx, OVAL_INDICES, W, H, '#FFFFFF', 'source-over');
                    drawSafeMask(maskCtx, EYE_L, W, H, '#000000', 'destination-out');
                    drawSafeMask(maskCtx, EYE_R, W, H, '#000000', 'destination-out');
                    drawSafeMask(maskCtx, LIPS, W, H, '#000000', 'destination-out');
                    
                    // Format de données base64 natif pour l'API
                    const base64Image = `data:image/jpeg;base64,${ui.proc.toDataURL('image/jpeg', 0.8).split(',')[1]}`;

                    const imgData = procCtx.getImageData(0, 0, W, H);
                    const maskData = maskCtx.getImageData(0, 0, W, H);
                    
                    let sumLap=0, sqSumLap=0, countLap=0, sumA=0, sumL=0, countLab=0, lValues=[];

                    for(let y=1; y<H-1; y+=4) { 
                        for(let x=1; x<W-1; x+=4) {
                            let idx = (y * W + x) * 4;
                            if(maskData.data[idx] > 128) { 
                                let lab = rgb2lab(imgData.data[idx], imgData.data[idx+1], imgData.data[idx+2]);
                                sumA += lab.a; sumL += lab.l; lValues.push(lab.l); countLab++;

                                let c = imgData.data[idx+1]; let t = imgData.data[idx - W*4 + 1]; let bo = imgData.data[idx + W*4 + 1];
                                let l = imgData.data[idx - 4 + 1]; let ri = imgData.data[idx + 4 + 1];
                                let lap = (c * 4) - t - bo - l - ri;
                                sumLap += lap; sqSumLap += (lap * lap); countLap++;
                            }
                        }
                    }
                    if(countLab === 0) throw new Error("Visage non trouvé dans le cadre.");

                    let meanLap = sumLap / countLap; let varLap = (sqSumLap / countLap) - (meanLap * meanLap);
                    state.metrics.text = Math.min(99, Math.max(0, varLap / 15)).toFixed(1); 
                    state.metrics.ery = (sumA / countLab).toFixed(1);
                    
                    let meanL = sumL / countLab; let sqDiffL = 0;
                    for(let i=0; i<lValues.length; i++) sqDiffL += Math.pow(lValues[i] - meanL, 2);
                    state.metrics.mel = Math.sqrt(sqDiffL / countLab).toFixed(1);

                    ui.stats.text.innerText = state.metrics.text; 
                    ui.stats.ery.innerText = state.metrics.ery; 
                    ui.stats.mel.innerText = state.metrics.mel;

                    updateStatus("Inférence Mistral VLM...", false);
                    state.aiData = await fetchPixtralAnalysis(base64Image, state.metrics.text, state.metrics.ery, state.metrics.mel);
                    
                    renderUI(state.aiData);
                    
                    // Déblocage UI
                    Object.values(ui.tabBtns).forEach(btn => btn.disabled = false);
                    ui.tabs.forEach(t => t.classList.remove('active')); ui.tabBtns.diag.classList.add('active');
                    ui.content.innerHTML = state.htmlRender.diag; 
                    
                    updateStatus("Dossier Clinique Prêt", true);
                    ui.btnScan.disabled = false; ui.btnPdf.disabled = false;

                } catch (error) {
                    ui.content.innerHTML = `<div class="health-score-container" style="border-color:var(--danger)"><p style="color:var(--danger)">Erreur Système : ${error.message}</p></div>`;
                    updateStatus("Échec de l'Analyse", false, true);
                    ui.btnScan.disabled = false;
                }
            }, 150); 
        }

        ui.btnScan.onclick = runAnalysis;

        // FULLSTACK FIX: Nouveau Patient Reset Workflow
        ui.btnReset.onclick = () => {
            state.aiData = null;
            state.metrics = { text: 0, ery: 0, mel: 0 };
            ui.stats.text.innerText = "--"; ui.stats.ery.innerText = "--"; ui.stats.mel.innerText = "--";
            ui.content.innerHTML = `<div style="text-align:center; padding: 40px 20px; color: var(--text-muted);"><p style="font-size:0.85rem;">Dossier vierge.<br>Prêt pour un nouveau patient.</p></div>`;
            Object.values(ui.tabBtns).forEach(btn => btn.disabled = true);
            ui.btnPdf.disabled = true;
            updateStatus("Système Armé", true);
        };
        
        ui.tabs.forEach(btn => {
            btn.onclick = () => {
                if(!state.aiData) return;
                ui.tabs.forEach(t => t.classList.remove('active')); btn.classList.add('active');
                ui.content.innerHTML = state.htmlRender[btn.dataset.target];
            };
        });

        // --- MOTEUR PDF ---
        ui.btnPdf.onclick = () => {
            if(!state.aiData) return;
            updateStatus("Création PDF...", false);
            const { jsPDF } = window.jspdf; 
            const doc = new jsPDF('p', 'mm', 'a4');
            
            doc.setFillColor(250, 250, 250); doc.rect(0, 0, 210, 297, 'F');
            doc.setFillColor(15, 23, 42); doc.rect(0, 0, 210, 45, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(24); doc.setFont("helvetica", "bold");
            doc.text("DOSSIER DERMATOLOGIQUE", 15, 20);
            doc.setTextColor(56, 189, 248); doc.setFontSize(10); doc.setFont("helvetica", "normal");
            doc.text("NEXUS MEDICAL AI - EXPERT EDITION V92", 15, 28);
            
            let today = new Date().toLocaleDateString('fr-FR');
            let patId = "NX-" + Math.floor(Math.random() * 100000);
            doc.setTextColor(148, 163, 184); doc.setFontSize(9);
            doc.text(`Date: ${today}`, 160, 20);
            doc.text(`Dossier N°: ${patId}`, 160, 26);
            
            let yPos = 60;

            const drawTitle = (title, colorArr) => {
                if(yPos > 260) { doc.addPage(); yPos = 20; }
                doc.setTextColor(colorArr[0], colorArr[1], colorArr[2]);
                doc.setFontSize(14); doc.setFont("helvetica", "bold");
                doc.text(title, 15, yPos);
                doc.setDrawColor(226, 232, 240); doc.line(15, yPos + 3, 195, yPos + 3);
                yPos += 12;
            };

            const drawText = (text, isBold = false) => {
                if(yPos > 270) { doc.addPage(); yPos = 20; }
                doc.setTextColor(51, 65, 85); doc.setFontSize(10); doc.setFont("helvetica", isBold ? "bold" : "normal");
                let lines = doc.splitTextToSize(text, 180);
                doc.text(lines, 15, yPos);
                yPos += (lines.length * 5) + 4;
            };

            drawTitle("1. Relevé Biométrique Instrumental", [15, 23, 42]);
            doc.setFillColor(241, 245, 249); doc.roundedRect(15, yPos, 55, 20, 3, 3, 'F');
            doc.roundedRect(75, yPos, 55, 20, 3, 3, 'F');
            doc.roundedRect(135, yPos, 55, 20, 3, 3, 'F');
            
            doc.setTextColor(51, 65, 85); doc.setFontSize(9); doc.setFont("helvetica", "normal");
            doc.text("Texture (Relief)", 20, yPos + 7); doc.text("Sensibilité (a*)", 80, yPos + 7); doc.text("Mélanine (Taches)", 140, yPos + 7);
            doc.setTextColor(15, 23, 42); doc.setFontSize(12); doc.setFont("helvetica", "bold");
            doc.text(`${state.metrics.text} Hz`, 20, yPos + 15); doc.text(`${state.metrics.ery}`, 80, yPos + 15); doc.text(`${state.metrics.mel} ΔL`, 140, yPos + 15);
            yPos += 30;

            drawTitle("2. Classifications Internationales", [168, 85, 247]); 
            drawText(`• Phototype de Fitzpatrick : ${state.aiData.echelles_cliniques.fitzpatrick}`, true);
            drawText(`• Échelle de Glogau (Vieillissement) : ${state.aiData.echelles_cliniques.glogau}`, true);
            drawText(`• Indice d'hydratation : ${state.aiData.echelles_cliniques.hydratation}`, true);
            yPos += 8;

            drawTitle(`3. Diagnostic Multimodal (Score: ${state.aiData.score_sante}/100)`, [2, 132, 199]);
            drawText(`Bilan Principal : ${state.aiData.diagnostic_principal}`, true);
            drawText(state.aiData.explication_clinique);
            yPos += 5;

            drawTitle("4. Actes Pratiquables en Cabinet", [15, 23, 42]);
            state.aiData.actes_esthetiques.forEach(acte => drawText("• " + acte));
            yPos += 5;

            drawTitle("5. Prescription Soins - Matin", [245, 158, 11]);
            state.aiData.routine_am.forEach((step, i) => {
                drawText(`Étape ${i+1} : ${step.etape}`, true);
                drawText(`Actif recommandé : ${step.produit}`);
                drawText(`Objectif : ${step.raison}`);
                yPos += 3;
            });

            drawTitle("6. Prescription Soins - Soir", [99, 102, 241]);
            state.aiData.routine_pm.forEach((step, i) => {
                drawText(`Étape ${i+1} : ${step.etape}`, true);
                drawText(`Actif recommandé : ${step.produit}`);
                drawText(`Objectif : ${step.raison}`);
                yPos += 3;
            });

            drawTitle("7. Recommandations Holistiques", [16, 185, 129]);
            state.aiData.conseils_holistiques.forEach(c => drawText("• " + c));

            doc.setFontSize(8); doc.setTextColor(148, 163, 184); doc.setFont("helvetica", "normal");
            doc.text("Généré par Pixtral VLM. Document informatif, ne remplace pas une consultation médicale légale.", 105, 290, {align: "center"});

            if (/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
                window.open(URL.createObjectURL(doc.output('blob')));
            } else {
                doc.save(`Dossier_Nexus_${patId}.pdf`);
            }
            updateStatus("PDF Terminé", true);
        };

        window.onload = initAll;
    </script>
</body>
