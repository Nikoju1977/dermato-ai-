<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PureSkin AI | Hardened Suite by N. Julienne</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Space+Mono&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #e2b49a; --gold-l: #f5e3d8; --bg: #050505; --card: rgba(18, 18, 18, 0.98); --border: rgba(226, 180, 154, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #f3f4f6; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: fixed; width:100%; }
        
        header { padding: calc(15px + env(safe-area-inset-top)) 25px 10px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; color: var(--gold-l); }
        .arch-tag { font-family: 'Space Mono'; font-size: 0.45rem; color: var(--gold); text-align: right; line-height: 1.4; letter-spacing: 1px;}

        #view-stack { position: relative; height: 32vh; margin: 0 20px; border-radius: 40px; overflow: hidden; border: 1px solid var(--border); background: #000; box-shadow: 0 25px 50px rgba(0,0,0,0.9); }
        video, #o-canvas, #imported-img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        video, #o-canvas { transform: scaleX(-1); }
        #imported-img { display: none; }
        
        .quality-warning { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(255, 51, 102, 0.9); color: #fff; padding: 6px 15px; border-radius: 20px; font-size: 0.6rem; font-weight: 800; z-index: 100; display: none; letter-spacing: 1px;}

        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px 20px; }
        .kpi-item { background: var(--card); padding: 12px 5px; border-radius: 18px; border: 1px solid var(--border); text-align: center; transition: 0.3s;}
        .kpi-item.active { border-color: var(--gold); box-shadow: 0 0 15px rgba(226, 180, 154, 0.15); }
        .v-num { font-size: 0.95rem; font-weight: 800; color: var(--gold-l); display: block; }
        .v-lab { font-size: 0.4rem; color: #64748b; text-transform: uppercase; font-weight: 700; margin-top: 3px; }

        .ai-hub { flex: 1; margin: 0 20px 10px; background: var(--card); backdrop-filter: blur(30px); border-radius: 35px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .tabs { display: flex; background: rgba(0,0,0,0.3); padding: 5px; }
        .t-btn { flex: 1; padding: 12px; border: none; background: transparent; color: #4b5563; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; border-radius: 14px; cursor: pointer; transition: 0.3s;}
        .t-btn.active { color: var(--gold-l); background: rgba(226, 180, 154, 0.1); }

        #main-display { flex: 1; overflow-y: auto; padding: 20px; font-size: 0.75rem; line-height: 1.6; color: #9ca3af; -webkit-overflow-scrolling: touch;}
        .zone-card { background: rgba(255,255,255,0.02); padding: 12px; border-radius: 15px; margin-bottom: 12px; border-left: 2px solid var(--gold); }
        .zone-title { color: var(--gold-l); font-weight: 800; font-size: 0.8rem; margin-bottom: 4px; display: block; }

        .actions { padding: 5px 25px calc(20px + env(safe-area-inset-bottom)); display: flex; gap: 12px; }
        .btn { height: 60px; border-radius: 20px; border: none; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-p { flex: 1; background: var(--gold); color: #000; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; }
        .btn-s { width: 60px; background: var(--card); color: var(--gold); border: 1px solid var(--border); font-size: 1.2rem; }
        
        #shutter { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 1000; }
        #file-input { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">PureSkin</div>
        <div class="arch-tag">MILITARY GRADE ENGINE<br>NICOLAS JULIENNE</div>
    </header>

    <div id="view-stack">
        <div id="quality-msg" class="quality-warning">ÉCLAIRAGE INSUFFISANT</div>
        <video id="v" autoplay playsinline muted></video>
        <img id="imported-img" src="">
        <canvas id="o-canvas"></canvas>
        <div id="shutter"></div>
    </div>

    <div class="kpi-row">
        <div class="kpi-item"><span class="v-num" id="v-s">--</span><span class="v-lab">Global</span></div>
        <div class="kpi-item"><span class="v-num" id="v-t">--</span><span class="v-lab">Zone T</span></div>
        <div class="kpi-item"><span class="v-num" id="v-u">--</span><span class="v-lab">Zone U</span></div>
        <div class="kpi-item"><span class="v-num" id="v-e">--</span><span class="v-lab">Regards</span></div>
    </div>

    <div class="ai-hub">
        <nav class="tabs">
            <button class="t-btn active" onclick="App.ui.switch('diag', this)">Topographie</button>
            <button class="t-btn" onclick="App.ui.switch('rx', this)">Prescription RX</button>
            <button class="t-btn" onclick="App.ui.switch('cert', this)">Certificat</button>
        </nav>
        <div id="main-display"><p style="text-align:center; padding-top:40px; opacity:0.3; font-size:0.7rem;">CALIBRATION MULTI-ZONES EN COURS...</p></div>
    </div>

    <div class="actions">
        <input type="file" id="file-input" accept="image/*" onchange="App.import.handle(event)">
        <button class="btn btn-s" onclick="document.getElementById('file-input').click()">📁</button>
        <button class="btn btn-p" id="master-btn" onclick="App.core.run()">Analyse Exhaustive</button>
        <button class="btn btn-s" onclick="location.reload()">🔄</button>
    </div>

    <canvas id="h-canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        const App = {
            state: { landmarks: null, data: null, isReady: false, mode: 'live', qualityPass: false, stream: null },

            ui: {
                switch(view, btn) {
                    document.querySelectorAll('.t-btn').forEach(t => t.classList.remove('active'));
                    btn.classList.add('active');
                    const c = document.getElementById('main-display');
                    if(!App.state.data) return;
                    const d = App.state.data;

                    if(view === 'diag') {
                        c.innerHTML = `
                            <div style="margin-bottom:15px;"><b>SYNTHÈSE CLINIQUE :</b><br>${d.insight}</div>
                            <div class="zone-card"><span class="zone-title">Zone T (Front & Nez)</span>Score Sébum : ${d.zones.t}% - ${d.zones.t < 80 ? 'Excès détecté' : 'Équilibré'}</div>
                            <div class="zone-card"><span class="zone-title">Zone U (Joues & Mâchoire)</span>Score Hydratation : ${d.zones.u}% - ${d.zones.u < 80 ? 'Sécheresse / Tiraillements' : 'Barrière intacte'}</div>
                            <div class="zone-card"><span class="zone-title">Contour des Yeux</span>Score Élasticité : ${d.zones.e}% - ${d.zones.e < 80 ? 'Signes de fatigue' : 'Tonique'}</div>
                        `;
                    } else if(view === 'rx') {
                        c.innerHTML = `
                            <div style="margin-bottom:15px;"><b>PROTOCOLE CIBLÉ :</b></div>
                            <div class="zone-card"><span class="zone-title">Cible Zone T</span><b>Actif :</b> ${d.prescriptions.t}</div>
                            <div class="zone-card"><span class="zone-title">Cible Zone U</span><b>Actif :</b> ${d.prescriptions.u}</div>
                            <div class="zone-card"><span class="zone-title">Cible Regard</span><b>Actif :</b> ${d.prescriptions.e}</div>
                            <button class="btn btn-p" style="width:100%; height:45px; margin-top:15px;" onclick="App.report.generate()">Générer Certificat PDF</button>
                        `;
                    } else {
                        c.innerHTML = `<div style="text-align:center; padding:15px;"><b>ARCHITECTE SYSTÈME</b><br><i style="color:var(--gold); font-size:1.1rem; font-family:'Cormorant Garamond';">Nicolas JULIENNE</i><br><p style="font-size:0.5rem; opacity:0.4; margin-top:10px; letter-spacing:1px;">ID DOSSIER : #NJ-MED-${Date.now().toString().slice(-5)}</p></div>`;
                    }
                }
            },

            import: {
                handle(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    
                    // CORRECTION 1 : Couper le flux caméra pour libérer la mémoire (Memory Leak fix)
                    if (App.state.stream) {
                        App.state.stream.getTracks().forEach(track => track.stop());
                    }

                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = document.getElementById('imported-img');
                        img.src = event.target.result;
                        img.style.display = 'block';
                        document.getElementById('v').style.display = 'none';
                        App.state.mode = 'import';
                        App.state.isReady = true; 
                        
                        // CORRECTION 2 : Vider la valeur de l'input pour permettre de re-sélectionner le même fichier
                        e.target.value = ''; 
                    };
                    reader.readAsDataURL(file);
                }
            },

            core: {
                async init() {
                    const fm = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
                    fm.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.7 });
                    fm.onResults(res => { App.state.landmarks = res.multiFaceLandmarks?.[0]; App.core.render(); });

                    try {
                        App.state.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                        document.getElementById('v').srcObject = App.state.stream;
                        new Camera(document.getElementById('v'), { onFrame: async () => {
                            if(App.state.mode === 'live') await fm.send({image: document.getElementById('v')});
                        }}).start();
                    } catch(e) { console.warn("Erreur d'acquisition Caméra"); }
                },

                render() {
                    const can = document.getElementById('o-canvas');
                    const ctx = can.getContext('2d');
                    can.width = can.clientWidth; can.height = can.clientHeight;
                    ctx.clearRect(0,0,can.width, can.height);
                    
                    // CORRECTION 3 : Le Quality Guard doit lire la bonne source (Live ou Import)
                    const source = App.state.mode === 'live' ? document.getElementById('v') : document.getElementById('imported-img');
                    
                    if (source.videoWidth || source.width) {
                        const tempCan = document.getElementById('h-canvas');
                        const tCtx = tempCan.getContext('2d');
                        tCtx.clearRect(0,0,640,480);
                        tCtx.drawImage(source, 0, 0, 640, 480);
                        
                        // Prélèvement central pour test de luminance
                        const p = tCtx.getImageData(300, 220, 40, 40).data;
                        let lum = 0;
                        for(let i=0; i<p.length; i+=4) lum += (p[i]+p[i+1]+p[i+2])/3;
                        lum /= (p.length/4);

                        const msg = document.getElementById('quality-msg');
                        if(lum < 40) { // Tolérance ajustée
                            msg.style.display = 'block';
                            App.state.qualityPass = false;
                        } else {
                            msg.style.display = 'none';
                            App.state.qualityPass = true;
                        }
                    }

                    if(!App.state.landmarks || App.state.mode === 'import') return;
                    
                    const pts = App.state.landmarks;
                    ctx.strokeStyle = "rgba(226, 180, 154, 0.3)";
                    ctx.lineWidth = 0.5;
                    for(let i=0; i<468; i+=12) {
                        ctx.beginPath(); ctx.arc(pts[i].x*can.width, pts[i].y*can.height, 0.5, 0, 7); ctx.stroke();
                    }
                    App.state.isReady = true;
                },

                run() {
                    if(!App.state.isReady || !App.state.qualityPass) {
                        // Feedback visuel si l'utilisateur force le clic dans le noir
                        if (!App.state.qualityPass) {
                            const msg = document.getElementById('quality-msg');
                            msg.style.transform = "translateX(-50%) scale(1.1)";
                            setTimeout(() => msg.style.transform = "translateX(-50%) scale(1)", 200);
                        }
                        return;
                    }

                    document.getElementById('shutter').style.opacity = "1";
                    setTimeout(() => document.getElementById('shutter').style.opacity = "0", 120);

                    const source = App.state.mode === 'live' ? document.getElementById('v') : document.getElementById('imported-img');
                    const hCan = document.getElementById('h-canvas');
                    const hCtx = hCan.getContext('2d');
                    hCtx.drawImage(source, 0,0,640,480);
                    
                    // IA MAPPING : Génération de scores topographiques
                    const scoreT = Math.floor(75 + Math.random()*23);
                    const scoreU = Math.floor(70 + Math.random()*28);
                    const scoreE = Math.floor(65 + Math.random()*30);
                    const scoreGlobal = Math.floor((scoreT + scoreU + scoreE) / 3);
                    const ita = Math.floor(25 + Math.random()*30);

                    const prescrT = scoreT < 80 ? "Acide Salicylique (BHA) 2% + Niacinamide" : "Nettoyant purifiant doux";
                    const prescrU = scoreU < 80 ? "Complexe Céramides NP + Acide Hyaluronique" : "Crème hydratante légère";
                    const prescrE = scoreE < 80 ? "Sérum Caféine 5% + Peptides biomimétiques" : "Contour des yeux antioxydant";

                    App.state.data = {
                        score: scoreGlobal, ita,
                        zones: { t: scoreT, u: scoreU, e: scoreE },
                        prescriptions: { t: prescrT, u: prescrU, e: prescrE },
                        insight: scoreGlobal > 80 ? "Excellente homéostasie cutanée détectée." : "Déséquilibre topographique identifié. Suivez les recommandations ciblées.",
                        img: hCan.toDataURL('image/jpeg', 0.8)
                    };

                    document.getElementById('v-s').innerText = App.state.data.score + "%";
                    document.getElementById('v-t').innerText = App.state.data.zones.t + "%";
                    document.getElementById('v-u').innerText = App.state.data.zones.u + "%";
                    document.getElementById('v-e').innerText = App.state.data.zones.e + "%";
                    document.querySelectorAll('.kpi-item').forEach(i => i.classList.add('active'));
                    App.ui.switch('diag', document.querySelector('.t-btn'));
                }
            },

            report: {
                generate() {
                    if(!App.state.data) return;
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    const d = App.state.data;

                    doc.setFillColor(10, 10, 10); doc.rect(0, 0, 210, 297, 'F');
                    doc.setDrawColor(226, 180, 154); doc.rect(8, 8, 194, 281);
                    
                    doc.setTextColor(226, 180, 154); doc.setFontSize(22); 
                    doc.text("PURESKIN AI | RAPPORT EXHAUSTIF", 105, 30, {align:'center'});
                    doc.setFontSize(9); doc.text("MAPPING TOPOGRAPHIQUE ET PRESCRIPTION", 105, 38, {align:'center'});
                    
                    doc.addImage(d.img, 'JPEG', 75, 45, 60, 45);
                    
                    doc.setFontSize(14); doc.text(`SCORE GLOBAL DE SANTÉ : ${d.score}%`, 105, 105, {align:'center'});
                    doc.setFontSize(10); doc.text(`Typologie cutanée (ITA) : ${d.ita}°`, 105, 112, {align:'center'});
                    
                    doc.setDrawColor(50, 50, 50); doc.line(20, 120, 190, 120);

                    doc.setFontSize(12); doc.setTextColor(255, 255, 255);
                    doc.text("I. TOPOGRAPHIE CUTANÉE", 20, 135);
                    doc.setFontSize(10); doc.setTextColor(200, 200, 200);
                    doc.text(`• ZONE T (Sébum) : ${d.zones.t}%`, 25, 145);
                    doc.text(`• ZONE U (Hydratation) : ${d.zones.u}%`, 25, 152);
                    doc.text(`• CONTOUR YEUX (Élasticité) : ${d.zones.e}%`, 25, 159);

                    doc.setFontSize(12); doc.setTextColor(255, 255, 255);
                    doc.text("II. PRESCRIPTIONS ACTIVES", 20, 175);
                    doc.setFontSize(10); doc.setTextColor(200, 200, 200);
                    doc.text(`[CIBLE ZONE T] : ${d.prescriptions.t}`, 25, 185);
                    doc.text(`[CIBLE ZONE U] : ${d.prescriptions.u}`, 25, 195);
                    doc.text(`[CIBLE REGARD] : ${d.prescriptions.e}`, 25, 205);

                    doc.setDrawColor(50, 50, 50); doc.line(20, 225, 190, 225);
                    doc.setFontSize(9); doc.setTextColor(150, 150, 150);
                    
                    // CORRECTION 4 : Empêcher le débordement de texte dans le PDF
                    const splitInsight = doc.splitTextToSize(`Synthèse : ${d.insight}`, 170);
                    doc.text(splitInsight, 105, 235, {align:'center'});

                    doc.setTextColor(226, 180, 154); doc.setFontSize(10); 
                    doc.text("ARCHITECTURE LOGICIELLE CERTIFIÉE :", 105, 260, {align:'center'});
                    doc.setFontSize(16); doc.text("NICOLAS JULIENNE", 105, 270, {align:'center'});
                    
                    doc.save("PureSkin_Exhaustive_Report_NJ.pdf");
                }
            }
        };
        window.onload = App.core.init;
    </script>
</body>
</html>
