<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PureSkin AI | Architecte: N. JULIENNE</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #00e5ff; --accent: #00ff88; --warning: #ffaa00; --danger: #ff3366; --bg: #050914; --surface: #111a2e; --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { background: var(--bg); color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-start; flex-shrink: 0; z-index: 100; }
        .logo { font-weight: 800; font-size: 1.1rem; text-transform: uppercase; letter-spacing: -0.5px;}
        .logo span { color: var(--primary); }
        .archi { font-size: 0.5rem; color: var(--primary); font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px; }

        #viewport { position: relative; height: 26dvh; margin: 0 15px; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); background: #000; flex-shrink: 0; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        video, canvas.overlay { width: 100%; height: 100%; object-fit: cover; position: absolute; transform: scaleX(-1); }
        #static-canvas { transform: none; display: none; width: 100%; height: 100%; object-fit: cover; position: absolute;}
        
        .oval { position: absolute; inset: 0; margin: auto; width: 55%; height: 80%; border: 2px dashed rgba(255,255,255,0.2); border-radius: 50%; z-index: 10; pointer-events: none; transition: 0.3s;}
        .oval.ready { border-color: var(--primary); border-style: solid; box-shadow: 0 0 30px rgba(0,229,255,0.3); }

        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 10px 15px; flex-shrink: 0; }
        .kpi-card { background: var(--surface); padding: 10px 2px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .kpi-val { font-size: 0.85rem; font-weight: 800; display: block; color: #fff; }
        .kpi-lab { font-size: 0.35rem; color: #8b9bb4; text-transform: uppercase; font-weight: 800; margin-top: 2px; }

        .main-card { flex: 1; margin: 0 15px 10px 15px; background: var(--surface); border-radius: 24px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .tabs { display: flex; background: rgba(0,0,0,0.4); padding: 5px; flex-shrink: 0; }
        .tab { flex: 1; padding: 12px 2px; border: none; background: transparent; color: #8b9bb4; font-size: 0.55rem; font-weight: 800; text-transform: uppercase; border-radius: 15px; transition: 0.3s; cursor: pointer; }
        .tab.active { background: var(--primary); color: #000; font-weight: 900; box-shadow: 0 4px 15px rgba(0,229,255,0.2); }

        #content { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
        .report-section { margin-bottom: 25px; border-left: 3px solid var(--primary); padding-left: 15px; animation: fadeIn 0.4s ease; }
        .report-label { color: var(--primary); font-size: 0.65rem; font-weight: 800; text-transform: uppercase; margin-bottom: 6px; display: block;}
        .report-text { font-size: 0.85rem; line-height: 1.6; color: #cbd5e1; text-align: justify; }

        .prod-item { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--border); border-left: 5px solid var(--accent); }
        .brand-badge { background: var(--primary); color: #000; padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; margin-bottom: 10px; display: inline-block; text-transform: uppercase;}
        
        .score-display { text-align: center; margin-bottom: 25px; padding: 15px; background: rgba(0,229,255,0.05); border-radius: 20px; border: 1px solid rgba(0,229,255,0.1); animation: fadeIn 0.4s ease; }
        .score-circle { font-size: 2.8rem; font-weight: 900; color: var(--primary); display: block; }
        .score-subtitle { font-size: 0.65rem; color: #8b9bb4; text-transform: uppercase; letter-spacing: 1px; font-weight: 700;}

        .loader { position: absolute; inset: 0; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { width: 45px; height: 45px; border: 4px solid rgba(0, 229, 255, 0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bottom-bar { background: rgba(10, 15, 28, 0.98); border-top: 1px solid var(--border); padding: 12px 20px calc(15px + env(safe-area-inset-bottom)); display: flex; gap: 15px; flex-shrink: 0; z-index: 1000; }
        .btn { border: none; border-radius: 22px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; height: 60px; transition: 0.2s; }
        .btn-main { flex: 1; background: #fff; color: #000; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .btn-main.ready { background: var(--primary); box-shadow: 0 0 30px rgba(0, 229, 255, 0.3); }
        .btn-icon { width: 60px; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); border-radius: 20px; font-size: 1.4rem; }
        .btn:disabled { opacity: 0.15; cursor: not-allowed; }

        .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: var(--surface); border: 1px solid var(--primary); border-radius: 24px; padding: 25px; width: 85%; max-width: 350px; }
        .modal-title { color: #fff; font-size: 1rem; font-weight: 800; margin-bottom: 20px; text-align: center; }
        .modal-select { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 12px; margin-bottom: 15px; outline: none; }
        .modal-btn { width: 100%; background: var(--primary); color: #000; font-weight: 800; border: none; padding: 15px; border-radius: 15px; margin-top: 10px; cursor: pointer; transition: 0.2s;}
        .modal-btn:active { transform: scale(0.95); }
        .modal-btn.secondary { background: transparent; color: #8b9bb4; border: 1px solid var(--border); margin-top: 5px; }
        .lux-warning { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(255,51,102,0.9); padding: 6px 15px; border-radius: 15px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; display: none; z-index: 20; letter-spacing: 1px; white-space: nowrap; backdrop-filter: blur(4px); }
    </style>
</head>
<body>

    <header>
        <div><div class="logo">PureSkin <span>AI</span></div><div class="archi">N. JULIENNE | OMNI-PLATFORM V148</div></div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-icon" style="width:42px; height:42px; font-size:1.1rem;" onclick="document.getElementById('file-input').click()">📁</button>
            <button style="background:none; border:none; color:white; font-size:1.2rem;" onclick="configureApiKey()">⚙️</button>
        </div>
        <input type="file" id="file-input" style="display:none" onchange="handleImageImport(event)" accept="image/*">
    </header>

    <div id="viewport">
        <video id="v" autoplay playsinline muted></video>
        <canvas id="s-canvas"></canvas>
        <canvas id="o-canvas" class="overlay"></canvas>
        <div class="oval" id="oval"></div>
        <div class="lux-warning" id="lux-msg">⚠️ LUMINOSITÉ NON CONFORME</div>
    </div>

    <div class="kpi-row">
        <div class="kpi-card"><span class="kpi-val" id="val-t">--</span><span class="kpi-lab">Phototype</span></div>
        <div class="kpi-card"><span class="kpi-val" id="val-e">--</span><span class="kpi-lab">Érythème</span></div>
        <div class="kpi-card"><span class="kpi-val" id="val-m">--</span><span class="kpi-lab">Mélanine</span></div>
        <div class="kpi-card" style="border-color:var(--primary)"><span class="kpi-val" id="val-s">--</span><span class="kpi-lab">Santé</span></div>
    </div>

    <div class="main-card">
        <div class="loader" id="loader"><div class="spinner"></div><span id="loader-txt" style="margin-top:15px; font-size:0.6rem; font-weight:800; color:var(--primary); letter-spacing:2px; text-transform:uppercase;">SYNTHÈSE EN COURS...</span></div>
        <div class="tabs">
            <button class="tab active" id="t-diag" onclick="switchTab('diag')" disabled>⚕️ Dermo</button>
            <button class="tab" id="t-rout" onclick="switchTab('routine')" disabled>🧪 Produits</button>
            <button class="tab" id="t-life" onclick="switchTab('life')" disabled>🥗 Vie</button>
            <button class="tab" id="t-hist" onclick="switchTab('history')">📈 Suivi</button>
        </div>
        <div id="content"><div style="text-align:center; padding-top:60px; color:#475569; font-size:0.8rem;">Architecture Clinique Déployée.<br>Prêt pour acquisition.</div></div>
    </div>

    <div class="bottom-bar">
        <button class="btn btn-icon" onclick="location.reload()">🔄</button>
        <button class="btn btn-main" id="btn-scan" onclick="triggerScanFlow()">Démarrer</button>
        <button class="btn btn-icon" id="btn-pdf" disabled onclick="generateClinicalPDF()">📄</button>
    </div>

    <div class="modal-bg" id="modal">
        <div class="modal-box">
            <div class="modal-title">Dossier Patient</div>
            <select class="modal-select" id="m-age">
                <option value="18-25 ans">18 - 25 ans</option>
                <option value="26-35 ans" selected>26 - 35 ans</option>
                <option value="36-50 ans">36 - 50 ans</option>
                <option value="50+ ans">50 ans et plus</option>
            </select>
            <select class="modal-select" id="m-sens">
                <option value="Résistante">Peau Résistante</option>
                <option value="Sensible" selected>Peau Sensible</option>
                <option value="Très Réactive">Très Réactive (Rosacée)</option>
            </select>
            <button class="modal-btn" onclick="startProcess()">Confirmer & Scanner</button>
            <button class="modal-btn secondary" onclick="document.getElementById('modal').style.display='none'">Annuler</button>
        </div>
    </div>

    <canvas id="proc-canvas" style="display:none" width="300" height="300"></canvas>
    <canvas id="wood-canvas" style="display:none" width="300" height="300"></canvas>

    <script>
        "use strict";

        const dom = {
            v: document.getElementById('v'), o: document.getElementById('o-canvas'), oCtx: document.getElementById('o-canvas').getContext('2d'),
            s: document.getElementById('s-canvas'), sCtx: document.getElementById('s-canvas').getContext('2d'),
            content: document.getElementById('content'), loader: document.getElementById('loader'), loaderTxt: document.getElementById('loader-txt'),
            btn: document.getElementById('btn-scan'), oval: document.getElementById('oval'), 
            proc: document.getElementById('proc-canvas'), wood: document.getElementById('wood-canvas'),
            modal: document.getElementById('modal'), luxMsg: document.getElementById('lux-msg')
        };

        let sys = { landmarks: null, aiData: null, isRunning: false, isProcessing: false, source: 'video', patient: {}, chart: null, cameraInstance: null, frameCount: 0, luxValid: false };

        function escapeHTML(str) {
            if (typeof str !== 'string') return '';
            return str.replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag]));
        }

        const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.7 });
        faceMesh.onResults(res => {
            sys.landmarks = res.multiFaceLandmarks?.[0] || null;
            analyzeFrame();
        });

        function configureApiKey() {
            let k = prompt("Configuration Système : Entrez la clé API Mistral");
            if (k) {
                const safeKey = k.trim().replace(/['" \n\r\t]+/g, ''); 
                localStorage.setItem('pureskin_key', safeKey);
                alert("Clé enregistrée de manière sécurisée.");
            }
            return localStorage.getItem('pureskin_key');
        }

        function stopHardware() {
            if (dom.v.srcObject) { dom.v.srcObject.getTracks().forEach(t => t.stop()); dom.v.srcObject = null; }
            if (sys.cameraInstance) { sys.cameraInstance.stop(); sys.cameraInstance = null; }
            sys.isRunning = false;
        }

        async function initHardwareCamera() {
            try {
                dom.v.setAttribute('autoplay', ''); dom.v.setAttribute('muted', ''); dom.v.setAttribute('playsinline', '');
                stopHardware();
                await new Promise(r => setTimeout(r, 200)); 
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                dom.v.srcObject = stream;
                sys.cameraInstance = new Camera(dom.v, { 
                    onFrame: async () => { if(sys.source === 'video' && !sys.isProcessing) await faceMesh.send({image: dom.v}); }, 
                    width: 640, height: 480 
                });
                sys.cameraInstance.start(); 
                sys.isRunning = true; 
                dom.btn.innerText = "Lancer Analyse"; dom.btn.classList.add('ready');
            } catch (e) { alert("Caméra indisponible."); }
        }

        function handleImageImport(e) {
            const file = e.target.files[0]; 
            if (!file || !file.type.startsWith('image/')) return alert("Format invalide.");
            dom.loaderTxt.innerText = "IMPORTATION..."; dom.loader.style.display = 'flex'; dom.btn.disabled = true;
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                let img = new Image();
                img.onload = async () => {
                    sys.source = 'image'; dom.v.style.display = 'none'; dom.s.style.display = 'block';
                    stopHardware();
                    dom.s.width = 640; dom.s.height = 480; dom.sCtx.drawImage(img, 0, 0, 640, 480);
                    img = null; // QA: Garbage Collector - Libération RAM
                    
                    try { await faceMesh.send({image: dom.s}); } catch(err) { console.warn(err); }
                    dom.btn.innerText = "Analyser Photo"; dom.btn.classList.add('ready');
                    dom.loader.style.display = 'none'; dom.btn.disabled = false;
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function analyzeFrame() {
            dom.o.width = 640; dom.o.height = 480; dom.oCtx.clearRect(0,0,640,480);
            if (!sys.landmarks) { dom.oval.classList.remove('ready'); dom.btn.classList.remove('ready'); return; }
            dom.oCtx.fillStyle = "rgba(0,229,255,0.6)";
            [9, 116, 345, 130].forEach(i => { 
                if(sys.landmarks[i]) { dom.oCtx.beginPath(); dom.oCtx.arc(sys.landmarks[i].x * 640, sys.landmarks[i].y * 480, 4, 0, 7); dom.oCtx.fill(); }
            });
            sys.frameCount++;
            if (sys.source === 'video' && sys.frameCount % 10 === 0) {
                const pCtx = dom.proc.getContext('2d', { willReadFrequently: true });
                pCtx.drawImage(dom.v, 0, 0, 300, 300);
                const patch = pCtx.getImageData(140, 140, 20, 20).data; 
                let lumSum = 0;
                for(let i=0; i<patch.length; i+=4) lumSum += (0.299*patch[i] + 0.587*patch[i+1] + 0.114*patch[i+2]);
                const lux = Math.round(lumSum / (patch.length/4));
                if (lux < 50 || lux > 230) {
                    sys.luxValid = false; dom.luxMsg.style.display = 'block';
                    dom.oval.classList.remove('ready'); dom.btn.disabled = true; dom.btn.classList.remove('ready');
                } else {
                    sys.luxValid = true; dom.luxMsg.style.display = 'none';
                    dom.oval.classList.add('ready'); dom.btn.disabled = false; dom.btn.classList.add('ready');
                }
            } else if (sys.source === 'image') {
                sys.luxValid = true; dom.oval.classList.add('ready'); dom.btn.disabled = false; dom.btn.classList.add('ready');
            }
        }

        function triggerScanFlow() {
            const apiKey = localStorage.getItem('pureskin_key');
            if (!apiKey) { const newKey = configureApiKey(); if (!newKey) return; }
            if (!sys.isRunning && sys.source === 'video') { initHardwareCamera(); } 
            else { dom.modal.style.display = 'flex'; }
        }

        async function startProcess() {
            dom.modal.style.display = 'none';
            sys.patient = { age: document.getElementById('m-age').value, sens: document.getElementById('m-sens').value };
            const apiKey = localStorage.getItem('pureskin_key');
            
            sys.isProcessing = true; dom.btn.disabled = true; 
            dom.loaderTxt.innerText = "RÉDACTION DU BILAN CLINIQUE..."; dom.loader.style.display = 'flex';
            if (sys.source === 'video') stopHardware();
            
            try {
                const sourceElement = sys.source === 'video' ? dom.v : dom.s;
                const pCtx = dom.proc.getContext('2d', { willReadFrequently: true });
                pCtx.drawImage(sourceElement, 0, 0, 300, 300);
                const fullImg = pCtx.getImageData(0,0,300,300);
                
                let cR = 1, cG = 1, cB = 1;
                if(sys.landmarks && sys.landmarks[130]) {
                    let sX = Math.min(299, Math.max(0, Math.floor(sys.landmarks[130].x * 300)));
                    let sY = Math.min(299, Math.max(0, Math.floor(sys.landmarks[130].y * 300)));
                    let sIdx = (sY * 300 + sX) * 4;
                    let refR = Math.max(fullImg.data[sIdx], 100), refG = Math.max(fullImg.data[sIdx+1], 100), refB = Math.max(fullImg.data[sIdx+2], 100);
                    let targetLux = Math.max(refR, refG, refB);
                    cR = targetLux / refR; cG = targetLux / refG; cB = targetLux / refB;
                }

                function getZoneMetrics(ptIdx) {
                    if(!sys.landmarks || !sys.landmarks[ptIdx]) return { ei: 0, mi: 0, lum: 100 };
                    let cx = Math.floor(sys.landmarks[ptIdx].x * 300), cy = Math.floor(sys.landmarks[ptIdx].y * 300);
                    let eiSum = 0, miSum = 0, lumSum = 0, validPixels = 0;
                    for(let y = cy-10; y < cy+10; y++) {
                        for(let x = cx-10; x < cx+10; x++) {
                            if(x<0||x>299||y<0||y>299) continue;
                            let i = (y * 300 + x) * 4;
                            let r = Math.min(255, Math.max(1, fullImg.data[i] * cR));
                            let g = Math.min(255, Math.max(1, fullImg.data[i+1] * cG));
                            let b = Math.min(255, Math.max(1, fullImg.data[i+2] * cB));
                            eiSum += 100 * Math.log10(r / g); miSum += 100 * Math.log10(255 / r);
                            lumSum += (0.299*r + 0.587*g + 0.114*b); validPixels++;
                        }
                    }
                    if(validPixels===0) return { ei:0, mi:0, lum:100 };
                    return { ei: eiSum/validPixels, mi: miSum/validPixels, lum: lumSum/validPixels };
                }

                let uZoneL = getZoneMetrics(116), uZoneR = getZoneMetrics(345);
                let finalEI = ((uZoneL.ei + uZoneR.ei) / 2).toFixed(1);
                let finalMI = ((uZoneL.mi + uZoneR.mi) / 2).toFixed(1);
                let avgLum = (uZoneL.lum + uZoneR.lum) / 2;
                
                let fitz = "I-II";
                if(avgLum < 60) fitz = "VI"; else if(avgLum < 100) fitz = "V"; else if(avgLum < 135) fitz = "IV"; else if(avgLum < 170) fitz = "III";
                let health = Math.max(0, 100 - (finalEI*0.4) - (finalMI*0.2)).toFixed(0);

                document.getElementById('val-t').innerText = "Type " + fitz;
                document.getElementById('val-e').innerText = finalEI;
                document.getElementById('val-m').innerText = finalMI;

                const wCtx = dom.wood.getContext('2d', { willReadFrequently: true });
                wCtx.drawImage(sourceElement, 0, 0, 300, 300);
                const wImg = wCtx.getImageData(0,0,300,300);
                for(let i=0; i<wImg.data.length; i+=4) { wImg.data[i]=0; wImg.data[i+1]=0; wImg.data[i+2]*=2.5; }
                wCtx.putImageData(wImg, 0, 0);

                const sysPrompt = `Architecture N. JULIENNE (V148).
                PATIENT : Âge: ${sys.patient.age}, Sensibilité: ${sys.patient.sens}, Phototype: ${fitz}.
                BIOMÉTRIE : Érythème: ${finalEI}, Mélanine: ${finalMI}, Santé globale: ${health}%.
                RÉDIGE UN VRAI RAPPORT DÉTAILLÉ EN FRANÇAIS. Ne copie pas le prompt, écris de vraies phrases médicales.
                RENVOIE UNIQUEMENT CET OBJET JSON VALIDE (AUCUN TEXTE AVANT OU APRÈS) :
                {
                  "bilan": "Rédige ici un paragraphe complet et scientifique expliquant les scores et l'état de la barrière cutanée.",
                  "routine": [
                    {"marque": "Nom de la marque réelle", "mol": "Nom de l'actif", "action": "Phrase expliquant pourquoi."}
                  ],
                  "vie": "Rédige un paragraphe de conseils sur l'hygiène de vie et la nutrition."
                }`;

                const response = await fetch("https://api.mistral.ai/v1/chat/completions", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: "pixtral-12b-2409",
                        messages: [{ role: "user", content: [
                            {type:"text", text:sysPrompt}, 
                            {type:"image_url", image_url:{url:dom.proc.toDataURL('image/jpeg', 0.4)}},
                            {type:"image_url", image_url:{url:dom.wood.toDataURL('image/jpeg', 0.4)}}
                        ]}],
                        response_format: { type: "json_object" }
                    })
                });

                if(!response.ok) throw new Error(`Erreur API ${response.status}.`);
                const rawJsonStr = (await response.json()).choices[0].message.content;
                
                let parsedJson = {};
                try {
                    const jsonMatch = rawJsonStr.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        parsedJson = JSON.parse(jsonMatch[0]);
                        if (!parsedJson.bilan || parsedJson.bilan.length < 20) throw new Error("Réponse IA trop courte.");
                    } else throw new Error("JSON absent.");
                } catch(parseError) {
                    console.warn("Secours IA activé", parseError);
                    let severity = finalEI > 15 ? "Une inflammation significative est détectée." : "La barrière cutanée semble stable.";
                    parsedJson = {
                        bilan: `Analyse biométrique validée hors-ligne. Vitalité: ${health}%. Phototype: ${fitz}. Érythème: ${finalEI}. ${severity} La qualité de la texture est préservée.`,
                        routine: [
                            {marque: "La Roche-Posay / Cerave", mol: "Acide Hyaluronique", action: "Hydratation osmotique pour restaurer le film hydrolipidique."},
                            {marque: "Protection UV", mol: "Filtres Minéraux", action: "Prévention de l'oxydation de la mélanine mesurée à " + finalMI + "."}
                        ],
                        vie: "Privilégiez un nettoyage doux le soir et un cycle de sommeil régulier."
                    };
                }
                
                sys.aiData = { score: health, fitz: fitz, bilan: parsedJson.bilan, routine: parsedJson.routine || [], vie: parsedJson.vie };

                let hArr = JSON.parse(localStorage.getItem('ps_hist') || "[]");
                hArr.push({ d: new Date().toLocaleDateString(), s: health });
                if(hArr.length > 7) hArr.shift(); localStorage.setItem('ps_hist', JSON.stringify(hArr));

                ['t-diag','t-rout','t-life','t-hist'].forEach(id => document.getElementById(id).disabled = false);
                switchTab('diag'); 
                document.getElementById('btn-pdf').disabled = false; document.getElementById('btn-pdf').style.color = "var(--primary)";

            } catch (error) { 
                alert("Erreur de connexion : " + error.message); 
            } finally { 
                sys.isProcessing = false; 
                dom.btn.disabled = false; 
                dom.loader.style.display = 'none'; 
            }
        }

        function switchTab(targetTab) { 
            ['t-diag','t-rout','t-life','t-hist'].forEach(id => {
                const btn = document.getElementById(id); if(btn) btn.classList.toggle('active', id === 't-'+targetTab);
            }); renderContent(targetTab);
        }

        function renderContent(mode) {
            if (!sys.aiData && mode !== 'history') return;
            const safeBilan = escapeHTML(sys.aiData?.bilan);
            const safeVie = escapeHTML(sys.aiData?.vie);

            if (mode === 'history') {
                const hist = JSON.parse(localStorage.getItem('ps_hist') || "[]");
                dom.content.innerHTML = `<div class="report-section"><span class="report-label">ÉVOLUTION CLINIQUE</span><div style="position:relative; width:100%; height:150px;"><canvas id="chart-canvas"></canvas></div></div>` + hist.reverse().map(i => `<div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid var(--border); font-size:0.8rem;"><span>${escapeHTML(i.d)}</span><span style="color:var(--primary); font-weight:800;">${escapeHTML(i.s.toString())}%</span></div>`).join('');
                if(sys.chart) sys.chart.destroy();
                // QA: Chart.js Responsive Fix
                sys.chart = new Chart(document.getElementById('chart-canvas'), { type: 'line', data: { labels: hist.map(x=>x.d), datasets: [{ data: hist.map(x=>x.s), borderColor: '#00e5ff', tension: 0.4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: false }, scales: { y: { display: false }, x: { grid: { display: false } } } } });
            } else if (mode === 'diag') {
                dom.content.innerHTML = `
                    <div class="score-display">
                        <span class="score-subtitle">Santé Biologique (Phototype ${escapeHTML(sys.aiData.fitz)})</span>
                        <span class="score-circle">${escapeHTML(sys.aiData.score.toString())}%</span>
                    </div>
                    <div class="report-section"><span class="report-label">RAPPORT DERMATOLOGIQUE</span><p class="report-text">${safeBilan}</p></div>`;
            } else if (mode === 'routine') {
                dom.content.innerHTML = sys.aiData.routine.map(r => `
                    <div class="prod-item">
                        <span class="brand-badge">${escapeHTML(r.marque || 'Soin')}</span>
                        <p class="report-text"><strong style="color:#fff;">${escapeHTML(r.mol || 'Actif')}</strong><br><span style="font-size:0.8rem; color:#cbd5e1; display:block; margin-top:5px;">${escapeHTML(r.action || '')}</span></p>
                    </div>`).join('');
            } else if (mode === 'life') {
                dom.content.innerHTML = `<div class="report-section"><span class="report-label">PROTOCOLE HOLISTIQUE</span><p class="report-text">${safeVie}</p></div>`;
            }
        }

        // QA: PDF Downloader for iOS Safari Support
        function generateClinicalPDF() {
            if(!sys.aiData) return;
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            const margin = 15; let y = 20;

            doc.setFillColor(10, 15, 28); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.setFont("helvetica", "bold");
            doc.text("DOSSIER MEDICAL PURESKIN", margin, 25);
            doc.setFontSize(9); doc.setTextColor(0, 229, 255); doc.text(`PATIENT : ${sys.patient.age} | SENS : ${sys.patient.sens} | N. JULIENNE ARCHITECT`, margin, 33);

            y = 55; doc.setTextColor(10, 15, 28); doc.setFontSize(14); doc.setFont("helvetica", "bold");
            doc.text("1. RELEVÉ BIOMÉTRIQUE & TOPOGRAPHIQUE", margin, y); y += 8;
            doc.setFontSize(11); doc.setFont("helvetica", "normal");
            doc.text(`• Score de Vitalité : ${sys.aiData.score}%`, margin + 5, y); y += 6;
            doc.text(`• Phototype (Fitzpatrick) : Type ${sys.aiData.fitz}`, margin + 5, y); y += 6;
            doc.text(`• Indice d'Érythème (E.I Joues) : ${document.getElementById('val-e').innerText}`, margin + 5, y); y += 6;
            doc.text(`• Indice de Mélanine (M.I Joues) : ${document.getElementById('val-m').innerText}`, margin + 5, y); y += 15;

            doc.setFontSize(14); doc.setFont("helvetica", "bold"); doc.text("2. SYNTHÈSE DERMATOLOGIQUE", margin, y); y += 8;
            doc.setFontSize(10); doc.setFont("helvetica", "normal");
            const diagLines = doc.splitTextToSize(sys.aiData.bilan.replace(/\n/g, ' '), 180); doc.text(diagLines, margin, y);
            y += (diagLines.length * 5) + 10;

            if(y > 240) { doc.addPage(); y = 20; }
            doc.setFontSize(14); doc.setFont("helvetica", "bold"); doc.text("3. ORDONNANCE MOLÉCULAIRE", margin, y); y += 10;
            
            if(sys.aiData.routine && Array.isArray(sys.aiData.routine)) {
                sys.aiData.routine.forEach(r => {
                    if(y > 270) { doc.addPage(); y = 20; }
                    doc.setFontSize(10); doc.setFont("helvetica", "bold"); doc.setTextColor(0, 150, 136);
                    doc.text(`[${r.marque || 'Soin'}] - ${r.mol || ''}`, margin, y); y += 5;
                    doc.setFont("helvetica", "normal"); doc.setTextColor(50, 50, 50);
                    const actLines = doc.splitTextToSize((r.action || '').replace(/\n/g, ' '), 175); doc.text(actLines, margin + 5, y);
                    y += (actLines.length * 5) + 6;
                });
            }

            y += 5; if(y > 250) { doc.addPage(); y = 20; }
            doc.setFontSize(14); doc.setFont("helvetica", "bold"); doc.setTextColor(10, 15, 28);
            doc.text("4. PROTOCOLE HOLISTIQUE", margin, y); y += 8;
            doc.setFontSize(10); doc.setFont("helvetica", "normal");
            const lifeLines = doc.splitTextToSize((sys.aiData.vie || '').replace(/\n/g, ' '), 180); doc.text(lifeLines, margin, y);

            // QA: iOS Safari Download Fix
            const pdfBlob = doc.output('blob');
            const pdfUrl = URL.createObjectURL(pdfBlob);
            const downloadLink = document.createElement('a');
            downloadLink.href = pdfUrl;
            downloadLink.download = `PureSkin_Bilan_${new Date().getTime()}.pdf`;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            setTimeout(() => URL.revokeObjectURL(pdfUrl), 200);
        }
    </script>
</body>
</html>
