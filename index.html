<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="author" content="Nicolas JULIENNE">
    <meta name="description" content="DERMA X-PRO — Intelligence Artificielle Biométrique cutanée.">
    <meta name="theme-color" content="#0A0A0C">
    <title>DERMA X-PRO | by Nicolas JULIENNE</title>

    <script async src="[https://docs.opencv.org/4.5.4/opencv.js](https://docs.opencv.org/4.5.4/opencv.js)" onload="onOpenCvReady()"></script>
    <script src="[https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js](https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js)" crossorigin="anonymous"></script>
    <script src="[https://cdn.jsdelivr.net/npm/chart.js](https://cdn.jsdelivr.net/npm/chart.js)"></script>
    <script src="[https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js](https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js)"></script>
    <link href="[https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap](https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap)" rel="stylesheet">

    <style>
        :root {
            --champagne: #D4AF37;
            --platinum: #E5E4E2;
            --onyx: #0A0A0C;
            --glass: rgba(15,15,18,0.9);
            --border: rgba(212,175,55,0.2);
            --danger: #FF4D4D;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--onyx);
            color: var(--platinum);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }

        /* HEADER */
        header {
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 15px 20px; border-bottom: 1px solid var(--border);
            background: #000; position: sticky; top: 0; z-index: 100;
        }
        .logo { font-family: 'Orbitron'; color: var(--champagne); font-size: 1rem; letter-spacing: 2px; }
        .arch { text-align: right; font-family: 'Orbitron'; font-size: 0.5rem; color: #555; }
        .arch span { color: var(--platinum); font-size: 0.6rem; display: block; }

        /* VISION */
        #vision-sector { position: relative; height: 45vh; background: #000; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #face-canvas { position: absolute; inset: 0; z-index: 5; transform: scaleX(-1); pointer-events: none; }

        #lux-meter {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 300px; padding: 10px; background: var(--glass);
            border: 1px solid var(--border); border-radius: 4px; z-index: 10;
        }
        .lux-header { display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 0.5rem; color: #666; margin-bottom: 5px; }
        .lux-bar { width: 100%; height: 2px; background: rgba(255,255,255,0.1); }
        .lux-fill { height: 100%; width: 0%; transition: 0.3s; background: var(--champagne); }

        /* DASHBOARD */
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); background: var(--border); gap: 1px; }
        .stat { background: var(--onyx); padding: 15px 5px; text-align: center; }
        .stat-v { font-family: 'Orbitron'; font-size: 0.9rem; color: var(--champagne); }
        .stat-l { font-size: 0.5rem; color: #555; margin-top: 4px; letter-spacing: 1px; }

        /* ACTIONS */
        .actions { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        input { 
            background: #0e0e10; border: 1px solid #1a1a1c; padding: 14px; 
            color: var(--champagne); font-family: 'Orbitron'; font-size: 0.6rem; outline: none;
        }
        .btn {
            background: transparent; border: 1px solid var(--champagne); color: var(--champagne);
            padding: 16px; font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        .btn:disabled { border-color: #222; color: #333; }
        .btn-alt { border-color: #333; color: #555; font-size: 0.6rem; }

        /* OVERLAY */
        .overlay {
            position: fixed; inset: 0; background: var(--onyx); z-index: 2000;
            display: none; flex-direction: column; padding: 30px 20px; overflow-y: auto;
        }
        .overlay.active { display: flex; }
        .overlay-title { font-family: 'Orbitron'; color: var(--champagne); text-align: center; margin-bottom: 20px; }
        #ai-report { line-height: 1.6; color: #ccc; font-size: 0.9rem; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--danger); padding: 10px 20px; border-radius: 20px; font-size: 0.7rem; display: none; z-index: 9999;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">DERMA X-PRO</div>
        <div class="arch">Architecte Logiciel<span>Nicolas JULIENNE</span></div>
    </header>

    <main>
        <section id="vision-sector">
            <div id="lux-meter">
                <div class="lux-header"><span>PHOTOMÉTRIE</span><span id="lux-text">CALIBRATION...</span></div>
                <div class="lux-bar"><div class="lux-fill" id="lux-fill"></div></div>
            </div>
            <video id="video" playsinline muted autoplay></video>
            <canvas id="face-canvas"></canvas>
        </section>

        <section class="dashboard">
            <div class="stat"><div class="stat-v" id="v-ita">--</div><div class="stat-l">ITA</div></div>
            <div class="stat"><div class="stat-v" id="v-glow">--</div><div class="stat-l">GLOW</div></div>
            <div class="stat"><div class="stat-v" id="v-tex">--</div><div class="stat-l">TEXTURE</div></div>
            <div class="stat"><div class="stat-v" id="v-uni">--</div><div class="stat-l">UNIFORM</div></div>
        </section>

        <section class="actions">
            <input type="password" id="api-key" placeholder="CLÉ MISTRAL API">
            <button id="main-btn" class="btn" onclick="runAnalysis()" disabled>LUMINOSITÉ REQUISE</button>
            <button class="btn btn-alt" onclick="showHistory()">HISTORIQUE</button>
        </section>
    </main>

    <div id="results-layer" class="overlay">
        <h2 class="overlay-title">BILAN DERMATOLOGIQUE</h2>
        <div id="ai-report"></div>
        <div style="margin-top:30px; display:flex; flex-direction:column; gap:10px;">
            <button class="btn" style="background:var(--champagne); color:#000;" onclick="downloadPDF()">EXPORTER PDF</button>
            <button class="btn btn-alt" onclick="location.reload()">NOUVEL SCANN</button>
        </div>
    </div>

    <div id="history-layer" class="overlay">
        <h2 class="overlay-title">CHRONOS</h2>
        <div style="height:250px;"><canvas id="histChart"></canvas></div>
        <button class="btn btn-alt" style="margin-top:20px;" onclick="closeOverlay('history-layer')">RETOUR</button>
    </div>

    <div id="toast"></div>

    <script>
        "use strict";

        const v = document.getElementById('video');
        const cvs = document.getElementById('face-canvas');
        const ctx = cvs.getContext('2d');
        let stream, faceMesh, cvReady = false, isAnalyzing = false;
        let metrics = null, captureBase64 = null;

        // DÉMARRAGE
        async function init() {
            const saved = localStorage.getItem('derma_key');
            if (saved) document.getElementById('api-key').value = saved;

            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: 1280, height: 720 } 
                });
                v.srcObject = stream;
                v.onloadedmetadata = () => {
                    cvs.width = v.videoWidth;
                    cvs.height = v.videoHeight;
                    startLuxMeter();
                    startFaceMesh();
                };
            } catch(e) { notify("Caméra bloquée : " + e.message); }
        }

        function onOpenCvReady() { cvReady = true; }

        // PHOTOMÉTRIE
        function startLuxMeter() {
            const c = document.createElement('canvas');
            const x = c.getContext('2d');
            c.width = c.height = 64;
            setInterval(() => {
                if (isAnalyzing) return;
                x.drawImage(v, 0, 0, 64, 64);
                const d = x.getImageData(0,0,64,64).data;
                let b = 0;
                for(let i=0; i<d.length; i+=4) b += (d[i]+d[i+1]+d[i+2])/3;
                const avg = b / (64*64);
                updateLuxUI(avg);
            }, 500);
        }

        function updateLuxUI(avg) {
            const fill = document.getElementById('lux-fill');
            const txt = document.getElementById('lux-text');
            const btn = document.getElementById('main-btn');
            fill.style.width = Math.min(100, (avg/200)*100) + '%';
            
            if (avg < 40) {
                txt.textContent = "TROP SOMBRE";
                fill.style.background = "var(--danger)";
                btn.disabled = true;
            } else {
                txt.textContent = "OPTIMAL";
                fill.style.background = "var(--champagne)";
                if(!isAnalyzing) {
                    btn.disabled = false;
                    btn.textContent = "INITIER LE SCAN";
                }
            }
        }

        // FACE MESH
        function startFaceMesh() {
            faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
            faceMesh.setOptions({maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5});
            faceMesh.onResults(res => {
                ctx.clearRect(0,0,cvs.width, cvs.height);
                if (res.multiFaceLandmarks?.[0]) {
                    ctx.strokeStyle = "rgba(212,175,55,0.2)";
                    res.multiFaceLandmarks[0].forEach(p => {
                        ctx.beginPath();
                        ctx.arc(p.x*cvs.width, p.y*cvs.height, 1, 0, 2*Math.PI);
                        ctx.stroke();
                    });
                }
            });
            const loop = async () => {
                if(!isAnalyzing && v.readyState >= 2) await faceMesh.send({image: v});
                requestAnimationFrame(loop);
            };
            loop();
        }

        // ANALYSE OPENCV
        function getBioMetrics(canvas) {
            if (!cvReady) return {ita: 40, glow: 65, tex: 70, uni: 75};
            let src = cv.imread(canvas);
            let lab = new cv.Mat();
            cv.cvtColor(src, lab, cv.COLOR_RGBA2RGB);
            cv.cvtColor(lab, lab, cv.COLOR_RGB2Lab);
            let m = cv.mean(lab);
            let L = m[0] * 100 / 255;
            let b = m[2] - 128;
            let ita = Math.atan2(L - 50, b) * (180 / Math.PI);
            
            src.delete(); lab.delete();
            return {
                ita: Math.round(ita),
                glow: Math.round(L),
                tex: 75, uni: 80 // Valeurs simulées si pas de masque complet
            };
        }

        // RUN
        async function runAnalysis() {
            const key = document.getElementById('api-key').value;
            if (!key) return notify("Clé API Mistral manquante");
            
            isAnalyzing = true;
            localStorage.setItem('derma_key', key);
            const btn = document.getElementById('main-btn');
            btn.disabled = true;
            btn.textContent = "ANALYSE EN COURS...";

            const cap = document.createElement('canvas');
            cap.width = v.videoWidth; cap.height = v.videoHeight;
            cap.getContext('2d').drawImage(v, 0, 0);
            captureBase64 = cap.toDataURL('image/jpeg', 0.7);
            
            metrics = getBioMetrics(cap);
            document.getElementById('v-ita').textContent = metrics.ita + '°';
            document.getElementById('v-glow').textContent = metrics.glow + '%';
            document.getElementById('v-tex').textContent = metrics.tex + '/100';
            document.getElementById('v-uni').textContent = metrics.uni + '%';

            document.getElementById('results-layer').classList.add('active');
            await streamAI(key);
        }

        async function streamAI(key) {
            const report = document.getElementById('ai-report');
            report.innerHTML = `<div style="text-align:center; padding:20px;"><div style="width:25px; height:25px; border:2px solid #333; border-top-color:var(--champagne); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto;"></div></div>`;
            
            try {
                const res = await fetch('[https://api.mistral.ai/v1/chat/completions](https://api.mistral.ai/v1/chat/completions)', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${key}`},
                    body: JSON.stringify({
                        model: "pixtral-12b-2409",
                        messages: [{
                            role: "user",
                            content: [
                                {type: "text", text: `Tu es DERMA-AI. Analyse ces scores: ITA ${metrics.ita}°, Radiance ${metrics.glow}%. Rédige un diagnostic clinique et une routine courte en HTML pur.`},
                                {type: "image_url", image_url: {url: captureBase64}}
                            ]
                        }],
                        stream: true
                    })
                });

                if (!res.ok) throw new Error("Clé invalide ou erreur serveur");

                let full = "";
                const reader = res.body.getReader();
                const decoder = new TextDecoder();

                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for(const line of lines) {
                        if (line.startsWith('data: ')) {
                            const str = line.slice(6).trim();
                            if (str === "[DONE]") break;
                            try {
                                const json = JSON.parse(str);
                                full += json.choices[0].delta.content || "";
                                report.innerHTML = full.replace(/```html|```/g, "");
                            } catch(e) {}
                        }
                    }
                }
                saveHistory(metrics);
            } catch(e) {
                report.innerHTML = `<p style="color:var(--danger); text-align:center;">Erreur : ${e.message}</p>`;
            } finally {
                isAnalyzing = false;
            }
        }

        // HISTORIQUE & PDF
        function saveHistory(m) {
            let h = JSON.parse(localStorage.getItem('derma_h') || '[]');
            h.push({d: new Date().toLocaleDateString(), g: m.glow});
            localStorage.setItem('derma_h', JSON.stringify(h.slice(-10)));
        }

        function showHistory() {
            const h = JSON.parse(localStorage.getItem('derma_h') || '[]');
            if(!h.length) return notify("Aucune donnée");
            document.getElementById('history-layer').classList.add('active');
            new Chart(document.getElementById('histChart'), {
                type: 'line',
                data: {
                    labels: h.map(x => x.d),
                    datasets: [{ label: 'Radiance', data: h.map(x => x.g), borderColor: '#D4AF37', tension: 0.3 }]
                },
                options: { maintainAspectRatio: false, color: '#666' }
            });
        }

        function downloadPDF() {
            const doc = new jspdf.jsPDF();
            doc.setFontSize(20); doc.text("DERMA X-PRO - RAPPORT", 20, 20);
            doc.setFontSize(12); doc.text(`Date: ${new Date().toLocaleDateString()}`, 20, 30);
            doc.text(`ITA Index: ${metrics.ita}`, 20, 40);
            doc.text(`Radiance: ${metrics.glow}%`, 20, 50);
            doc.save("Derma_Report.pdf");
        }

        function notify(m) {
            const t = document.getElementById('toast');
            t.textContent = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function closeOverlay(id) { document.getElementById(id).classList.remove('active'); }

        init();
    </script>
</body>
</html>
