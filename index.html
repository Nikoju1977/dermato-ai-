<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PureSkin AI Elite | Nicolas Julienne Labs</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="AppCore.onOpenCvReady()"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Plus+Jakarta+Sans:wght@200;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #c5a059;
            --gold-dim: rgba(197, 160, 89, 0.15);
            --bg: #050505;
            --surface: #0f0f0f;
            --border: rgba(197, 160, 89, 0.15);
            --safe-green: #2ecc71;
            --error-red: #e74c3c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background: var(--bg); 
            color: #fff; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* ─── UI COMPONENTS ─── */
        header {
            padding: max(45px, calc(20px + env(safe-area-inset-top))) 30px 20px;
            border-bottom: 0.5px solid var(--border);
            text-align: left;
        }

        .logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; letter-spacing: 3px; }
        .logo span { color: var(--gold); }
        .architect { font-size: 0.5rem; text-transform: uppercase; letter-spacing: 5px; color: var(--gold); margin-top: 8px; opacity: 0.7; }

        #viewport {
            position: relative;
            height: 38vh;
            margin: 15px 20px;
            border: 0.5px solid var(--border);
            background: #000;
            border-radius: 4px;
            overflow: hidden;
        }

        video, #overlay-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        #overlay-canvas { z-index: 5; pointer-events: none; }

        .scan-laser {
            position: absolute; width: 100%; height: 2px;
            background: var(--gold); z-index: 10;
            box-shadow: 0 0 20px var(--gold);
            display: none; top: 0;
        }

        .track-status {
            position: absolute; top: 15px; left: 15px; z-index: 20;
            font-size: 0.5rem; text-transform: uppercase; letter-spacing: 2px;
            padding: 6px 12px; border-radius: 20px;
            background: rgba(0,0,0,0.7); border: 0.5px solid var(--border);
            display: flex; align-items: center;
        }

        .status-dot { width: 6px; height: 6px; border-radius: 50%; margin-right: 8px; background: var(--error-red); }
        .status-dot.active { background: var(--safe-green); box-shadow: 0 0 10px var(--safe-green); }

        /* ─── DASHBOARD ─── */
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); margin: 0 20px; }
        .metric-card { background: var(--bg); padding: 15px 5px; text-align: center; }
        .metric-val { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--gold); }
        .metric-lab { font-size: 0.45rem; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }

        /* ─── ANALYSIS AREA ─── */
        .analysis-card { flex: 1; background: var(--surface); margin-top: 15px; display: flex; flex-direction: column; overflow: hidden; }
        .nav-tabs { display: flex; border-bottom: 0.5px solid var(--border); }
        .nav-link { 
            flex: 1; padding: 15px 0; border: none; background: transparent; 
            color: #555; font-size: 0.55rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
        }
        .nav-link.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        #display-area { flex: 1; overflow-y: auto; padding: 20px; color: #ccc; font-size: 0.8rem; line-height: 1.6; }
        .expert-block { margin-bottom: 20px; border-left: 2px solid var(--gold); padding-left: 15px; }
        .expert-block b { color: var(--gold); display: block; margin-bottom: 5px; text-transform: uppercase; font-size: 0.65rem; }

        /* ─── FOOTER ─── */
        .footer-actions { padding: 15px 20px; display: flex; gap: 12px; border-top: 0.5px solid var(--border); }
        .btn-ui { height: 55px; border-radius: 4px; border: 0.5px solid var(--border); background: transparent; color: #fff; cursor: pointer; transition: 0.3s; }
        .btn-main { flex: 1; background: var(--gold); color: #000; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; font-size: 0.7rem; border: none; }
        .btn-main:disabled { background: #1a1a1a; color: #444; }
        .btn-icon { width: 55px; color: var(--gold); font-size: 1.2rem; }

        /* ─── MODALS & LOADERS ─── */
        .sys-loader { position: absolute; inset: 0; background: rgba(5,5,5,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .spinner { width: 30px; height: 30px; border: 2px solid var(--gold-dim); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s infinite linear; }
        
        #api-modal { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 30px; }
        .modal-box { background: var(--surface); padding: 40px; width: 100%; max-width: 400px; border: 0.5px solid var(--border); text-align: center; }
        .modal-input { width: 100%; background: #000; border: 0.5px solid var(--border); color: #fff; padding: 15px; margin: 20px 0; text-align: center; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes laser { from { top: 0; } to { top: 100%; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="api-modal">
    <div class="modal-box">
        <h2 style="font-family:'Playfair Display'; color:var(--gold);">PURESKIN AI</h2>
        <p style="font-size:0.6rem; letter-spacing:2px; margin-top:10px; opacity:0.6;">ACCÈS BIOMÉTRIQUE REQUIS</p>
        <input id="api-key-input" class="modal-input" type="password" placeholder="CLÉ API GEMINI">
        <button class="btn-ui btn-main" style="width:100%" onclick="AppCore.saveApiKey()">ACTIVER LE SYSTÈME</button>
    </div>
</div>

<header>
    <div class="logo">NICOLAS JULIENNE <span>LABS</span></div>
    <div class="architect">Bio-Precision Multi-Spectral V9.0</div>
</header>

<div id="viewport">
    <div class="track-status">
        <span id="status-dot" class="status-dot"></span>
        <span id="status-text">Initialisation...</span>
    </div>
    <div id="scan-laser" class="scan-laser"></div>
    <video id="v" autoplay playsinline muted></video>
    <canvas id="overlay-canvas"></canvas>
</div>

<div class="dashboard">
    <div class="metric-card"><span class="metric-val" id="val-score">--</span><div class="metric-lab">Pureté</div></div>
    <div class="metric-card"><span class="metric-val" id="val-red">--</span><div class="metric-lab">Rougeurs</div></div>
    <div class="metric-card"><span class="metric-val" id="val-tex">--</span><div class="metric-lab">Texture</div></div>
    <div class="metric-card"><span class="metric-val" id="val-ita">--</span><div class="metric-lab">Éclat</div></div>
</div>

<div class="analysis-card">
    <div class="sys-loader" id="loader">
        <div class="spinner"></div>
        <p id="loader-text" style="margin-top:15px; font-size:0.5rem; letter-spacing:2px; color:var(--gold);">ANALYSE EN COURS</p>
    </div>
    <div class="nav-tabs">
        <button class="nav-link active" onclick="AppCore.switchTab('diag')">Diagnostic</button>
        <button class="nav-link" onclick="AppCore.switchTab('routine')">Rituel</button>
        <button class="nav-link" onclick="AppCore.switchTab('history')">Archives</button>
    </div>
    <div id="display-area">
        <div style="text-align:center; padding-top:40px; color:#444; font-size:0.6rem; letter-spacing:2px;">
            VEUILLEZ ALIGNER VOTRE VISAGE POUR DÉBUTER
        </div>
    </div>
</div>

<div class="footer-actions">
    <button class="btn-ui btn-icon" onclick="AppCore.toggleCamera()">🔄</button>
    <button class="btn-ui btn-main" id="main-action" onclick="AppCore.runAnalysis()" disabled>LANCER LE SCAN</button>
    <button class="btn-ui btn-icon" onclick="AppCore.exportPDF()">📄</button>
</div>

<canvas id="proc-canvas" style="display:none;"></canvas>

<script>
const AppCore = (function() {
    const STATE = {
        apiKey: localStorage.getItem('NJ_GEMINI_KEY') || '',
        cvReady: false,
        landmarks: null,
        isAligned: false,
        facing: 'user',
        analysis: null,
        history: JSON.parse(localStorage.getItem('NJ_HIST') || '[]'),
        processing: false
    };

    let faceMesh, animFrame;

    const dom = {
        v: document.getElementById('v'),
        o: document.getElementById('overlay-canvas'),
        p: document.getElementById('proc-canvas'),
        display: document.getElementById('display-area'),
        loader: document.getElementById('loader'),
        loaderText: document.getElementById('loader-text'),
        laser: document.getElementById('scan-laser'),
        dot: document.getElementById('status-dot'),
        stext: document.getElementById('status-text'),
        btn: document.getElementById('main-action')
    };

    // ─── INITIALISATION ───
    async function initApp() {
        if (!STATE.apiKey) return;
        document.getElementById('api-modal').classList.add('hidden');
        
        faceMesh = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.7 });
        faceMesh.onResults(onFaceResults);

        await initCamera();
    }

    async function initCamera() {
        if (dom.v.srcObject) dom.v.srcObject.getTracks().forEach(t => t.stop());
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: STATE.facing, width: 1280, height: 720 } });
            dom.v.srcObject = s;
            requestAnimationFrame(renderLoop);
        } catch (e) { alert("Erreur Caméra: " + e.message); }
    }

    function renderLoop() {
        if (dom.v.readyState >= 2) faceMesh.send({ image: dom.v });
        animFrame = requestAnimationFrame(renderLoop);
    }

    function onFaceResults(res) {
        STATE.landmarks = res.multiFaceLandmarks?.[0] || null;
        checkAlignment();
        drawOverlay();
    }

    function checkAlignment() {
        if (!STATE.landmarks) { STATE.isAligned = false; updateStatus("Face non détectée", false); return; }
        const nose = STATE.landmarks[1];
        const isCentered = nose.x > 0.4 && nose.x < 0.6;
        STATE.isAligned = isCentered;
        updateStatus(isCentered ? "Cible Verrouillée" : "Centrez votre visage", isCentered);
        dom.btn.disabled = !isCentered || STATE.processing;
    }

    function updateStatus(txt, active) {
        dom.stext.innerText = txt;
        dom.dot.className = 'status-dot' + (active ? ' active' : '');
    }

    function drawOverlay() {
        const ctx = dom.o.getContext('2d');
        dom.o.width = dom.o.clientWidth; dom.o.height = dom.o.clientHeight;
        ctx.clearRect(0,0,dom.o.width, dom.o.height);
        if (!STATE.landmarks) return;
        ctx.strokeStyle = STATE.isAligned ? 'rgba(46, 204, 113, 0.4)' : 'rgba(197, 160, 89, 0.3)';
        ctx.lineWidth = 1;
        ctx.strokeRect(dom.o.width*0.2, dom.o.height*0.15, dom.o.width*0.6, dom.o.height*0.7);
    }

    // ─── ENGINE: OPENCV BIOMETRICS ───
    async function computeCV() {
        const pCtx = dom.p.getContext('2d');
        dom.p.width = dom.v.videoWidth; dom.p.height = dom.v.videoHeight;
        pCtx.drawImage(dom.v, 0, 0);

        let src = cv.imread(dom.p);
        let res = { redness: 0, texture: 0, luminance: 0 };
        const zones = [10, 234, 454, 152]; // Points stratégiques

        zones.forEach(idx => {
            const p = STATE.landmarks[idx];
            const rx = Math.max(0, Math.min(Math.round(p.x * src.cols - 30), src.cols - 60));
            const ry = Math.max(0, Math.min(Math.round(p.y * src.rows - 30), src.rows - 60));
            let roi = src.roi(new cv.Rect(rx, ry, 60, 60));

            let lab = new cv.Mat();
            cv.cvtColor(roi, lab, cv.COLOR_RGBA2RGB);
            cv.cvtColor(lab, lab, cv.COLOR_RGB2Lab);
            let planes = new cv.MatVector();
            cv.split(lab, planes);
            res.luminance += cv.mean(planes.get(0))[0];
            res.redness += (cv.mean(planes.get(1))[0] - 128);

            let gray = new cv.Mat();
            cv.cvtColor(roi, gray, cv.COLOR_RGBA2GRAY);
            let lap = new cv.Mat();
            cv.Laplacian(gray, lap, cv.CV_8U);
            res.texture += cv.mean(lap)[0];

            [roi, lab, planes, gray, lap].forEach(m => m.delete());
        });
        src.delete();

        return {
            redness: Math.round((res.redness/4)*2.5),
            texture: Math.round((res.texture/4)*5),
            luminance: Math.round(res.luminance/4),
            img: dom.p.toDataURL('image/jpeg', 0.7),
            score: Math.max(10, Math.min(99, 100 - (res.redness + res.texture/2)))
        };
    }

    // ─── CORE ACTION ───
    async function runAnalysis() {
        if (STATE.processing || !STATE.isAligned) return;
        STATE.processing = true;
        dom.loader.style.display = 'flex';
        dom.laser.style.display = 'block';
        dom.laser.style.animation = 'laser 2s infinite alternate';

        try {
            const metrics = await computeCV();
            const report = await fetchGemini(metrics);
            STATE.analysis = { ...metrics, ai: report };
            saveToHistory(metrics.score);
            updateUI();
            switchTab('diag');
        } catch (e) { alert(e.message); }
        finally {
            STATE.processing = false;
            dom.loader.style.display = 'none';
            dom.laser.style.display = 'none';
        }
    }

    async function fetchGemini(m) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${STATE.apiKey}`;
        const prompt = `Expert Dermato Nicolas Julienne. Analyse: Score=${m.score}%, Rougeur=${m.redness}, Texture=${m.texture}. Réponds en JSON : {"bilan": "...", "routine_matin": "...", "routine_soir": "...", "lifestyle": "...", "signature": "..."}`;
        
        const res = await fetch(url, {
            method: 'POST',
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: 'image/jpeg', data: m.img.split(',')[1] } }] }]
            })
        });
        const data = await res.json();
        let txt = data.candidates[0].content.parts[0].text;
        return JSON.parse(txt.replace(/```json|```/g, ''));
    }

    function updateUI() {
        const a = STATE.analysis;
        document.getElementById('val-score').innerText = a.score + '%';
        document.getElementById('val-red').innerText = a.redness;
        document.getElementById('val-tex').innerText = a.texture;
        document.getElementById('val-ita').innerText = a.luminance;
    }

    function switchTab(t) {
        const tabs = document.querySelectorAll('.nav-link');
        tabs.forEach(btn => btn.classList.remove('active'));
        event?.target?.classList?.add('active');

        if (!STATE.analysis && t !== 'history') return;

        if (t === 'diag') {
            const ai = STATE.analysis.ai;
            dom.display.innerHTML = `<div class="expert-block"><b>Diagnostic Cellulaire</b><p>${ai.bilan}</p></div>
                                     <div class="expert-block"><b>Note de l'Expert</b><p><em>${ai.signature}</em></p></div>`;
        } else if (t === 'routine') {
            const ai = STATE.analysis.ai;
            dom.display.innerHTML = `<div class="expert-block"><b>☀️ Matin</b><p>${ai.routine_matin}</p></div>
                                     <div class="expert-block"><b>🌙 Soir</b><p>${ai.routine_soir}</p></div>`;
        } else {
            dom.display.innerHTML = `<p style="font-size:0.6rem; opacity:0.5; text-align:center;">Historique des 10 dernières sessions disponible dans la V10 Pro.</p>`;
        }
    }

    function saveApiKey() {
        const val = document.getElementById('api-key-input').value;
        if (val) { STATE.apiKey = val; localStorage.setItem('NJ_GEMINI_KEY', val); initApp(); }
    }

    function saveToHistory(s) {
        STATE.history.push({ date: new Date().toLocaleDateString(), score: s });
        localStorage.setItem('NJ_HIST', JSON.stringify(STATE.history.slice(-10)));
    }

    function toggleCamera() {
        STATE.facing = STATE.facing === 'user' ? 'environment' : 'user';
        initCamera();
    }

    function exportPDF() {
        if (!STATE.analysis) return;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(20); doc.setTextColor(197, 160, 89);
        doc.text("RAPPORT PURESKIN AI ELITE", 20, 20);
        doc.setFontSize(12); doc.setTextColor(100, 100, 100);
        doc.text(`Score de Pureté: ${STATE.analysis.score}%`, 20, 40);
        doc.text(doc.splitTextToSize(STATE.analysis.ai.bilan, 170), 20, 60);
        doc.save("Diagnostic_NicolasJulienne.pdf");
    }

    return { onOpenCvReady: () => STATE.cvReady = true, saveApiKey, runAnalysis, switchTab, toggleCamera, exportPDF };
})();

window.addEventListener('DOMContentLoaded', () => {
    if (localStorage.getItem('NJ_GEMINI_KEY')) AppCore.saveApiKey();
});
</script>
</body>
</html>
