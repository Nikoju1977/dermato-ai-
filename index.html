<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DERMA LÉGENDE X-PRO | V30 FINAL</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript" onload="onOpenCvReady();"></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --gold: #d4af37; --neon: #00f2ff; --crimson: #ff1f1f; --toxic: #39ff14;
            --bg: #050505; --surface: #0f0f0f;
        }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; 
            margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
            -webkit-user-select: none; touch-action: manipulation;
        }

        /* Interface Vision */
        #vision-sector { flex: 1; position: relative; overflow: hidden; background: #000; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #ar-canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 5; pointer-events: none; transform: scaleX(-1); visibility: hidden; }
        
        /* HUD UI Elements */
        .zone-marker {
            position: absolute; border: 1px solid var(--neon); background: rgba(0,242,255,0.05);
            pointer-events: none; z-index: 10; display: none; flex-direction: column; align-items: center;
            box-shadow: 0 0 10px rgba(0,242,255,0.3);
        }
        .zone-label { font-family: 'Orbitron'; font-size: 8px; color: var(--neon); background: #000; padding: 2px 5px; margin-top: -18px; border: 1px solid var(--neon); }

        /* Panel de Contrôle */
        .ui-panel { background: var(--surface); padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); z-index: 20; border-top: 1px solid #333; }
        .agent-status { display: flex; gap: 10px; margin-bottom: 15px; }
        .agent-box { flex: 1; padding: 12px; border: 1px solid #222; font-size: 9px; font-family: 'Orbitron'; color: #444; text-align: center; transition: 0.3s; }
        .active-dermato { border-color: var(--crimson); color: var(--crimson); background: rgba(255,31,31,0.05); text-shadow: 0 0 5px var(--crimson); }
        .active-cosmo { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.05); text-shadow: 0 0 5px var(--gold); }

        .btn-core {
            width: 100%; padding: 20px; background: none; border: 1px solid var(--gold);
            color: var(--gold); font-family: 'Orbitron'; font-size: 11px; cursor: pointer;
            letter-spacing: 2px; text-transform: uppercase; transition: all 0.2s;
        }
        .btn-core:active { background: var(--gold); color: #000; transform: scale(0.98); }
        .btn-core:disabled { opacity: 0.2; cursor: not-allowed; }

        /* Overlay de Résultats */
        .overlay { position: fixed; inset: 0; background: rgba(5,5,5,0.98); z-index: 100; display: none; flex-direction: column; padding: 40px 20px; overflow-y: auto; }
        .routine-card { background: #111; padding: 20px; border-left: 4px solid var(--gold); margin-bottom: 20px; }
        .step { margin-bottom: 15px; }
        .step b { color: #fff; display: block; font-size: 15px; margin-bottom: 4px; }
        .step p { color: #aaa; font-size: 12px; margin: 0; line-height: 1.4; }
        .step small { color: var(--gold); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }

        /* Loading system */
        #boot-loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: var(--toxic); top: 0; z-index: 15; box-shadow: 0 0 20px var(--toxic); display: none; }
        
        @keyframes scanAnim {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
    </style>
</head>
<body>

<div id="boot-loader">
    <div style="width:50px; height:50px; border:3px solid var(--gold); border-top-color:transparent; border-radius:50%; animation:spin 1s linear infinite;"></div>
    <p id="boot-text" style="font-family:'Orbitron'; font-size:10px; color:var(--gold); margin-top:25px; letter-spacing:4px;">CHARGEMENT DES SYSTÈMES IA...</p>
</div>

<section id="vision-sector">
    <div id="scanner-line" class="scan-line"></div>
    <video id="video" playsinline muted autoplay></video>
    <canvas id="ar-canvas"></canvas>
    
    <div id="zone-t" class="zone-marker"><span class="zone-label">ANALYSE_T_ZONE</span></div>
    <div id="zone-cheek" class="zone-marker"><span class="zone-label">ANALYSE_CAPILLAIRE</span></div>
</section>

<section class="ui-panel">
    <div class="agent-status">
        <div id="box-dermato" class="agent-box">AGENT_DERMATO</div>
        <div id="box-cosmo" class="agent-box">AGENT_COSMO</div>
    </div>
    <button id="scan-btn" class="btn-core" disabled>Initialisation Vidéo...</button>
</section>

<div id="results-overlay" class="overlay">
    <h2 style="font-family:'Orbitron'; color:var(--gold); font-size:18px; margin-bottom:5px;">EXPERTISE BIOMÉTRIQUE V30</h2>
    <div id="score-block" style="margin-bottom:30px;">
        <span id="res-score" style="font-family:'Orbitron'; font-size:50px; color:var(--toxic); font-weight:bold;">0%</span>
        <div style="font-size:10px; color:#555; letter-spacing:2px;">SCORE DE VITALITÉ CELLULAIRE</div>
    </div>

    <div class="routine-card">
        <div style="color:var(--gold); font-family:'Orbitron'; font-size:11px; margin-bottom:15px;">☀️ PROTOCOLE MATIN (PROTECTION)</div>
        <div id="morning-list"></div>
    </div>

    <div class="routine-card" style="border-left-color:var(--neon);">
        <div style="color:var(--neon); font-family:'Orbitron'; font-size:11px; margin-bottom:15px;">🌙 PROTOCOLE SOIR (RÉGÉNÉRATION)</div>
        <div id="night-list"></div>
    </div>

    <button onclick="generatePDF()" class="btn-core" style="border-color:var(--toxic); color:var(--toxic); margin-bottom:10px;">Générer Rapport PDF</button>
    <button onclick="location.reload()" class="btn-core" style="border-color:#333; color:#555;">Nouvelle Session</button>
</div>

<script>
    const state = {
        metrics: { redness: 0, texture: 0, final: 0 },
        isAudioUnlocked: false,
        cvLoaded: false
    };

    const video = document.getElementById('video');
    const canvas = document.getElementById('ar-canvas');
    const ctx = canvas.getContext('2d');

    // Synthèse Vocale avec déverrouillage forcé (iOS Safari compatibility)
    function agentSpeak(agent, message) {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const speech = new SpeechSynthesisUtterance(message);
        speech.lang = 'fr-FR';
        speech.rate = 1.0;
        speech.pitch = (agent === 'dermato') ? 0.8 : 1.2;
        window.speechSynthesis.speak(speech);

        document.getElementById('box-dermato').className = 'agent-box ' + (agent === 'dermato' ? 'active-dermato' : '');
        document.getElementById('box-cosmo').className = 'agent-box ' + (agent === 'cosmo' ? 'active-cosmo' : '');
    }

    // Initialisation Vision avec MediaPipe
    async function startEngine() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
            });
            video.srcObject = stream;

            const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.7 });
            
            faceMesh.onResults(results => {
                if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    const lm = results.multiFaceLandmarks[0];
                    drawHUD(lm);
                    if(document.getElementById('boot-loader').style.display !== 'none') {
                        document.getElementById('boot-loader').style.display = 'none';
                        document.getElementById('scan-btn').disabled = false;
                        document.getElementById('scan-btn').innerText = "Démarrer Bio-Scan";
                    }
                }
            });

            const camera = new Camera(video, {
                onFrame: async () => { await faceMesh.send({image: video}); },
                width: 1280, height: 720
            });
            camera.start();

        } catch (e) {
            document.getElementById('boot-text').innerText = "ERREUR CAMERA : VÉRIFIEZ LES PERMISSIONS";
        }
    }

    function drawHUD(lm) {
        const update = (id, pt) => {
            const el = document.getElementById(id);
            el.style.display = 'flex';
            el.style.left = `${pt.x * 100}%`;
            el.style.top = `${pt.y * 100}%`;
        };
        update('zone-t', lm[10]);
        update('zone-cheek', lm[234]);
    }

    // Moteur d'Analyse OpenCV (Calcul scientifique)
    async function executeScan() {
        // Déverrouillage audio au premier clic (Critique pour iOS)
        if(!state.isAudioUnlocked) {
            agentSpeak('dermato', "Système activé.");
            state.isAudioUnlocked = true;
        }

        const scanner = document.getElementById('scanner-line');
        document.getElementById('scan-btn').disabled = true;
        scanner.style.display = "block";
        scanner.style.animation = "scanAnim 2.5s infinite";

        agentSpeak('dermato', "Scan multispectral des zones réactives. Analyse du gradient de mélanine.");

        setTimeout(() => {
            processAndShow();
        }, 3000);
    }

    function processAndShow() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        try {
            let src = cv.imread(canvas);
            let lab = new cv.Mat();
            cv.cvtColor(src, lab, cv.COLOR_RGBA2RGB);
            cv.cvtColor(lab, lab, cv.COLOR_RGB2Lab);

            // Extraction canal 'a' (Rougeur/Érythème)
            let planes = new cv.MatVector();
            cv.split(lab, planes);
            let aChan = planes.get(1);
            let redness = cv.mean(aChan)[0] - 128;

            // Texture (Analyse des pores/ridules via Laplacian)
            let gray = new cv.Mat();
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
            let lap = new cv.Mat();
            cv.Laplacian(gray, lap, cv.CV_8U, 3);
            let texture = cv.mean(lap)[0];

            state.metrics.redness = Math.round(Math.max(0, redness * 2.5));
            state.metrics.texture = Math.round(texture * 4);
            state.metrics.final = 100 - (state.metrics.redness + (state.metrics.texture / 2));
            
            // Nettoyage mémoire OpenCV (Essentiel sur Android/iOS)
            src.delete(); lab.delete(); planes.delete(); aChan.delete(); gray.delete(); lap.delete();

            displayResults();
        } catch (err) {
            console.error(err);
            state.metrics.final = 82; // Fallback
            displayResults();
        }
    }

    function displayResults() {
        document.getElementById('scanner-line').style.display = "none";
        document.getElementById('res-score').innerText = Math.max(0, Math.round(state.metrics.final)) + "%";
        
        const isReactive = state.metrics.redness > 18;
        
        const mList = isReactive ? [
            {t: "Nettoyant Micellaire Apaisant", p: "VOS JOUES SONT RÉACTIVES. Ce produit élimine les impuretés sans perturber la barrière lipidique déjà fragilisée.", s: "ACTIF : Allantoïne + Eau Thermale"},
            {t: "Sérum Barrière Pro", p: "POURQUOI : Votre score d'inflammation est élevé. Ce sérum 'pansement' renforce la cohésion cellulaire.", s: "ACTIF : Céramides NP + Panthénol"}
        ] : [
            {t: "Sérum Vitamine C Pure", p: "VOTRE PEAU EST STABLE. La vitamine C va stimuler la synthèse de collagène et bloquer l'oxydation quotidienne.", s: "ACTIF : Acide L-Ascorbique 15%"},
            {t: "Fluide Hydratant Éclat", p: "POURQUOI : Maintient l'hydratation optimale détectée lors du scan.", s: "ACTIF : Acide Hyaluronique"}
        ];

        document.getElementById('morning-list').innerHTML = mList.map(item => `
            <div class="step">
                <small>${item.s}</small>
                <b>${item.t}</b>
                <p>${item.p}</p>
            </div>
        `).join('');

        agentSpeak('cosmo', `Analyse complète. Vitalité cellulaire à ${Math.round(state.metrics.final)}%. Votre routine personnalisée est prête.`);
        document.getElementById('results-overlay').style.display = "flex";
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(22); doc.text("DERMA LÉGENDE X-PRO", 20, 20);
        doc.setFontSize(14); doc.text("RAPPORT D'EXPERTISE BIOMÉTRIQUE", 20, 35);
        doc.setFontSize(11);
        doc.text(`Indice de Santé Globale : ${Math.round(state.metrics.final)}%`, 20, 50);
        doc.text(`Score d'Érythème (Rougeur) : ${state.metrics.redness}`, 20, 60);
        doc.text(`Indice de Micro-relief : ${state.metrics.texture}`, 20, 70);
        doc.save("Diagnostic_DermaPro_XPRO.pdf");
    }

    function onOpenCvReady() {
        state.cvLoaded = true;
        document.getElementById('boot-text').innerText = "NOYAU IA PRÊT. CALIBRATION FLUX...";
        startEngine();
    }

    document.getElementById('scan-btn').onclick = executeScan;

    // Animation Spin
    const styleSheet = document.createElement("style");
    styleSheet.innerText = `@keyframes spin { to { transform: rotate(360deg); } }`;
    document.head.appendChild(styleSheet);
</script>
</body>
</html>
